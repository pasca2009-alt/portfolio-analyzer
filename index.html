const extractJSON=text=>{
  const md=text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if(md){try{return JSON.parse(md[1].trim());}catch(_){}}
  const s=text.indexOf("{");
  if(s!==-1){let d=0;for(let i=s;i<text.length;i++){if(text[i]==="{")d++;else if(text[i]==="}"){ d--;if(d===0)return JSON.parse(text.slice(s,i+1));}}};
  throw new Error("Nessun JSON trovato");
};

const callAI=async(system,prompt,maxTokens=2000)=>{
  const key=window._aiKey||"";
  if(!key)throw new Error("API Key non inserita");
  const full=system?system+"\n\n"+prompt:prompt;
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${key}`;
  const body=JSON.stringify({contents:[{parts:[{text:full}]}],generationConfig:{maxOutputTokens:maxTokens,temperature:0.7}});
  let resp;
  try{resp=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body});}
  catch(e){resp=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,{method:"POST",headers:{"Content-Type":"application/json"},body});}
  const data=await resp.json();
  if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
  const text=data.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!text)throw new Error("Risposta vuota");
  return text;
};

async function fetchYahoo(ticker){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1mo`;
  const resp=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
  const data=await resp.json();
  const r=data?.chart?.result?.[0];
  if(!r)throw new Error("no data");
  const ts=r.timestamp,closes=r.indicators.quote[0].close;
  const ref=new Date(DATA_RIF).getTime()/1000;
  let ri=0,md=Infinity;
  ts.forEach((t,i)=>{const d=Math.abs(t-ref);if(d<md){md=d;ri=i;}});
  return{varPct:((closes[closes.length-1]-closes[ri])/closes[ri])*100};
}

function useLivePrices(holdings){
  const[prices,setPrices]=useState({});
  const[loading,setLoading]=useState(false);
  const[lastUpdate,setLastUpdate]=useState(null);
  const[error,setError]=useState(null);
  const refresh=useCallback(async()=>{
    setLoading(true);setError(null);
    const tickers=[...new Set(holdings.map(h=>BENCHMARK[h.categoria]?.ticker).filter(Boolean))];
    const res={},errs=[];
    await Promise.all(tickers.map(async t=>{try{res[t]=await fetchYahoo(t);}catch{errs.push(t);}}));
    setPrices(res);setLastUpdate(new Date());
    if(errs.length)setError(`N/D: ${errs.join(", ")}`);
    setLoading(false);
  },[holdings]);
  const enriched=holdings.map(h=>{
    const b=BENCHMARK[h.categoria];
    if(!b?.ticker||!prices[b.ticker])return{...h,stimato:null,varPct:null};
    return{...h,stimato:h.controvaloreAttuale*(1+prices[b.ticker].varPct/100),varPct:prices[b.ticker].varPct};
  });
  const totalStimato=enriched.reduce((s,h)=>s+(h.stimato??h.controvaloreAttuale),0);
  return{enriched,loading,lastUpdate,error,refresh,totalStimato};
}

function PieChart({data,size=110}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return null;
  let cum=-Math.PI/2;
  const R=size/2-6,cx=size/2,cy=size/2;
  const slices=data.map(d=>{
    const a=(d.value/total)*2*Math.PI;
    const x1=cx+R*Math.cos(cum),y1=cy+R*Math.sin(cum);
    cum+=a;
    return{...d,x1,y1,x2:cx+R*Math.cos(cum),y2:cy+R*Math.sin(cum),large:a>Math.PI?1:0};
  });
  return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    {slices.map((s,i)=><path key={i} d={`M${cx} ${cy}L${s.x1} ${s.y1}A${R} ${R} 0 ${s.large} 1 ${s.x2} ${s.y2}Z`} fill={s.color} opacity={0.9} stroke="#00000020" strokeWidth={1}/>)}
    <circle cx={cx} cy={cy} r={R*0.42} fill="#12121e"/>
  </svg>);
}

function UploadZone({bankCode,onData,hasData}){
  const[drag,setDrag]=useState(false);
  const ref=useRef();
  const bank=BANKS[bankCode];
  const parse=text=>{
    const lines=text.trim().split("\n");
    const header=lines[0].split(";").map(h=>h.trim().replace(/^\uFEFF/,""));
    return lines.slice(1).map(line=>{
      const vals=line.split(";");const o={};
      header.forEach((h,i)=>{o[h]=vals[i]?.trim()||"";});
      const n=s=>s?parseFloat(s.replace(/\./g,"").replace(",","."))||null:null;
      return{nome:o.Nome||o.nome||"",isin:o.ISIN||o.isin||null,quantita:n(o["Quantità"]||o.quantita),prezzoCarico:n(o.Prezzo_Carico||o.prezzo_carico),controvaloreAttuale:n(o.Prezzo_Attuale||o.prezzo_attuale),categoria:o.Categoria||o.categoria||"Altro",banca:bankCode,plusMinus:null,rendimentoAnnuo:null};
    }).filter(r=>r.nome);
  };
  const handleFile=f=>{const r=new FileReader();r.onload=e=>{try{onData(parse(e.target.result));}catch{alert("Errore CSV");}};r.readAsText(f,"UTF-8");};
  return(<div onClick={()=>!hasData&&ref.current?.click()} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0]);}} style={{border:`1.5px dashed ${hasData||drag?bank.color:"#444"}`,borderRadius:10,padding:14,cursor:hasData?"default":"pointer",background:hasData?`${bank.color}15`:drag?`${bank.color}08`:"transparent",display:"flex",alignItems:"center",gap:10}}>
    <div style={{width:34,height:34,borderRadius:"50%",background:hasData?bank.color:"#2a2a3e",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
      <span style={{color:hasData?"white":"#888",fontSize:16}}>{hasData?"✓":"↑"}</span>
    </div>
    <div style={{flex:1}}><div style={{fontWeight:500,fontSize:13}}>{bank.name}</div><div style={{fontSize:12,color:"#888"}}>{hasData?"Caricato ✓":"Carica CSV"}</div></div>
    {!hasData&&<input ref={ref} type="file" accept=".csv" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>}
  </div>);
}

        <thead><tr>{["Titolo","Banca","Valore","P&L","%"].map(h=><th key={h} style={{textAlign:h==="Titolo"?"left":"right",padding:"4px 6px",color:"#888",fontWeight:500,borderBottom:"0.5px solid #333"}}>{h}</th>)}</tr></thead>

            <td style={{padding:"5px 6px",textAlign:"right"}}><span style={{padding:"2px 5px",borderRadius:4,fontSize:10,background:`${BANKS[h.banca]?.color}25`,color:BANKS[h.banca]?.color}}>{h.banca}</span></td>
            <td style={{padding:"5px 6px",textAlign:"right",fontWeight:500}}>{fmtEur(h.controvaloreAttuale)}</td>
            <td style={{padding:"5px 6px",textAlign:"right",color:h.plusMinus>0?"#1D9E75":h.plusMinus<0?"#D85A30":"#888"}}>{fmtEur(h.plusMinus)}</td>

  </>);
}

function AnalisiTab({holdings,totalValue,byCat,catData}){
  const[analysis,setAnalysis]=useState("");
  const[loading,setLoading]=useState(false);
  const[done,setDone]=useState(false);
  const[storico,setStorico]=useState(()=>{try{return JSON.parse(localStorage.getItem("portfolio_analisi")||"[]");}catch{return[];}});
  const[viewIdx,setViewIdx]=useState(null);
  const saveS=text=>{const e={id:Date.now(),data:new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}),totale:fmtEur(totalValue),testo:text};const u=[e,...storico].slice(0,5);setStorico(u);localStorage.setItem("portfolio_analisi",JSON.stringify(u));};
  const delE=id=>{const u=storico.filter(e=>e.id!==id);setStorico(u);localStorage.setItem("portfolio_analisi",JSON.stringify(u));setViewIdx(null);};
  const delAll=()=>{setStorico([]);localStorage.removeItem("portfolio_analisi");setViewIdx(null);};
  const run=async()=>{
    setLoading(true);setAnalysis("");setDone(false);setViewIdx(null);
    const summary=holdings.filter(h=>h.controvaloreAttuale>0).map(h=>`${h.nome.slice(0,35)} [${h.banca}] (${h.categoria}): ${fmtEur(h.controvaloreAttuale)}`).join("\n");
    try{
      const text=await callAI(null,`Sei un consulente finanziario italiano esperto. Analizza questo portafoglio BILANCIATO (totale ${fmtEur(totalValue)}):\n${summary}\n\nFornisci:\n1. **Valutazione generale**\n2. **Rischi principali** (3 punti)\n3. **Opportunità** (3 punti)\n4. **Raccomandazioni** per profilo bilanciato\n5. **Previsione 2026**`);
      if(!text||!text.trim())throw new Error("Risposta vuota");
      setAnalysis(text);saveS(text);setDone(true);
    }catch(e){setAnalysis(`⚠ Errore: ${e.message}`);setDone(false);}
    setLoading(false);
  };
  const renderMd=t=>t.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>");
  const az=Object.entries(byCat).filter(([k])=>k.toLowerCase().startsWith("azion")).reduce((s,[,v])=>s+v,0);
  const ob=Object.entries(byCat).filter(([k])=>k.toLowerCase().startsWith("obblig")).reduce((s,[,v])=>s+v,0);
  const ass=Object.entries(byCat).filter(([k])=>k.toLowerCase().includes("assicur")).reduce((s,[,v])=>s+v,0);
  const pAz=totalValue>0?Math.round(az/totalValue*100):0;
  const pOb=totalValue>0?Math.round(ob/totalValue*100):0;
  const pAs=totalValue>0?Math.round(ass/totalValue*100):0;
  const testo=viewIdx!==null?storico[viewIdx]?.testo:analysis;
  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:"1.25rem"}}>
      {[{l:"Azionario",v:pAz+"%",s:"target 50–65%",a:pAz>65||pAz<50},{l:"Obbligazionario",v:pOb+"%",s:"target 30–45%",a:pOb>45||pOb<30},{l:"Assicurativo",v:pAs+"%",s:"polizze/unit linked",a:false},{l:"Titoli",v:holdings.filter(h=>h.controvaloreAttuale>0).length,s:fmtEur(totalValue),a:false}].map((c,i)=>(
        <div key={i} style={{background:c.a?"#EF9F2710":"#1e2235",border:c.a?"0.5px solid #EF9F2740":"none",borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:11,color:"#888",marginBottom:3}}>{c.l}</div>
          <div style={{fontSize:20,fontWeight:500,color:c.a?"#EF9F27":"white"}}>{c.v}</div>
          <div style={{fontSize:11,color:"#888",marginTop:2}}>{c.s}</div>
        </div>
      ))}
    </div>
    <div style={{background:"#1e2235",borderRadius:10,padding:"1.25rem",marginBottom:"1rem"}}>
      <div style={{fontWeight:500,fontSize:13,marginBottom:"1rem"}}>Distribuzione per categoria</div>
      {catData.map(c=>(<div key={c.label} style={{marginBottom:9}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
          <span style={{color:"#ccc"}}>{c.label}</span>
          <span style={{fontWeight:500}}>{totalValue>0?Math.round(c.value/totalValue*100):0}%</span>
        </div>
        <div style={{height:5,borderRadius:3,background:"#2a2a3e"}}><div style={{height:"100%",borderRadius:3,background:c.color,width:totalValue>0?`${c.value/totalValue*100}%`:"0%",transition:"width .5s"}}/></div>
      </div>))}
    </div>
    <div style={{background:"#1e2235",borderRadius:10,padding:"1.25rem",marginBottom:"1rem"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:testo?"1rem":0}}>
        <div><div style={{fontWeight:500,fontSize:14}}>Analisi AI</div><div style={{fontSize:11,color:"#888"}}>powered by Gemini</div></div>
        <button onClick={run} disabled={loading} style={{padding:"8px 14px",borderRadius:8,border:"0.5px solid #444",background:"#2a2a3e",color:"white",cursor:loading?"not-allowed":"pointer",fontSize:13,fontWeight:500}}>{loading?"In corso…":done?"Rigenera":"Avvia analisi"}</button>
      </div>
      {viewIdx!==null&&<div style={{fontSize:11,color:"#888",marginBottom:8,fontStyle:"italic"}}>📅 {storico[viewIdx]?.data} · {storico[viewIdx]?.totale}</div>}
      {testo&&<div style={{fontSize:13,lineHeight:1.7}} dangerouslySetInnerHTML={{__html:renderMd(testo)}}/>}
      {!testo&&!loading&&<div style={{fontSize:13,color:"#888",fontStyle:"italic",marginTop:"1rem"}}>Clicca "Avvia analisi".</div>}
    </div>
    {storico.length>0&&(
      <div style={{background:"#1e2235",borderRadius:10,padding:"1.25rem"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}}>
          <div style={{fontWeight:500,fontSize:13}}>Storico ({storico.length}/5)</div>
          <button onClick={delAll} style={{padding:"4px 10px",borderRadius:6,border:"0.5px solid #D85A3040",background:"transparent",color:"#D85A30",cursor:"pointer",fontSize:12}}>Cancella tutto</button>
        </div>
        {storico.map((e,i)=>(
          <div key={e.id} onClick={()=>setViewIdx(viewIdx===i?null:i)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,marginBottom:6,background:viewIdx===i?"#2a2a3e":"#12121e",border:viewIdx===i?"0.5px solid #7F77DD":"0.5px solid #2a2a3e",cursor:"pointer"}}>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{e.data}</div><div style={{fontSize:11,color:"#888",marginTop:2}}>{e.totale} · {e.testo.slice(0,60)}…</div></div>
            <button onClick={ev=>{ev.stopPropagation();delE(e.id);}} style={{padding:"3px 8px",borderRadius:6,border:"0.5px solid #D85A3040",background:"transparent",color:"#D85A30",cursor:"pointer",fontSize:11,flexShrink:0}}>✕</button>
          </div>
        ))}
      </div>
    )}
  </div>);
}

function PrevisioniTab({holdings,totalValue}){
  const[scenarios,setScenarios]=useState(null);
  const[loading,setLoading]=useState(false);
  const[perTitolo,setPerTitolo]=useState([]);
  const rendP=holdings.length>0?holdings.reduce((s,h)=>s+getRend(h)*(h.controvaloreAttuale||0),0)/totalValue:0;
  const today=new Date();
  const months=[];for(let m=today.getMonth();m<=11;m++)months.push(["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"][m]);
  const run=async()=>{
    setLoading(true);setScenarios(null);
    const catBD={};holdings.forEach(h=>{catBD[h.categoria]=(catBD[h.categoria]||0)+(h.controvaloreAttuale||0);});
    try{
      const text=await callAI("Sei un consulente finanziario italiano. Rispondi SOLO con JSON valido, senza testo prima o dopo.",`Portafoglio bilanciato, aprile 2026. Totale €${Math.round(totalValue).toLocaleString("it-IT")}. Rendimento medio: ${rendP.toFixed(2)}%. Composizione: ${Object.entries(catBD).map(([k,v])=>`${k} ${Math.round(v/totalValue*100)}%`).join(", ")}. Contesto: tensioni USA-Cina, BCE ferma. JSON: {"contesto":"...","base":{"nome":"Scenario Base","rendimento":7.5,"motivazione":"..."},"ottimistico":{"nome":"Scenario Ottimistico","rendimento":11.0,"motivazione":"..."},"pessimistico":{"nome":"Scenario Pessimistico","rendimento":2.5,"motivazione":"..."},"raccomandazioni":["...","...","..."]}`,1200);
      const json=extractJSON(text);
      setScenarios(json);
      setPerTitolo(holdings.filter(h=>h.controvaloreAttuale>0).map(h=>{const r=getRend(h);return{...h,r,v6:h.controvaloreAttuale*Math.pow(1+r/100/12,6),v12:h.controvaloreAttuale*Math.pow(1+r/100/12,12)};}).sort((a,b)=>b.controvaloreAttuale-a.controvaloreAttuale));
    }catch(e){setScenarios({error:`Errore: ${e.message}`});}
    setLoading(false);
  };
  const SC={base:"#1D9E75",ottimistico:"#7F77DD",pessimistico:"#D85A30"};
  const proj=rate=>months.map((_,i)=>Math.round(totalValue*Math.pow(1+rate/100/12,i)));
  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:"1.25rem"}}>
      {[{l:"Valore oggi",v:fmtEur(totalValue),s:new Date().toLocaleDateString("it-IT")},{l:"Rend. medio",v:fmtPct(rendP),s:"ponderato"},{l:"Mesi rimanenti",v:(12-today.getMonth()).toString(),s:"fino a dicembre"}].map((c,i)=>(
        <div key={i} style={{background:"#1e2235",borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:11,color:"#888",marginBottom:3}}>{c.l}</div>
          <div style={{fontSize:20,fontWeight:500}}>{c.v}</div>
          <div style={{fontSize:11,color:"#888",marginTop:2}}>{c.s}</div>
        </div>
      ))}
    </div>
    {scenarios&&!scenarios.error&&(
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:"1.25rem"}}>
        {["ottimistico","base","pessimistico"].map(key=>{
          const s=scenarios[key],color=SC[key],val=proj(s.rendimento).at(-1);
          return(<div key={key} style={{background:"#1e2235",borderRadius:10,padding:"12px 14px",borderLeft:`3px solid ${color}`}}>
            <div style={{fontSize:11,color:"#888",marginBottom:3}}>{s.nome}</div>
            <div style={{fontSize:18,fontWeight:500,color}}>{fmtEur(val)}</div>
            <div style={{fontSize:11,color:"#888",marginTop:2}}>{s.rendimento>=0?"+":""}{s.rendimento.toFixed(1)}% · {val>totalValue?"+":""}{fmtEur(val-totalValue)}</div>
            <div style={{fontSize:11,color:"#aaa",marginTop:4}}>{s.motivazione}</div>
          </div>);
        })}
      </div>
    )}
    <div style={{background:"#1e2235",borderRadius:10,padding:"1.25rem",marginBottom:"1rem"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontWeight:500,fontSize:14}}>Scenari AI</div><div style={{fontSize:11,color:"#888"}}>Gemini analizza il contesto</div></div>
        <button onClick={run} disabled={loading} style={{padding:"8px 14px",borderRadius:8,border:"0.5px solid #444",background:"#2a2a3e",color:"white",cursor:loading?"not-allowed":"pointer",fontSize:13,fontWeight:500}}>{loading?"In corso…":scenarios?"Aggiorna":"Avvia previsione"}</button>
      </div>
      {scenarios?.error&&<div style={{color:"#D85A30",fontSize:13,marginTop:"1rem"}}>{scenarios.error}</div>}
      {scenarios&&!scenarios.error&&(<div style={{marginTop:"1rem"}}>
        <div style={{fontSize:12,color:"#888",fontStyle:"italic",marginBottom:"1rem"}}>{scenarios.contesto}</div>
        <div style={{borderTop:"0.5px solid #2a2a3e",paddingTop:"1rem"}}>
          <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>Raccomandazioni</div>
          {scenarios.raccomandazioni?.map((r,i)=>(
            <div key={i} style={{display:"flex",gap:8,marginBottom:6,fontSize:13}}>
              <span style={{color:"#1D9E75",fontWeight:500,flexShrink:0}}>{i+1}.</span>
              <span style={{color:"#aaa"}}>{r}</span>
            </div>
          ))}
        </div>
      </div>)}
      {!scenarios&&!loading&&<div style={{fontSize:13,color:"#888",fontStyle:"italic",marginTop:"1rem"}}>Clicca "Avvia previsione".</div>}
    </div>
    {perTitolo.length>0&&(
      <div style={{background:"#1e2235",borderRadius:10,padding:"1.25rem"}}>
        <div style={{fontWeight:500,fontSize:13,marginBottom:"1rem"}}>Stima per titolo</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",fontSize:12}}>
            <thead><tr style={{borderBottom:"0.5px solid #333"}}>{["Titolo","Cat.","Oggi","Rend.","+6m","+12m"].map(h=><th key={h} style={{textAlign:["Titolo","Cat."].includes(h)?"left":"right",padding:"5px 7px",color:"#888",fontWeight:500}}>{h}</th>)}</tr></thead>
            <tbody>{perTitolo.map((h,i)=>(
              <tr key={i} style={{borderBottom:"0.5px solid #222"}}>
                <td style={{padding:"6px 7px",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={h.nome}>{h.nome}</td>
                <td style={{padding:"6px 7px",fontSize:11,color:"#888"}}>{h.categoria}</td>
                <td style={{padding:"6px 7px",textAlign:"right"}}>{fmtEur(h.controvaloreAttuale)}</td>
                <td style={{padding:"6px 7px",textAlign:"right",color:h.r>=0?"#1D9E75":"#D85A30"}}>{fmtPct(h.r)}</td>
                <td style={{padding:"6px 7px",textAlign:"right",color:h.v6>=h.controvaloreAttuale?"#1D9E75":"#D85A30"}}>{fmtEur(h.v6)}</td>
                <td style={{padding:"6px 7px",textAlign:"right",color:h.v12>=h.controvaloreAttuale?"#1D9E75":"#D85A30"}}>{fmtEur(h.v12)}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    )}
  </div>);
}

function AzioniTab({holdings,totalValue,byCat}){
  const[actions,setActions]=useState(null);
  const[loading,setLoading]=useState(false);
  const[expanded,setExpanded]=useState(null);
  const[filterTipo,setFilterTipo]=useState("tutti");
  const az=Object.entries(byCat).filter(([k])=>k.toLowerCase().startsWith("azion")).reduce((s,[,v])=>s+v,0);
  const ob=Object.entries(byCat).filter(([k])=>k.toLowerCase().startsWith("obblig")).reduce((s,[,v])=>s+v,0);
  const pAz=totalValue>0?(az/totalValue*100).toFixed(1):0;
  const pOb=totalValue>0?(ob/totalValue*100).toFixed(1):0;
  const run=async()=>{
    setLoading(true);setActions(null);setExpanded(null);
    const righe=holdings.filter(h=>h.controvaloreAttuale>0).map((h,i)=>{
      const nome=h.nome.length>40?h.nome.slice(0,40):h.nome;
      const peso=totalValue>0?(h.controvaloreAttuale/totalValue*100).toFixed(1):0;
      return `${i+1}. ${nome} [${h.banca}] | ${h.categoria} | €${Math.round(h.controvaloreAttuale)} (${peso}%) | rend:${h.rendimentoAnnuo!=null?h.rendimentoAnnuo+"%":"n/d"}`;
    }).join("\n");
    try{
      const text=await callAI("Sei un consulente finanziario italiano. Rispondi SOLO con JSON valido, senza testo prima o dopo.",`Portafoglio BILANCIATO, aprile 2026. Totale €${Math.round(totalValue).toLocaleString("it-IT")}. Azionario ${pAz}% (target 50-65%), Obbligazionario ${pOb}% (target 30-45%). Contesto: tensioni USA-Cina, BCE ferma.\n\nTITOLI:\n${righe}\n\nPer ogni titolo azione (vendi/monitora/mantieni/incrementa/switch) e priorità (alta/media/bassa). JSON: {"sommario":"...","ribilanciamento":"...","titoli":[{"nome":"...","azione":"mantieni","priorita":"media","motivazione":"...","cosa_fare":"..."}]}`,4000);
      const json=extractJSON(text);
      if(!json.titoli||!Array.isArray(json.titoli))throw new Error("Struttura non valida");
      setActions(json);
    }catch(e){setActions({error:`Errore: ${e.message}`});}
    setLoading(false);
  };
  const tf=actions?.titoli?.filter(t=>filterTipo==="tutti"||t.azione===filterTipo)??[];
  const cnt=actions?.titoli?Object.keys(AZIONE_META).reduce((a,k)=>{a[k]=actions.titoli.filter(t=>t.azione===k).length;return a;},{}):{}; 
  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:"1.25rem"}}>
      {[{l:"Azionario",v:pAz+"%",s:"target 50–65%",a:pAz>65||pAz<50},{l:"Obbligazionario",v:pOb+"%",s:"target 30–45%",a:pOb>45||pOb<30},{l:"Titoli",v:holdings.filter(h=>h.controvaloreAttuale>0).length,s:"da analizzare",a:false}].map((c,i)=>(
        <div key={i} style={{background:c.a?"#EF9F2710":"#1e2235",border:c.a?"0.5px solid #EF9F2740":"none",borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:11,color:"#888",marginBottom:3}}>{c.l}</div>
          <div style={{fontSize:20,fontWeight:500,color:c.a?"#EF9F27":"white"}}>{c.v}</div>
          <div style={{fontSize:11,color:"#888",marginTop:2}}>{c.s}</div>
        </div>
      ))}
    </div>
    <div style={{background:"#1e2235",borderRadius:10,padding:"1.25rem",marginBottom:"1rem"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontWeight:500,fontSize:14}}>Piano d'Azione AI</div><div style={{fontSize:11,color:"#888"}}>Analisi titolo per titolo</div></div>
        <button onClick={run} disabled={loading} style={{padding:"8px 14px",borderRadius:8,border:"0.5px solid #444",background:"#2a2a3e",color:"white",cursor:loading?"not-allowed":"pointer",fontSize:13,fontWeight:500}}>{loading?"In corso…":actions?"Aggiorna":"Avvia analisi"}</button>
      </div>
      {!actions&&!loading&&<div style={{fontSize:13,color:"#888",fontStyle:"italic",marginTop:"1rem"}}>Clicca "Avvia analisi".</div>}
      {loading&&<div style={{fontSize:13,color:"#888",marginTop:"1rem"}}>Gemini sta analizzando…</div>}
      {actions?.error&&<div style={{color:"#D85A30",fontSize:13,marginTop:"1rem"}}>{actions.error}</div>}
      {actions&&!actions.error&&(
        <div style={{marginTop:"1rem",paddingTop:"1rem",borderTop:"0.5px solid #2a2a3e"}}>
          <div style={{fontSize:13,color:"#aaa",fontStyle:"italic",marginBottom:"1rem"}}>{actions.sommario}</div>
          {actions.ribilanciamento&&<div style={{background:"#12121e",border:"0.5px solid #7F77DD40",borderRadius:8,padding:"9px 12px",marginBottom:"1rem",fontSize:13}}><span style={{fontWeight:500,color:"#7F77DD",marginRight:6}}>Ribilanciamento:</span><span style={{color:"#aaa"}}>{actions.ribilanciamento}</span></div>}
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={()=>setFilterTipo("tutti")} style={{padding:"4px 12px",borderRadius:20,fontSize:12,cursor:"pointer",border:filterTipo==="tutti"?"1px solid #888":"0.5px solid #333",background:filterTipo==="tutti"?"#2a2a3e":"transparent",color:"white"}}>Tutti ({actions.titoli?.length??0})</button>
            {Object.entries(AZIONE_META).filter(([k])=>(cnt[k]??0)>0).map(([key,meta])=>(
              <button key={key} onClick={()=>setFilterTipo(key)} style={{padding:"4px 12px",borderRadius:20,fontSize:12,cursor:"pointer",border:filterTipo===key?`1px solid ${meta.color}`:`0.5px solid ${meta.color}40`,background:filterTipo===key?meta.bg:"transparent",color:meta.color}}>
                {meta.icon} {meta.label} ({cnt[key]})
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
    {tf.length>0&&(<div style={{display:"flex",flexDirection:"column",gap:8}}>
      {tf.map((t,i)=>{
        const meta=AZIONE_META[t.azione]??AZIONE_META.mantieni;
        const h=holdings.find(x=>x.nome===t.nome||x.nome.toLowerCase().startsWith(t.nome.toLowerCase().slice(0,20)));
        const open=expanded===i;
        return(<div key={i} onClick={()=>setExpanded(open?null:i)} style={{background:"#1e2235",border:`0.5px solid ${meta.color}30`,borderRadius:10,overflow:"hidden",cursor:"pointer"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px"}}>
            <div style={{minWidth:90,padding:"3px 8px",borderRadius:4,textAlign:"center",background:meta.bg,color:meta.color,fontSize:11,fontWeight:500}}>{meta.icon} {meta.label}</div>
            <div style={{width:6,height:6,borderRadius:"50%",flexShrink:0,background:t.priorita==="alta"?"#D85A30":t.priorita==="media"?"#EF9F27":"#888"}}/>
            <div style={{flex:1,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.nome}</div>
            {h&&<div style={{fontSize:13,fontWeight:500,flexShrink:0}}>{fmtEur(h.controvaloreAttuale)}</div>}
            <div style={{fontSize:12,color:"#888",flexShrink:0}}>{open?"▲":"▼"}</div>
          </div>
          {open&&(<div style={{padding:"0 14px 14px",borderTop:"0.5px solid #2a2a3e"}}>
            <div style={{paddingTop:12,display:"flex",flexDirection:"column",gap:10}}>
              <div><div style={{fontSize:11,color:"#888",fontWeight:500,marginBottom:3,textTransform:"uppercase"}}>Perché</div><div style={{fontSize:13,lineHeight:1.6,color:"#ccc"}}>{t.motivazione}</div></div>
              <div style={{background:meta.bg,borderRadius:8,padding:"10px 12px",border:`0.5px solid ${meta.color}30`}}>
                <div style={{fontSize:11,color:meta.color,fontWeight:500,marginBottom:3,textTransform:"uppercase"}}>Cosa fare</div>
                <div style={{fontSize:13,lineHeight:1.6}}>{t.cosa_fare}</div>
              </div>
              {h&&<div style={{display:"flex",gap:14,fontSize:12,color:"#888",flexWrap:"wrap"}}>
                {h.plusMinus!=null&&<span>P&L: <strong style={{color:h.plusMinus>=0?"#1D9E75":"#D85A30"}}>{fmtEur(h.plusMinus)}</strong></span>}
                {h.quantita&&<span>Quote: <strong style={{color:"white"}}>{fmt(h.quantita)}</strong></span>}
                <span>Peso: <strong style={{color:"white"}}>{totalValue>0?(h.controvaloreAttuale/totalValue*100).toFixed(1):"—"}%</strong></span>
              </div>}
            </div>
          </div>)}
        </div>);
      })}
    </div>)}
  </div>);
}

function App(){
  const[bankData,setBankData]=useState({MD:MD_DATA,BPER:BPER_DATA,PI:PI_DATA});
  const[tab,setTab]=useState("dashboard");
  const[sortCol,setSortCol]=useState("controvaloreAttuale");
  const[sortDir,setSortDir]=useState("desc");
  const[fBank,setFBank]=useState("all");
  const[fCat,setFCat]=useState("all");
  const[search,setSearch]=useState("");
  const[apiKey,setApiKey]=useState("");
  const[showKey,setShowKey]=useState(false);
  const[bankAI,setBankAI]=useState("all");

  const all=Object.values(bankData).flat();
  const live=useLivePrices(all);

  const aiAll=bankAI==="all"?all:all.filter(h=>h.banca===bankAI);
  const aiH=aiAll.filter(h=>!isLiq(h));
  const aiLiq=aiAll.filter(h=>isLiq(h));
  const aiTotal=aiH.reduce((s,h)=>s+(h.controvaloreAttuale||0),0);
  const aiLiqTotal=aiLiq.reduce((s,h)=>s+(h.controvaloreAttuale||0),0);
  const aiByCat={};aiH.forEach(h=>{if(h.controvaloreAttuale)aiByCat[h.categoria]=(aiByCat[h.categoria]||0)+h.controvaloreAttuale;});
  const aiCatData=Object.entries(aiByCat).map(([label,value])=>({label,value,color:CAT_COLORS[label]||"#888"})).sort((a,b)=>b.value-a.value);

  const totalValue=all.reduce((s,h)=>s+(h.controvaloreAttuale||0),0);
  const totalPL=all.reduce((s,h)=>s+(h.plusMinus||0),0);
  const totalInv=all.reduce((s,h)=>s+(h.prezzoCarico&&h.quantita?h.prezzoCarico*h.quantita:(h.controvaloreAttuale||0)-(h.plusMinus||0)),0);
  const totalPLpct=totalInv>0?(totalPL/totalInv)*100:null;

  const byBank=Object.keys(BANKS).map(k=>({name:BANKS[k].name,code:k,color:BANKS[k].color,value:(bankData[k]||[]).reduce((s,h)=>s+(h.controvaloreAttuale||0),0)})).filter(b=>b.value>0);
  const byCat={};all.forEach(h=>{if(h.controvaloreAttuale)byCat[h.categoria]=(byCat[h.categoria]||0)+h.controvaloreAttuale;});
  const catData=Object.entries(byCat).map(([label,value])=>({label,value,color:CAT_COLORS[label]||"#888"})).sort((a,b)=>b.value-a.value);
  const categories=[...new Set(all.map(h=>h.categoria))];

  const handleSort=col=>{if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortCol(col);setSortDir("desc");}};
  const filtered=all.filter(h=>fBank==="all"||h.banca===fBank).filter(h=>fCat==="all"||h.categoria===fCat).filter(h=>!search||h.nome.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>{const va=a[sortCol]??-Infinity,vb=b[sortCol]??-Infinity;return sortDir==="asc"?(va>vb?1:-1):(va<vb?1:-1);});

  const TABS=["dashboard","titoli","analisi","previsioni","azioni"];

  const AIFilter=()=>(
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:"1.25rem",flexWrap:"wrap"}}>
      <span style={{fontSize:12,color:"#888"}}>Analizza:</span>
      {["all",...Object.keys(BANKS)].map(code=>{
        const val=code==="all"?all.filter(h=>!isLiq(h)).reduce((s,h)=>s+(h.controvaloreAttuale||0),0):(bankData[code]||[]).filter(h=>!isLiq(h)).reduce((s,h)=>s+(h.controvaloreAttuale||0),0);
        return(<button key={code} onClick={()=>setBankAI(code)} style={{padding:"5px 12px",borderRadius:20,fontSize:12,cursor:"pointer",border:bankAI===code?`1px solid ${code==="all"?"#888":BANKS[code]?.color}`:"0.5px solid #333",background:bankAI===code?(code==="all"?"#2a2a3e":`${BANKS[code]?.color}20`):"transparent",color:code==="all"?"white":BANKS[code]?.color??"white",fontWeight:bankAI===code?500:400}}>
          {code==="all"?"Tutto":BANKS[code].name} ({fmtEur(val)})
        </button>);
      })}
    </div>
  );

  const LiqBox=()=>aiLiqTotal>0?(<div style={{background:"#1e2235",borderRadius:10,padding:"10px 14px",marginBottom:"1rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
    <span style={{fontSize:13,color:"#888"}}>💰 Liquidità (esclusa dall'analisi)</span>
    <span style={{fontSize:14,fontWeight:500,color:"#A0A0B0"}}>{fmtEur(aiLiqTotal)}</span>
  </div>):null;

  return(<div style={{fontFamily:"system-ui,sans-serif",background:"#12121e",color:"white",minHeight:"100vh",padding:"1rem"}}>
    <div style={{maxWidth:940,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.5rem",flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{margin:0,fontSize:22,fontWeight:500}}>Portfolio Analyzer</h1>
          <div style={{fontSize:12,color:"#888"}}>Profilo bilanciato · {new Date().toLocaleDateString("it-IT")}</div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {TABS.map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"6px 12px",borderRadius:8,border:"0.5px solid #444",background:tab===t?"#1e2235":"transparent",color:tab===t?"white":"#888",cursor:"pointer",fontSize:13,fontWeight:tab===t?500:400,textTransform:"capitalize"}}>{t}</button>)}
        </div>
      </div>
      <div style={{background:"#1e2235",borderRadius:10,padding:"10px 14px",marginBottom:"1.25rem",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:"#888",flexShrink:0}}>🔑 API Key Google:</span>
        <input type={showKey?"text":"password"} value={apiKey} onChange={e=>{setApiKey(e.target.value);window._aiKey=e.target.value;}} placeholder="AIzaSy…" style={{flex:1,minWidth:200,padding:"5px 10px",borderRadius:6,border:"0.5px solid #444",background:"#12121e",color:"white",fontSize:12,fontFamily:"monospace"}}/>
        <button onClick={()=>setShowKey(s=>!s)} style={{padding:"5px 10px",borderRadius:6,border:"0.5px solid #444",background:"transparent",color:"#888",cursor:"pointer",fontSize:12}}>{showKey?"Nascondi":"Mostra"}</button>
        {apiKey?<span style={{fontSize:11,color:"#1D9E75"}}>✓ Key impostata</span>:<span style={{fontSize:11,color:"#888",fontStyle:"italic"}}>Necessaria per Analisi/Previsioni/Azioni</span>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:"1.25rem"}}>
        {Object.keys(BANKS).map(code=><UploadZone key={code} bankCode={code} hasData={!!(bankData[code]?.length)} onData={data=>setBankData(prev=>({...prev,[code]:data}))}/>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:"1.25rem"}}>
        {byBank.map(b=>(
          <div key={b.code} style={{background:"#1e2235",borderRadius:10,padding:"12px 16px",borderLeft:`3px solid ${b.color}`}}>
            <div style={{fontSize:12,color:"#888",marginBottom:3}}>{b.name}</div>
            <div style={{fontSize:18,fontWeight:500,color:b.color}}>{fmtEur(b.value)}</div>
            <div style={{fontSize:11,color:"#888",marginTop:2}}>{totalValue>0?Math.round(b.value/totalValue*100):"—"}% del totale</div>
          </div>
        ))}
      </div>
      <div style={{background:"#1e2235",borderRadius:10,padding:"12px 16px",marginBottom:"1.25rem",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:180}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontWeight:500,fontSize:14}}>{live.lastUpdate?"Stima valore attuale":"Prezzi live (benchmark)"}</span>
            {live.lastUpdate&&<span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:"#EF9F2720",color:"#EF9F27",fontWeight:600}}>STIMA</span>}
          </div>
          {live.lastUpdate?(
            <div style={{display:"flex",gap:12,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:19,fontWeight:500}}>{fmtEur(live.totalStimato)}</span>
              <span style={{fontSize:13,color:(live.totalStimato-totalValue)>=0?"#1D9E75":"#D85A30"}}>{(live.totalStimato-totalValue)>=0?"+":""}{fmt((live.totalStimato-totalValue)/totalValue*100)}% ({(live.totalStimato-totalValue)>=0?"+":""}{fmtEur(live.totalStimato-totalValue)}) dal {DATA_RIF}</span>
            </div>
          ):<div style={{fontSize:12,color:"#888",marginTop:2}}>Stima basata su benchmark dal {DATA_RIF}</div>}
          {live.error&&<div style={{fontSize:11,color:"#EF9F27",marginTop:3}}>{live.error}</div>}
          <div style={{fontSize:10,color:"#666",marginTop:4,fontStyle:"italic"}}>⚠ Non riflette il NAV reale dei fondi.</div>
        </div>
        <button onClick={live.refresh} disabled={live.loading} style={{padding:"8px 14px",borderRadius:8,border:"0.5px solid #444",background:"#2a2a3e",color:"white",cursor:live.loading?"not-allowed":"pointer",fontSize:13,fontWeight:500}}>
          {live.loading?"Aggiornamento…":live.lastUpdate?`↻ ${live.lastUpdate.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})}`:"Carica prezzi live"}
        </button>
      </div>
      {tab==="dashboard"&&<DashboardTab all={all} totalValue={totalValue} totalPL={totalPL} totalPLpct={totalPLpct} byBank={byBank} catData={catData} live={live}/>}
      {tab==="titoli"&&<TitoliTab filtered={filtered} sortCol={sortCol} sortDir={sortDir} handleSort={handleSort} fBank={fBank} setFBank={setFBank} fCat={fCat} setFCat={setFCat} search={search} setSearch={setSearch} categories={categories} live={live} totalValue={totalValue}/>}
      {tab==="analisi"&&<><AIFilter/><LiqBox/><AnalisiTab holdings={aiH} totalValue={aiTotal} byCat={aiByCat} catData={aiCatData}/></>}
      {tab==="previsioni"&&<><AIFilter/><LiqBox/><PrevisioniTab holdings={aiH} totalValue={aiTotal}/></>}
      {tab==="azioni"&&<><AIFilter/><LiqBox/><AzioniTab holdings={aiH} totalValue={aiTotal} byCat={aiByCat}/></>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
