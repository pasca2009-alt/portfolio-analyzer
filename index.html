// Hash semplice (FNV-1a 32 bit) per firma report
const dataHash=(data)=>{
  const s=JSON.stringify(data);
  let h=2166136261;
  for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}
  return(h>>>0).toString(16);
};

const extractJSON=text=>{
  const md=text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if(md){try{return JSON.parse(md[1].trim());}catch(_){}}
  const s=text.indexOf("{");
  if(s!==-1){let d=0;for(let i=s;i<text.length;i++){if(text[i]==="{")d++;else if(text[i]==="}"){ d--;if(d===0)return JSON.parse(text.slice(s,i+1));}}};
  throw new Error("Nessun JSON trovato nella risposta AI");
};

// Detect italiano (almeno 50% di parole italiane comuni nei primi 500 char)
const looksItalian=text=>{
  if(!text||text.length<50)return false;
  const sample=text.slice(0,500).toLowerCase();
  const italianWords=["il","la","di","è","che","un","una","per","con","sono","del","della","gli","le","e ","ed ","ma ","non","più","molto","portafoglio","investimento","azionario","obbligazionario","mercato","rischio"];
  const hits=italianWords.filter(w=>sample.includes(w)).length;
  return hits>=4;
};

// ─── API CALL: Gemini AI ─────────────────────────────────────────────────────
const callAI=async(system,prompt,maxTokens=2000)=>{
  const key=window._aiKey||"";
  if(!key)throw new Error("API Key non inserita — vai in Impostazioni");
  const full=system?system+"\n\n"+prompt:prompt;
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${key}`;
  const body=JSON.stringify({contents:[{parts:[{text:full}]}],generationConfig:{maxOutputTokens:maxTokens,temperature:0.5}});
  let resp;
  try{resp=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body});}
  catch(e){resp=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,{method:"POST",headers:{"Content-Type":"application/json"},body});}
  const data=await resp.json();
  if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
  const text=data.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!text)throw new Error("Risposta AI vuota");
  return text;
};

// ─── PREZZI LIVE: Yahoo + Stooq con doppio check ─────────────────────────────
async function fetchYahoo(ticker){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1mo`;
  const resp=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
  if(!resp.ok)throw new Error(`Yahoo HTTP ${resp.status}`);
  const data=await resp.json();
  const r=data?.chart?.result?.[0];
  if(!r)throw new Error("Yahoo: nessun dato");
  const ts=r.timestamp,closes=r.indicators.quote[0].close;
  const ref=new Date(DATA_RIF).getTime()/1000;
  let ri=0,md=Infinity;
  ts.forEach((t,i)=>{const d=Math.abs(t-ref);if(d<md){md=d;ri=i;}});
  if(closes[ri]==null||closes[closes.length-1]==null)throw new Error("Yahoo: prezzi mancanti");
  return{priceRef:closes[ri],priceNow:closes[closes.length-1],varPct:((closes[closes.length-1]-closes[ri])/closes[ri])*100,source:"Yahoo Finance"};
}

async function fetchStooq(stooqTicker){
  const url=`https://stooq.com/q/d/l/?s=${stooqTicker}&i=d`;
  const resp=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
  if(!resp.ok)throw new Error(`Stooq HTTP ${resp.status}`);
  const text=await resp.text();
  const lines=text.trim().split("\n");
  if(lines.length<2)throw new Error("Stooq: dati vuoti");
  const refDate=DATA_RIF;
  let priceRef=null,priceNow=null;
  // header: Date,Open,High,Low,Close,Volume
  for(let i=1;i<lines.length;i++){
    const cells=lines[i].split(",");
    if(cells.length<5)continue;
    const date=cells[0],close=parseFloat(cells[4]);
    if(isNaN(close))continue;
    if(date<=refDate&&priceRef==null)priceRef=close;
    if(date<=refDate)priceRef=close;
    priceNow=close;
  }
  if(priceRef==null||priceNow==null)throw new Error("Stooq: dati riferimento mancanti");
  return{priceRef,priceNow,varPct:((priceNow-priceRef)/priceRef)*100,source:"Stooq.com"};
}

// Doppio check: chiama entrambe le fonti, verifica concordanza
async function fetchPriceVerified(ticker,stooqTicker){
  const results={ticker,yahoo:null,stooq:null,ok:false,varPct:null,priceNow:null,warning:null,error:null};
  const tasks=[];
  tasks.push(fetchYahoo(ticker).then(r=>{results.yahoo=r;}).catch(e=>{results.yahoo={error:e.message};}));
  if(stooqTicker)tasks.push(fetchStooq(stooqTicker).then(r=>{results.stooq=r;}).catch(e=>{results.stooq={error:e.message};}));
  await Promise.all(tasks);

  const ySuccess=results.yahoo&&!results.yahoo.error;
  const sSuccess=results.stooq&&!results.stooq.error;

  if(!ySuccess&&!sSuccess){
    results.error="Entrambe le fonti hanno fallito";return results;
  }
  if(ySuccess&&sSuccess){
    // Confronta i due prezzi correnti — tolleranza 1%
    const diff=Math.abs(results.yahoo.priceNow-results.stooq.priceNow)/results.yahoo.priceNow*100;
    if(diff<=1){
      results.ok=true;
      results.varPct=(results.yahoo.varPct+results.stooq.varPct)/2;
      results.priceNow=results.yahoo.priceNow;
      results.checkInfo=`Yahoo: ${results.yahoo.priceNow.toFixed(2)} · Stooq: ${results.stooq.priceNow.toFixed(2)} · diff ${diff.toFixed(2)}%`;
    }else{
      results.warning=`Discordanza ${diff.toFixed(2)}% tra Yahoo (${results.yahoo.priceNow.toFixed(2)}) e Stooq (${results.stooq.priceNow.toFixed(2)})`;
      results.varPct=results.yahoo.varPct;
      results.priceNow=results.yahoo.priceNow;
    }
  }else if(ySuccess){
    results.ok=true;
    results.varPct=results.yahoo.varPct;
    results.priceNow=results.yahoo.priceNow;
    results.warning=`Solo Yahoo disponibile (Stooq: ${results.stooq?.error||"n/d"})`;
  }else{
    results.ok=true;
    results.varPct=results.stooq.varPct;
    results.priceNow=results.stooq.priceNow;
    results.warning=`Solo Stooq disponibile (Yahoo: ${results.yahoo?.error||"n/d"})`;
  }
  return results;
}

function useLivePrices(holdings){
  const[prices,setPrices]=useState({});
  const[loading,setLoading]=useState(false);
  const[lastUpdate,setLastUpdate]=useState(null);
  const[error,setError]=useState(null);
  const[checkLog,setCheckLog]=useState([]);
  const refresh=useCallback(async()=>{
    setLoading(true);setError(null);setCheckLog([]);
    const tickers=[...new Set(holdings.map(h=>{
      const b=BENCHMARK[h.categoria];
      return b?.ticker?{ticker:b.ticker,stooq:b.stooq}:null;
    }).filter(Boolean).map(JSON.stringify))].map(JSON.parse);
    const res={},log=[];
    await Promise.all(tickers.map(async ({ticker,stooq})=>{
      const r=await fetchPriceVerified(ticker,stooq);
      res[ticker]=r;
      log.push(r);
    }));
    setPrices(res);setLastUpdate(new Date());setCheckLog(log);
    const errs=log.filter(l=>l.error||l.warning);
    if(errs.length)setError(`${errs.length} avvisi sui prezzi`);
    setLoading(false);
  },[holdings]);
  const enriched=holdings.map(h=>{
    const b=BENCHMARK[h.categoria];
    if(!b?.ticker||!prices[b.ticker]||prices[b.ticker].error)return{...h,stimato:null,varPct:null};
    return{...h,stimato:h.controvaloreAttuale*(1+prices[b.ticker].varPct/100),varPct:prices[b.ticker].varPct};
  });
  const totalStimato=enriched.reduce((s,h)=>s+(h.stimato??h.controvaloreAttuale),0);
  return{enriched,loading,lastUpdate,error,refresh,totalStimato,checkLog};
}

// ─── VALIDAZIONE DATI LOCALI ─────────────────────────────────────────────────
function validateHoldings(holdings){
  const errors=[],warnings=[],info=[];
  const required=["nome","controvaloreAttuale","categoria","banca","prezzoCarico","plusMinus"];

  // Per ogni titolo non-liquido, controlla campi obbligatori
  holdings.filter(h=>!isLiq(h)).forEach(h=>{
    required.forEach(field=>{
      if(h[field]==null||h[field]===undefined){
        errors.push({titolo:h.nome,banca:h.banca,campo:field,problema:"campo mancante"});
      }
    });
    // Almeno uno tra rendimentoAnnuo o rendimentoTotale deve essere presente
    if(h.rendimentoAnnuo==null&&h.rendimentoTotale==null){
      errors.push({titolo:h.nome,banca:h.banca,campo:"rendimento",problema:"manca sia rendimentoAnnuo che rendimentoTotale"});
    }
    // Sanity check valori
    if(h.controvaloreAttuale!=null&&h.controvaloreAttuale<=0)
      errors.push({titolo:h.nome,banca:h.banca,campo:"controvaloreAttuale",problema:`valore non valido (${h.controvaloreAttuale})`});
    if(h.quantita!=null&&h.quantita<=0)
      errors.push({titolo:h.nome,banca:h.banca,campo:"quantita",problema:`quantità non valida (${h.quantita})`});
    if(h.prezzoCarico!=null&&h.prezzoCarico<=0)
      errors.push({titolo:h.nome,banca:h.banca,campo:"prezzoCarico",problema:`prezzo non valido (${h.prezzoCarico})`});
    // Cross-check plusMinus
    if(h.prezzoCarico!=null&&h.quantita!=null&&h.controvaloreAttuale!=null&&h.plusMinus!=null){
      const calcolato=h.controvaloreAttuale-(h.prezzoCarico*h.quantita);
      const diff=Math.abs(calcolato-h.plusMinus);
      const tol=Math.max(50,Math.abs(h.controvaloreAttuale)*0.005); // tolleranza 0.5% o 50€
      if(diff>tol){
        warnings.push({titolo:h.nome,banca:h.banca,campo:"plusMinus",problema:`incoerente: dichiarato ${fmtEur(h.plusMinus)}, calcolato ${fmtEur(calcolato)} (diff ${fmtEur(diff)})`});
      }
    }
  });

  // Coerenza totali
  const total=holdings.reduce((s,h)=>s+(h.controvaloreAttuale||0),0);
  const sumByBank=Object.keys(BANKS).map(b=>holdings.filter(h=>h.banca===b).reduce((s,h)=>s+(h.controvaloreAttuale||0),0)).reduce((a,b)=>a+b,0);
  if(Math.abs(total-sumByBank)>1)
    errors.push({campo:"totali",problema:`somma per banca (${fmtEur(sumByBank)}) non coincide con totale (${fmtEur(total)})`});

  // Freschezza dati per banca
  const today=new Date();
  Object.entries(BANKS).forEach(([code,bank])=>{
    const hasData=holdings.some(h=>h.banca===code);
    if(!hasData)return;
    const refDate=new Date(bank.dataRif);
    const daysDiff=Math.floor((today-refDate)/(1000*60*60*24));
    if(daysDiff>30)
      warnings.push({banca:code,campo:"freschezza",problema:`dati ${bank.name} aggiornati ${daysDiff} giorni fa (${bank.dataRif})`});
    info.push({banca:code,info:`Dati ${bank.name}: ${bank.dataRif} (${daysDiff} giorni fa)`});
  });

  // Conteggio totale
  info.push({info:`Totale titoli: ${holdings.length} (${holdings.filter(h=>!isLiq(h)).length} non-liquidi)`});

  return{errors,warnings,info,ok:errors.length===0};
}

// ─── PREFLIGHT CHECKS — verifica step-by-step prima di generare AI ─────────────
// Restituisce un async generator che produce risultati di ogni step uno per uno
// Ogni yield: {step, total, name, status: "running"|"ok"|"warning"|"error", details}
// Se uno step ritorna "error", il chiamante deve fermare l'esecuzione
async function* runPreflightChecks({holdings,bancaLabel,apiKey}){
  const totalSteps=8;
  let stepNum=0;

  // ── STEP 1: Presenza titoli ───────────────────────────────────────────────
  stepNum++;
  yield{step:stepNum,total:totalSteps,name:"Presenza titoli",status:"running",details:[]};
  await new Promise(r=>setTimeout(r,150));
  const nonLiq=holdings.filter(h=>!isLiq(h));
  if(nonLiq.length===0){
    yield{step:stepNum,total:totalSteps,name:"Presenza titoli",status:"error",
      details:[`Nessun titolo non-liquido trovato per "${bancaLabel}"`,"💡 Cambia il filtro banca o carica i dati"],blocking:true};
    return;
  }
  yield{step:stepNum,total:totalSteps,name:"Presenza titoli",status:"ok",
    details:[`${nonLiq.length} titoli non-liquidi trovati (${holdings.filter(isLiq).length} liquidità esclusa)`]};

  // ── STEP 2: Completezza campi obbligatori ─────────────────────────────────
  stepNum++;
  yield{step:stepNum,total:totalSteps,name:"Completezza campi",status:"running",details:[]};
  await new Promise(r=>setTimeout(r,200));
  const required=["nome","banca","categoria","quantita","prezzoCarico","controvaloreAttuale","plusMinus","fonte"];
  const incomplete=[];
  nonLiq.forEach(h=>{
    const missing=[];
    required.forEach(f=>{if(h[f]==null||h[f]==="")missing.push(f);});
    if(h.rendimentoAnnuo==null&&h.rendimentoTotale==null)missing.push("rendimento (annuo/totale)");
    if(missing.length)incomplete.push({nome:h.nome,banca:h.banca,missing});
  });
  if(incomplete.length>0){
    yield{step:stepNum,total:totalSteps,name:"Completezza campi",status:"error",
      details:[`${incomplete.length} titoli con campi mancanti:`,
        ...incomplete.slice(0,8).map(t=>`• ${t.nome.slice(0,40)} [${t.banca}]: manca ${t.missing.join(", ")}`),
        incomplete.length>8?`... e altri ${incomplete.length-8}`:"",
        "","💡 Aggiorna i dati dalla tab Impostazioni"].filter(Boolean),blocking:true};
    return;
  }
  yield{step:stepNum,total:totalSteps,name:"Completezza campi",status:"ok",
    details:[`Tutti i ${nonLiq.length} titoli hanno tutti i campi obbligatori`]};

  // ── STEP 3: Coerenza numerica per ogni titolo ─────────────────────────────
  stepNum++;
  yield{step:stepNum,total:totalSteps,name:"Coerenza numerica",status:"running",details:[]};
  await new Promise(r=>setTimeout(r,200));
  const incoerenze=[];
  nonLiq.forEach(h=>{
    if(h.quantita<=0)incoerenze.push({nome:h.nome,problema:`quantità non valida (${h.quantita})`});
    if(h.prezzoCarico<=0)incoerenze.push({nome:h.nome,problema:`PMC non valido (${h.prezzoCarico})`});
    if(h.controvaloreAttuale<=0)incoerenze.push({nome:h.nome,problema:`controvalore non valido (${h.controvaloreAttuale})`});
    // CTV ≈ Q × prezzoAttuale (se prezzoAttuale presente)
    if(h.prezzoAttuale!=null){
      const cvCalc=h.quantita*h.prezzoAttuale;
      const diff=Math.abs(cvCalc-h.controvaloreAttuale);
      const tol=Math.max(1,h.controvaloreAttuale*0.005);
      if(diff>tol)incoerenze.push({nome:h.nome,problema:`CTV (${fmtEur(h.controvaloreAttuale)}) ≠ Q × Prezzo (${fmtEur(cvCalc)}), diff ${fmtEur(diff)}`});
    }
    // P&L ≈ CV - (Q × PMC)
    const plCalc=h.controvaloreAttuale-(h.quantita*h.prezzoCarico);
    const diff=Math.abs(plCalc-h.plusMinus);
    const tol=Math.max(50,Math.abs(h.controvaloreAttuale)*0.005);
    if(diff>tol)incoerenze.push({nome:h.nome,problema:`P&L (${fmtEur(h.plusMinus)}) ≠ CV - Q×PMC (${fmtEur(plCalc)}), diff ${fmtEur(diff)}`});
  });
  if(incoerenze.length>0){
    yield{step:stepNum,total:totalSteps,name:"Coerenza numerica",status:"error",
      details:[`${incoerenze.length} incoerenze numeriche:`,
        ...incoerenze.slice(0,8).map(i=>`• ${i.nome.slice(0,40)}: ${i.problema}`),
        incoerenze.length>8?`... e altri ${incoerenze.length-8}`:"",
        "","💡 Controlla i dati dalla tab Impostazioni → Controllo dati"].filter(Boolean),blocking:true};
    return;
  }
  yield{step:stepNum,total:totalSteps,name:"Coerenza numerica",status:"ok",
    details:[`Tutti i titoli passano i controlli numerici (CTV = Q×Prezzo, P&L = CV - Q×PMC)`]};

  // ── STEP 4: Coerenza totali per banca ────────────────────────────────────
  stepNum++;
  yield{step:stepNum,total:totalSteps,name:"Coerenza totali",status:"running",details:[]};
  await new Promise(r=>setTimeout(r,150));
  const totale=holdings.reduce((s,h)=>s+(h.controvaloreAttuale||0),0);
  const sumByBank={};
  const orfani=[];
  holdings.forEach(h=>{
    if(!BANKS[h.banca])orfani.push(h.nome);
    else sumByBank[h.banca]=(sumByBank[h.banca]||0)+(h.controvaloreAttuale||0);
  });
  const sumAll=Object.values(sumByBank).reduce((a,b)=>a+b,0);
  const errs4=[];
  if(orfani.length>0)errs4.push(`Titoli con banca non riconosciuta: ${orfani.slice(0,3).join(", ")}`);
  if(Math.abs(totale-sumAll)>1)errs4.push(`Somma per banca (${fmtEur(sumAll)}) ≠ totale (${fmtEur(totale)})`);
  if(errs4.length>0){
    yield{step:stepNum,total:totalSteps,name:"Coerenza totali",status:"error",
      details:errs4,blocking:true};
    return;
  }
  const dettagli4=Object.entries(sumByBank).map(([b,v])=>`• ${BANKS[b].name}: ${fmtEur(v)}`);
  dettagli4.push(`Totale: ${fmtEur(totale)}`);
  yield{step:stepNum,total:totalSteps,name:"Coerenza totali",status:"ok",details:dettagli4};

  // ── STEP 5: Coerenza categorie ────────────────────────────────────────────
  stepNum++;
  yield{step:stepNum,total:totalSteps,name:"Coerenza categorie",status:"running",details:[]};
  await new Promise(r=>setTimeout(r,150));
  const catSconosciute=[];
  const sumByCat={};
  holdings.forEach(h=>{
    if(!CAT_COLORS[h.categoria])catSconosciute.push({nome:h.nome,cat:h.categoria});
    sumByCat[h.categoria]=(sumByCat[h.categoria]||0)+(h.controvaloreAttuale||0);
  });
  if(catSconosciute.length>0){
    yield{step:stepNum,total:totalSteps,name:"Coerenza categorie",status:"error",
      details:[`Categorie non riconosciute:`,
        ...catSconosciute.slice(0,5).map(c=>`• ${c.nome.slice(0,40)}: "${c.cat}"`)],blocking:true};
    return;
  }
  yield{step:stepNum,total:totalSteps,name:"Coerenza categorie",status:"ok",
    details:[`${Object.keys(sumByCat).length} categorie tutte valide`]};

  // ── STEP 6: Freschezza dati (warning) ─────────────────────────────────────
  stepNum++;
  yield{step:stepNum,total:totalSteps,name:"Freschezza dati",status:"running",details:[]};
  await new Promise(r=>setTimeout(r,150));
  const today=new Date();
  const stale=[];
  const dett6=[];
  Object.entries(BANKS).forEach(([code,bank])=>{
    const hasData=holdings.some(h=>h.banca===code);
    if(!hasData)return;
    const refDate=new Date(bank.dataRif);
    const days=Math.floor((today-refDate)/(1000*60*60*24));
    if(days>30)stale.push(`${bank.name}: ${days} giorni (${bank.dataRif})`);
    dett6.push(`• ${bank.name}: ${bank.dataRif} (${days} giorni fa)`);
  });
  yield{step:stepNum,total:totalSteps,name:"Freschezza dati",
    status:stale.length>0?"warning":"ok",details:stale.length>0?["⚠ Dati più vecchi di 30 giorni:",...stale.map(s=>`• ${s}`),"","Si procede comunque (warning)"]:dett6};

  // ── STEP 7: API Key Gemini ────────────────────────────────────────────────
  stepNum++;
  yield{step:stepNum,total:totalSteps,name:"API Gemini",status:"running",details:["Test rapido con prompt 'OK'..."]};
  if(!apiKey){
    yield{step:stepNum,total:totalSteps,name:"API Gemini",status:"error",
      details:["✗ API Key non inserita","","💡 Vai in Impostazioni e inserisci la key"],blocking:true};
    return;
  }
  const test=await testGeminiKey();
  if(!test.ok){
    yield{step:stepNum,total:totalSteps,name:"API Gemini",status:"error",
      details:[`✗ Test fallito: ${test.error}`,"","💡 Verifica la API Key in Impostazioni"],blocking:true};
    return;
  }
  yield{step:stepNum,total:totalSteps,name:"API Gemini",status:"ok",
    details:[`✓ Key valida — risposta: "${test.response}"`]};

  // ── STEP 8: Tutto pronto ──────────────────────────────────────────────────
  stepNum++;
  yield{step:stepNum,total:totalSteps,name:"Pronto per generazione",status:"ok",
    details:[`Tutti i controlli superati per ${nonLiq.length} titoli (${bancaLabel})`,"Generazione AI in corso..."]};
}

// Validazione risposta Gemini per Previsioni
function validatePrevisioniJSON(json,holdings){
  const errors=[],warnings=[];
  if(!json.contesto||!json.base||!json.ottimistico||!json.pessimistico||!json.raccomandazioni)
    errors.push("Struttura JSON incompleta");
  ["base","ottimistico","pessimistico"].forEach(k=>{
    if(!json[k])return;
    if(typeof json[k].rendimento!=="number")errors.push(`Rendimento ${k} non numerico`);
    if(json[k].rendimento>50||json[k].rendimento<-50)
      warnings.push(`Rendimento ${k} (${json[k].rendimento}%) molto fuori scala`);
  });
  if(json.ottimistico&&json.base&&json.pessimistico){
    if(!(json.pessimistico.rendimento<=json.base.rendimento&&json.base.rendimento<=json.ottimistico.rendimento))
      errors.push("Scenari non ordinati: pessimistico ≤ base ≤ ottimistico");
  }
  if(json.contesto&&!looksItalian(json.contesto))warnings.push("Risposta forse non in italiano");
  return{errors,warnings,ok:errors.length===0};
}

// Validazione risposta Gemini per Azioni
function validateAzioniJSON(json,holdings){
  const errors=[],warnings=[];
  if(!json.titoli||!Array.isArray(json.titoli))errors.push("Campo 'titoli' mancante o non array");
  if(json.titoli){
    const nomi=holdings.map(h=>h.nome.toLowerCase());
    json.titoli.forEach(t=>{
      if(!t.nome||!t.azione||!t.priorita)
        errors.push(`Titolo con campi mancanti: ${JSON.stringify(t).slice(0,80)}`);
      if(t.azione&&!["vendi","monitora","mantieni","incrementa","switch"].includes(t.azione))
        errors.push(`Azione non valida: "${t.azione}" per ${t.nome}`);
      if(t.priorita&&!["alta","media","bassa"].includes(t.priorita))
        errors.push(`Priorità non valida: "${t.priorita}" per ${t.nome}`);
      // Verifica esistenza titolo
      const found=nomi.some(n=>n===t.nome?.toLowerCase()||n.startsWith(t.nome?.toLowerCase().slice(0,20)));
      if(!found)warnings.push(`Titolo non riconosciuto nel portafoglio: "${t.nome}"`);
    });
  }
  if(json.sommario&&!looksItalian(json.sommario))warnings.push("Risposta forse non in italiano");
  return{errors,warnings,ok:errors.length===0};
}

// ─── PIE CHART ───────────────────────────────────────────────────────────────
function PieChart({data,size=110}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return null;
  let cum=-Math.PI/2;
  const R=size/2-6,cx=size/2,cy=size/2;
  const slices=data.map(d=>{
    const a=(d.value/total)*2*Math.PI;
    const x1=cx+R*Math.cos(cum),y1=cy+R*Math.sin(cum);
    cum+=a;
    return{...d,x1,y1,x2:cx+R*Math.cos(cum),y2:cy+R*Math.sin(cum),large:a>Math.PI?1:0};
  });
  return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    {slices.map((s,i)=><path key={i} d={`M${cx} ${cy}L${s.x1} ${s.y1}A${R} ${R} 0 ${s.large} 1 ${s.x2} ${s.y2}Z`} fill={s.color} opacity={0.9} stroke="#00000020" strokeWidth={1}/>)}
    <circle cx={cx} cy={cy} r={R*0.42} fill="#12121e"/>
  </svg>);
}

  return(<div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onCancel}>

      <div style={{fontSize:16,fontWeight:600,marginBottom:8,color:danger?"#D85A30":"white"}}>{title}</div>
      <div style={{fontSize:13,color:"#ccc",marginBottom:20,lineHeight:1.6}}>{message}</div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <button onClick={onCancel} style={{padding:"9px 16px",borderRadius:8,border:"0.5px solid #444",background:"transparent",color:"#aaa",cursor:"pointer",fontSize:13}}>Annulla</button>
        <button onClick={onConfirm} style={{padding:"9px 16px",borderRadius:8,border:"none",background:danger?"#D85A30":"#1D9E75",color:"white",cursor:"pointer",fontSize:13,fontWeight:500}}>Conferma</button>
      </div>
    </div>
  </div>);
}

// ─── IMPOSTAZIONI ────────────────────────────────────────────────────────────
function ImpostazioniTab({bankData,setBankData,apiKey,setApiKey,showKey,setShowKey,byBank,totalValue,live,validation,onProblems}){
  const[checkRunning,setCheckRunning]=useState(false);
  const[checkReport,setCheckReport]=useState(null);
  const[confirm,setConfirm]=useState(null);
  const[csvPending,setCsvPending]=useState(null);

  // Notifica problemi al parent (per badge rosso)
  useEffect(()=>{
    if(checkReport){
      const hasProblems=checkReport.sections.some(s=>s.level==="red");
      onProblems&&onProblems(hasProblems);
    }
  },[checkReport,onProblems]);

  const runCheck=async()=>{
    setCheckRunning(true);
    const sections=[];
    const all=Object.values(bankData).flat();

    // 1. Integrità dati locali
    const v=validateHoldings(all);
    sections.push({
      title:"Integrità dati locali",
      level:v.errors.length>0?"red":(v.warnings.length>0?"yellow":"green"),
      details:[
        ...v.info.map(i=>`✓ ${i.info||i.banca}`),
        ...v.warnings.map(w=>`⚠ ${w.titolo||w.banca||""}: ${w.problema}`),
        ...v.errors.map(e=>`✗ ${e.titolo||e.banca||""}: ${e.problema}`),
      ],
    });

    // 2. Test prezzi live (Yahoo + Stooq)
    const tickerTest=[{ticker:"SPY",stooq:"spy.us"},{ticker:"AGG",stooq:"agg.us"}];
    const priceResults=[];
    for(const t of tickerTest){
      try{const r=await fetchPriceVerified(t.ticker,t.stooq);priceResults.push(r);}
      catch(e){priceResults.push({ticker:t.ticker,error:e.message});}
    }
    const allOk=priceResults.every(p=>p.ok&&!p.warning);
    const someOk=priceResults.some(p=>p.ok);
    sections.push({
      title:"Connessione prezzi (Yahoo + Stooq)",
      level:allOk?"green":(someOk?"yellow":"red"),
      details:priceResults.map(p=>{
        if(p.error)return `✗ ${p.ticker}: ${p.error}`;
        if(p.warning)return `⚠ ${p.ticker}: ${p.warning}`;
        return `✓ ${p.ticker}: ${p.checkInfo}`;
      }),
    });

    // 3. Test API Gemini
    if(apiKey){
      const g=await testGeminiKey();
      sections.push({
        title:"API Gemini",
        level:g.ok?"green":"red",
        details:[g.ok?`✓ Key valida — risposta: "${g.response}"`:`✗ ${g.error}`],
      });
    }else{
      sections.push({
        title:"API Gemini",
        level:"yellow",
        details:["⚠ API Key non inserita — Analisi/Previsioni/Azioni non funzioneranno"],
      });
    }

    setCheckReport({timestamp:new Date(),sections});
    setCheckRunning(false);
  };

  const exportBackup=()=>{
    const backup={version:APP_VERSION,timestamp:new Date().toISOString(),data:bankData};
    const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`portfolio_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  };

  const importBackup=f=>{
    const r=new FileReader();
    r.onload=e=>{
      try{
        const b=JSON.parse(e.target.result);
        if(!b.data||typeof b.data!=="object")throw new Error("Formato non valido");
        setConfirm({
          title:"Importa backup",
          message:`Sostituire i dati attuali con quelli del backup del ${b.timestamp?.slice(0,10)}? Questa azione non può essere annullata.`,
          danger:true,
          onConfirm:()=>{setBankData(b.data);setConfirm(null);},
        });
      }catch{alert("File backup non valido");}
    };
    r.readAsText(f,"UTF-8");
  };

  const parseCSV=text=>{
    const lines=text.trim().split("\n");
    const header=lines[0].split(";").map(h=>h.trim().replace(/^\uFEFF/,""));
    return lines.slice(1).map(line=>{
      const vals=line.split(";");const o={};
      header.forEach((h,i)=>{o[h]=vals[i]?.trim()||"";});
      const n=s=>s?parseFloat(s.replace(/\./g,"").replace(",","."))||null:null;
      return{nome:o.Nome||o.nome||"",isin:o.ISIN||o.isin||null,quantita:n(o["Quantità"]||o.quantita),prezzoCarico:n(o.Prezzo_Carico||o.prezzo_carico),controvaloreAttuale:n(o.Prezzo_Attuale||o.prezzo_attuale)||n(o.Controvalore||o.controvalore),categoria:o.Categoria||o.categoria||"Altro",banca:null,plusMinus:n(o.PlusMinus||o.plusMinus),rendimentoAnnuo:n(o.Rendimento_Annuo||o.rendimentoAnnuo||o.Rendimento||o.rendimento),rendimentoTotale:n(o.Rendimento_Totale||o.rendimentoTotale),fonte:`Import CSV ${new Date().toLocaleDateString("it-IT")}`};
    }).filter(r=>r.nome);
  };

  const handleCSV=(code,f)=>{
    const r=new FileReader();
    r.onload=e=>{
      try{
        const data=parseCSV(e.target.result).map(h=>({...h,banca:code}));
        setCsvPending({code,data});
        setConfirm({
          title:`Sovrascrivere dati ${BANKS[code].name}?`,
          message:`Stai per sostituire ${(bankData[code]||[]).length} titoli esistenti con ${data.length} nuovi titoli. L'azione non può essere annullata. Vuoi continuare?`,
          danger:true,
          onConfirm:()=>{setBankData(prev=>({...prev,[code]:data}));setCsvPending(null);setConfirm(null);},
        });
      }catch{alert("Errore CSV");}
    };
    r.readAsText(f,"UTF-8");
  };

  const v=validation;
  const hasLocalProblems=v&&(v.errors.length>0||v.warnings.length>0);

  return(<div>
    {/* API Key */}
    <Section title="API Key Google (Gemini)">
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <div style={{display:"flex",gap:8}}>
          <input type={showKey?"text":"password"} value={apiKey} onChange={e=>{setApiKey(e.target.value);window._aiKey=e.target.value;}} placeholder="AIzaSy…" style={{flex:1,padding:"10px 12px",borderRadius:8,border:"0.5px solid #444",background:"#12121e",color:"white",fontSize:13,fontFamily:"monospace"}}/>
          <button onClick={()=>setShowKey(s=>!s)} style={{padding:"10px 14px",borderRadius:8,border:"0.5px solid #444",background:"#2a2a3e",color:"#aaa",cursor:"pointer",fontSize:13}}>{showKey?"Nascondi":"Mostra"}</button>
        </div>
        {apiKey?<div style={{fontSize:12,color:"#1D9E75"}}>✓ Key impostata</div>:<div style={{fontSize:12,color:"#888",fontStyle:"italic"}}>Necessaria per Analisi, Previsioni e Azioni</div>}
      </div>
    </Section>

    {/* Controllo dati */}
    <Section title="Controllo dati e affidabilità">
      <div style={{fontSize:12,color:"#aaa",marginBottom:12,lineHeight:1.6}}>
        Verifica integrità dati, coerenza numerica, freschezza, connessione prezzi e API. Esegui prima di generare report AI.
      </div>
      <button onClick={runCheck} disabled={checkRunning} style={{width:"100%",padding:"12px",borderRadius:10,border:"0.5px solid #444",background:"#2a2a3e",color:"white",cursor:checkRunning?"not-allowed":"pointer",fontSize:14,fontWeight:500,marginBottom:checkReport?12:0}}>
        {checkRunning?"Controllo in corso…":"🛡 Esegui controllo dati"}
      </button>
      {checkReport&&(<div>
        <div style={{fontSize:11,color:"#888",marginBottom:10,fontStyle:"italic"}}>Ultimo controllo: {checkReport.timestamp.toLocaleString("it-IT")}</div>
        {checkReport.sections.map((s,i)=>{
          const cfg={green:{color:"#1D9E75",icon:"🟢"},yellow:{color:"#EF9F27",icon:"🟡"},red:{color:"#D85A30",icon:"🔴"}}[s.level];
          return(<div key={i} style={{marginBottom:10,padding:"10px 12px",borderRadius:8,background:"#12121e",borderLeft:`3px solid ${cfg.color}`}}>
            <div style={{fontSize:13,fontWeight:600,color:cfg.color,marginBottom:6}}>{cfg.icon} {s.title}</div>
            {s.details.map((d,j)=><div key={j} style={{fontSize:11,color:"#aaa",lineHeight:1.6,marginLeft:4}}>{d}</div>)}
          </div>);
        })}
      </div>)}
    </Section>

    {/* Per banca */}
    <Section title="Portafoglio per banca">
      {byBank.map(b=>(
        <div key={b.code} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"0.5px solid #2a2a3e"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:b.color}}/>
            <span style={{fontSize:14,fontWeight:500}}>{b.name}</span>
            <span style={{fontSize:10,color:"#666"}}>{BANKS[b.code]?.dataRif}</span>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:16,fontWeight:600,color:b.color}}>{fmtEur(b.value)}</div>
            <div style={{fontSize:11,color:"#888"}}>{totalValue>0?Math.round(b.value/totalValue*100):0}%</div>
          </div>
        </div>
      ))}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0 0"}}>
        <span style={{fontSize:14,fontWeight:600,color:"#888"}}>Totale</span>
        <span style={{fontSize:18,fontWeight:700}}>{fmtEur(totalValue)}</span>
      </div>
    </Section>

    {/* Prezzi live */}
    <Section title="Prezzi live (doppio check Yahoo + Stooq)">
      <div style={{fontSize:12,color:"#888",marginBottom:12}}>Stima basata su benchmark ETF dal {DATA_RIF}</div>
      {live.lastUpdate&&(
        <div style={{marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:500}}>Stima attuale: <span style={{color:"#1D9E75"}}>{fmtEur(live.totalStimato)}</span></div>
          <div style={{fontSize:12,color:(live.totalStimato-totalValue)>=0?"#1D9E75":"#D85A30",marginTop:4}}>
            {(live.totalStimato-totalValue)>=0?"+":""}{fmt((live.totalStimato-totalValue)/totalValue*100)}% dal {DATA_RIF}
          </div>
          <div style={{fontSize:11,color:"#EF9F27",marginTop:4}}>⚠ Non riflette il NAV reale dei fondi</div>
        </div>
      )}
      {live.error&&<div style={{fontSize:12,color:"#EF9F27",marginBottom:8}}>{live.error}</div>}
      <button onClick={live.refresh} disabled={live.loading} style={{width:"100%",padding:"12px",borderRadius:10,border:"0.5px solid #444",background:"#2a2a3e",color:"white",cursor:live.loading?"not-allowed":"pointer",fontSize:14,fontWeight:500}}>
        {live.loading?"Aggiornamento…":live.lastUpdate?`↻ Aggiorna (${live.lastUpdate.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})})`:"Carica prezzi live"}
      </button>
      {live.checkLog?.length>0&&(<div style={{marginTop:12,fontSize:11,color:"#aaa"}}>
        <div style={{fontWeight:600,marginBottom:4}}>Log verifica:</div>
        {live.checkLog.map((c,i)=>{
          const ico=c.error?"✗":(c.warning?"⚠":"✓");
          const col=c.error?"#D85A30":(c.warning?"#EF9F27":"#1D9E75");
          return(<div key={i} style={{color:col,lineHeight:1.5}}>{ico} {c.ticker}: {c.checkInfo||c.warning||c.error}</div>);
        })}
      </div>)}
    </Section>

    {/* Backup / Import */}
    <Section title="Backup dati">

// ─── ANALISI AI ──────────────────────────────────────────────────────────────
function AnalisiTab({holdings,totalValue,byCat,catData,bancaLabel,liveCheckLog,localValidation,apiKey}){
  const[analysis,setAnalysis]=useState(null);
  const[loading,setLoading]=useState(false);
  const[storico,setStorico]=useState(()=>{try{return JSON.parse(localStorage.getItem("portfolio_analisi")||"[]");}catch{return[];}});
  const[viewIdx,setViewIdx]=useState(null);
  const[error,setError]=useState(null);
  const[pendingResult,setPendingResult]=useState(null);
  const[confirm,setConfirm]=useState(null);
  const[preflightSteps,setPreflightSteps]=useState([]);

  const renderMd=t=>(t||"").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>");

  const exportPDF=entry=>{
    const checksHTML=(entry.controlli||[]).map(c=>`<div>• ${c}</div>`).join("");
    document.getElementById("print-area").innerHTML=`
      <h2>Analisi Portafoglio — ${entry.banca}</h2>
      <div class="pm">Data: ${entry.data} · Affidabilità: ${entry.affidabilita==="green"?"🟢 Affidabile":entry.affidabilita==="yellow"?"🟡 Parziale":"🔴 Inaffidabile"}</div>
      ${entry.controlli?.length?`<div class="checks"><strong>✓ Controlli eseguiti</strong>${checksHTML}</div>`:""}
      <div class="pb">${renderMd(entry.testo)}</div>
      <div class="pf">Portfolio Analyzer v${APP_VERSION} · ${new Date().toLocaleDateString("it-IT")} · Solo scopo informativo, non costituisce consulenza finanziaria.</div>`;
    window.print();
  };

  const saveS=(text,controlli,affidabilita,hash)=>{
    const e={id:Date.now(),data:new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}),banca:bancaLabel,testo:text,controlli,affidabilita,hash};
    const u=[e,...storico].slice(0,5);setStorico(u);localStorage.setItem("portfolio_analisi",JSON.stringify(u));
  };
  const delE=id=>{const u=storico.filter(e=>e.id!==id);setStorico(u);localStorage.setItem("portfolio_analisi",JSON.stringify(u));setViewIdx(null);};
  const askDelAll=()=>setConfirm({title:"Cancellare tutto lo storico?",message:`Stai per eliminare ${storico.length} analisi salvate. L'azione non può essere annullata.`,danger:true,onConfirm:()=>{setStorico([]);localStorage.removeItem("portfolio_analisi");setViewIdx(null);setConfirm(null);}});

  const run=async()=>{
    setError(null);setAnalysis(null);setViewIdx(null);setPendingResult(null);setPreflightSteps([]);setLoading(true);

    // ── PREFLIGHT STEP-BY-STEP ──
    const collectedSteps=[];
    let blocked=false;
    for await(const step of runPreflightChecks({holdings,bancaLabel,apiKey})){
      // Aggiorna l'ultimo step se ha lo stesso numero, altrimenti aggiungi
      const idx=collectedSteps.findIndex(s=>s.step===step.step);
      if(idx>=0)collectedSteps[idx]=step;
      else collectedSteps.push(step);
      setPreflightSteps([...collectedSteps]);
      if(step.status==="error"){
        setError({title:`⛔ Step ${step.step} fallito: ${step.name}`,details:step.details});
        blocked=true;break;
      }
    }
    if(blocked){setLoading(false);return;}

    // ── COSTRUZIONE CONTROLLI PER REPORT ──
    const controlli=collectedSteps.filter(s=>s.status==="ok"||s.status==="warning").map(s=>{
      const icon=s.status==="warning"?"⚠":"✓";
      return `${icon} ${s.name}: ${s.details[0]||"verificato"}`;
    });
    if(liveCheckLog?.length){
      const checked=liveCheckLog.filter(c=>c.ok&&!c.warning);
      if(checked.length)controlli.push(`✓ Prezzi live (Yahoo+Stooq): ${checked.map(c=>c.ticker).join(", ")} · diff <1%`);
    }

    // ── GENERAZIONE AI ──
    const summary=holdings.filter(h=>h.controvaloreAttuale>0).map(h=>{
      const ri=getRendInfo(h);
      const rendStr=ri.tipo==="none"?"rend n/d":(ri.tipo==="annuo"?`rend annuo ${fmtPct(ri.valore)}`:`rend totale dall'acquisto ${fmtPct(ri.valore)}`);
      return `${h.nome.slice(0,40)} [${h.banca}] (${h.categoria}): ${fmtEur(h.controvaloreAttuale)}, P&L ${fmtEur(h.plusMinus)}, ${rendStr}`;
    }).join("\n");
    try{
      const text=await callAI(null,`Sei un consulente finanziario italiano esperto. Rispondi in italiano. Analizza questo portafoglio BILANCIATO (${bancaLabel}, totale ${fmtEur(totalValue)}).\n\nNOTA IMPORTANTE: per i titoli Mediolanum il rendimento è ANNUALIZZATO (% annuo), per i titoli BPER è TOTALE dall'acquisto (non annualizzato). Tienine conto nell'analisi.\n\nTITOLI:\n${summary}\n\nFornisci:\n1. **Valutazione generale**\n2. **Rischi principali** (3 punti)\n3. **Opportunità** (3 punti)\n4. **Raccomandazioni** per profilo bilanciato\n5. **Previsione 2026**`);
      if(!text||!text.trim())throw new Error("Risposta vuota");
      const isItalian=looksItalian(text);
      let affidabilita="green";
      const finalControlli=[...controlli];
      if(!isItalian){affidabilita="yellow";finalControlli.push("⚠ Risposta AI forse non in italiano");}
      if(collectedSteps.some(s=>s.status==="warning"))affidabilita="yellow";

      const hash=dataHash(holdings.map(h=>({n:h.nome,c:h.controvaloreAttuale,p:h.plusMinus,r:h.rendimentoAnnuo,rt:h.rendimentoTotale})));
      finalControlli.push(`Firma dati: ${hash}`);

      setPendingResult({text,controlli:finalControlli,affidabilita,hash});
    }catch(e){setError({title:"Errore generazione AI",details:[`✗ ${e.message}`,"","💡 Riprova; se persiste, verifica la API Key"]});}
    setLoading(false);
  };

  const confirmSave=()=>{
    if(!pendingResult)return;
    saveS(pendingResult.text,pendingResult.controlli,pendingResult.affidabilita,pendingResult.hash);
    setAnalysis(pendingResult);
    setPendingResult(null);
  };

  const display=viewIdx!==null?storico[viewIdx]:(analysis||pendingResult);
  const dataChanged=viewIdx!==null&&storico[viewIdx]?.hash&&storico[viewIdx].hash!==dataHash(holdings.map(h=>({n:h.nome,c:h.controvaloreAttuale,p:h.plusMinus,r:h.rendimentoAnnuo,rt:h.rendimentoTotale})));

  return(<div>
    <Disclaimer/>
    <Section>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:display||error?16:0}}>
        <div><div style={{fontWeight:600,fontSize:15}}>Analisi AI</div><div style={{fontSize:11,color:"#888"}}>Validazione + Gemini</div></div>
        <button onClick={run} disabled={loading||pendingResult} style={{padding:"10px 16px",borderRadius:10,border:"0.5px solid #444",background:"#2a2a3e",color:"white",cursor:(loading||pendingResult)?"not-allowed":"pointer",fontSize:13,fontWeight:500}}>{loading?"In corso…":analysis?"Rigenera":"Avvia analisi"}</button>
      </div>
      {(loading||error||preflightSteps.length>0)&&preflightSteps.length>0&&!pendingResult&&!analysis&&<PreflightView steps={preflightSteps}/>}
      {error&&(<div style={{background:"#D85A3015",border:"0.5px solid #D85A3060",borderRadius:8,padding:"12px 14px",marginTop:8}}>
        <div style={{fontSize:13,fontWeight:600,color:"#D85A30",marginBottom:8}}>⛔ {error.title}</div>
        {error.details.map((d,i)=><div key={i} style={{fontSize:12,color:"#ffaaaa",lineHeight:1.6}}>{d}</div>)}
      </div>)}
      {pendingResult&&!viewIdx&&(<div style={{background:"#EF9F2715",border:"0.5px solid #EF9F2760",borderRadius:8,padding:"12px 14px",marginTop:8,marginBottom:8}}>
        <div style={{fontSize:13,fontWeight:600,color:"#EF9F27",marginBottom:6}}>⏳ Verifica manuale</div>
        <div style={{fontSize:12,color:"#ffd9a0",lineHeight:1.6,marginBottom:10}}>Analisi generata. Verifica i contenuti qui sotto e conferma per salvarla nello storico.</div>
        <div style={{display:"flex",gap:8}}>

// ─── PREVISIONI ──────────────────────────────────────────────────────────────
function PrevisioniTab({holdings,totalValue,bancaLabel,liveCheckLog,localValidation,apiKey}){
  const[scenarios,setScenarios]=useState(null);
  const[loading,setLoading]=useState(false);
  const[storico,setStorico]=useState(()=>{try{return JSON.parse(localStorage.getItem("portfolio_previsioni")||"[]");}catch{return[];}});
  const[viewIdx,setViewIdx]=useState(null);
  const[error,setError]=useState(null);
  const[pendingResult,setPendingResult]=useState(null);
  const[confirm,setConfirm]=useState(null);
  const[preflightSteps,setPreflightSteps]=useState([]);

  const SC={base:"#1D9E75",ottimistico:"#7F77DD",pessimistico:"#D85A30"};
  const today=new Date();
  const months=12-today.getMonth();
  const proj=rate=>Math.round(totalValue*Math.pow(1+rate/100/12,months));

  const exportPDF=entry=>{
    const j=entry.json;
    const checksHTML=(entry.controlli||[]).map(c=>`<div>• ${c}</div>`).join("");
    const scenariHTML=["ottimistico","base","pessimistico"].map(key=>{
      const s=j[key];
      return `<div style="margin-bottom:12px;padding:10px;border-left:3px solid #333"><strong>${s.nome}</strong> — ${s.rendimento>=0?"+":""}${s.rendimento.toFixed(1)}%<br/>${s.motivazione}</div>`;
    }).join("");
    const raccHTML=(j.raccomandazioni||[]).map((r,i)=>`<div>${i+1}. ${r}</div>`).join("");
    document.getElementById("print-area").innerHTML=`
      <h2>Previsioni — ${entry.banca}</h2>
      <div class="pm">Data: ${entry.data} · Affidabilità: ${entry.affidabilita==="green"?"🟢 Affidabile":entry.affidabilita==="yellow"?"🟡 Parziale":"🔴 Inaffidabile"}</div>
      ${entry.controlli?.length?`<div class="checks"><strong>✓ Controlli eseguiti</strong>${checksHTML}</div>`:""}
      <div class="pb">
        <p style="font-style:italic;color:#555;margin-bottom:12px">${j.contesto||""}</p>
        <strong>Scenari 2026</strong>${scenariHTML}
        <strong>Raccomandazioni</strong><div style="margin-top:8px">${raccHTML}</div>
      </div>
      <div class="pf">Portfolio Analyzer v${APP_VERSION} · ${new Date().toLocaleDateString("it-IT")} · Solo scopo informativo, non costituisce consulenza finanziaria.</div>`;
    window.print();
  };

  const saveS=(json,controlli,affidabilita,hash)=>{
    const e={id:Date.now(),data:new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}),banca:bancaLabel,json,controlli,affidabilita,hash};
    const u=[e,...storico].slice(0,5);setStorico(u);localStorage.setItem("portfolio_previsioni",JSON.stringify(u));
  };
  const delE=id=>{const u=storico.filter(e=>e.id!==id);setStorico(u);localStorage.setItem("portfolio_previsioni",JSON.stringify(u));setViewIdx(null);};
  const askDelAll=()=>setConfirm({title:"Cancellare tutto lo storico?",message:`Stai per eliminare ${storico.length} previsioni. Azione non annullabile.`,danger:true,onConfirm:()=>{setStorico([]);localStorage.removeItem("portfolio_previsioni");setViewIdx(null);setConfirm(null);}});

  const run=async()=>{
    setError(null);setScenarios(null);setViewIdx(null);setPendingResult(null);setPreflightSteps([]);setLoading(true);

    // ── PREFLIGHT STEP-BY-STEP ──
    const collectedSteps=[];
    let blocked=false;
    for await(const step of runPreflightChecks({holdings,bancaLabel,apiKey})){
      const idx=collectedSteps.findIndex(s=>s.step===step.step);
      if(idx>=0)collectedSteps[idx]=step;
      else collectedSteps.push(step);
      setPreflightSteps([...collectedSteps]);
      if(step.status==="error"){
        setError({title:`⛔ Step ${step.step} fallito: ${step.name}`,details:step.details});
        blocked=true;break;
      }
    }
    if(blocked){setLoading(false);return;}

    const controlli=collectedSteps.filter(s=>s.status==="ok"||s.status==="warning").map(s=>{
      const icon=s.status==="warning"?"⚠":"✓";
      return `${icon} ${s.name}: ${s.details[0]||"verificato"}`;
    });

    const rendP=holdings.length>0?holdings.reduce((s,h)=>s+getRend(h)*(h.controvaloreAttuale||0),0)/totalValue:0;
    const catBD={};holdings.forEach(h=>{catBD[h.categoria]=(catBD[h.categoria]||0)+(h.controvaloreAttuale||0);});
    try{
      const text=await callAI("Sei un consulente finanziario italiano. Rispondi SOLO con JSON valido in italiano, senza testo prima o dopo.",`Portafoglio bilanciato (${bancaLabel}), maggio 2026. Totale €${Math.round(totalValue).toLocaleString("it-IT")}. Rendimento medio: ${rendP.toFixed(2)}%. Composizione: ${Object.entries(catBD).map(([k,v])=>`${k} ${Math.round(v/totalValue*100)}%`).join(", ")}. Contesto: tensioni USA-Cina, BCE ferma. JSON: {"contesto":"...","base":{"nome":"Scenario Base","rendimento":7.5,"motivazione":"..."},"ottimistico":{"nome":"Scenario Ottimistico","rendimento":11.0,"motivazione":"..."},"pessimistico":{"nome":"Scenario Pessimistico","rendimento":2.5,"motivazione":"..."},"raccomandazioni":["...","...","..."]}`,1500);
      const json=extractJSON(text);
      const v=validatePrevisioniJSON(json,holdings);
      if(!v.ok){
        setError({title:"Risposta AI non valida — previsioni non generate",details:[
          ...v.errors.map(e=>`✗ ${e}`),
          ...v.warnings.map(w=>`⚠ ${w}`),
          "","💡 Riprova con 'Rigenera'",
        ]});
        setLoading(false);return;
      }
      let affidabilita="green";
      const finalControlli=[...controlli,`✓ Scenari validati: pess ${json.pessimistico.rendimento}% ≤ base ${json.base.rendimento}% ≤ ott ${json.ottimistico.rendimento}%`];
      if(v.warnings.length>0){affidabilita="yellow";v.warnings.forEach(w=>finalControlli.push(`⚠ ${w}`));}
      if(collectedSteps.some(s=>s.status==="warning"))affidabilita="yellow";

      const hash=dataHash(holdings.map(h=>({n:h.nome,c:h.controvaloreAttuale,p:h.plusMinus,r:h.rendimentoAnnuo,rt:h.rendimentoTotale})));
      finalControlli.push(`Firma dati: ${hash}`);

      setPendingResult({json,controlli:finalControlli,affidabilita,hash});
    }catch(e){setError({title:"Errore generazione",details:[`✗ ${e.message}`]});}
    setLoading(false);
  };

  const confirmSave=()=>{
    if(!pendingResult)return;
    saveS(pendingResult.json,pendingResult.controlli,pendingResult.affidabilita,pendingResult.hash);
    setScenarios(pendingResult);
    setPendingResult(null);
  };

  const display=viewIdx!==null?storico[viewIdx]:(scenarios||pendingResult);
  const displayJson=display?.json;
  const dataChanged=viewIdx!==null&&storico[viewIdx]?.hash&&storico[viewIdx].hash!==dataHash(holdings.map(h=>({n:h.nome,c:h.controvaloreAttuale,p:h.plusMinus,r:h.rendimentoAnnuo,rt:h.rendimentoTotale})));

  return(<div>
    <Disclaimer/>
    <Section>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontWeight:600,fontSize:15}}>Scenari AI</div><div style={{fontSize:11,color:"#888"}}>Validazione + Gemini</div></div>
        <button onClick={run} disabled={loading||pendingResult} style={{padding:"10px 16px",borderRadius:10,border:"0.5px solid #444",background:"#2a2a3e",color:"white",cursor:(loading||pendingResult)?"not-allowed":"pointer",fontSize:13,fontWeight:500}}>{loading?"In corso…":scenarios?"Rigenera":"Avvia"}</button>
      </div>
      {(loading||error||preflightSteps.length>0)&&preflightSteps.length>0&&!pendingResult&&!scenarios&&<PreflightView steps={preflightSteps}/>}
      {error&&(<div style={{background:"#D85A3015",border:"0.5px solid #D85A3060",borderRadius:8,padding:"12px 14px",marginTop:12}}>
        <div style={{fontSize:13,fontWeight:600,color:"#D85A30",marginBottom:8}}>⛔ {error.title}</div>
        {error.details.map((d,i)=><div key={i} style={{fontSize:12,color:"#ffaaaa",lineHeight:1.6}}>{d}</div>)}
      </div>)}
      {pendingResult&&(<div style={{background:"#EF9F2715",border:"0.5px solid #EF9F2760",borderRadius:8,padding:"12px 14px",marginTop:12}}>
        <div style={{fontSize:13,fontWeight:600,color:"#EF9F27",marginBottom:6}}>⏳ Verifica manuale</div>
        <div style={{fontSize:12,color:"#ffd9a0",lineHeight:1.6,marginBottom:10}}>Verifica gli scenari qui sotto e conferma per salvare.</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={confirmSave} style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:"#1D9E75",color:"white",cursor:"pointer",fontSize:12,fontWeight:600}}>✓ Conferma e salva</button>
          <button onClick={()=>setPendingResult(null)} style={{flex:1,padding:"8px",borderRadius:6,border:"0.5px solid #444",background:"transparent",color:"#aaa",cursor:"pointer",fontSize:12}}>Scarta</button>
        </div>
      </div>)}
      {display&&displayJson&&(<div style={{marginTop:12}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}>
          {display.affidabilita&&<ReliabilityBadge level={display.affidabilita}/>}
          {viewIdx!==null&&<span style={{fontSize:11,color:"#888"}}>📅 {storico[viewIdx]?.data} · {storico[viewIdx]?.banca}</span>}
          {dataChanged&&<span style={{fontSize:11,color:"#EF9F27"}}>⚠ Generato con dati diversi</span>}
        </div>
        {display.controlli&&<ControlliBox controlli={display.controlli}/>}
        {["ottimistico","base","pessimistico"].map(key=>{
          const s=displayJson[key],color=SC[key];
          return(<div key={key} style={{background:"#12121e",borderRadius:10,padding:"12px 14px",borderLeft:`3px solid ${color}`,marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{flex:1,marginRight:12}}><div style={{fontSize:12,color:"#888"}}>{s.nome}</div><div style={{fontSize:11,color:"#aaa",marginTop:4}}>{s.motivazione}</div></div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:18,fontWeight:700,color}}>{fmtEur(proj(s.rendimento))}</div>
                <div style={{fontSize:12,color:"#888"}}>{s.rendimento>=0?"+":""}{s.rendimento.toFixed(1)}%</div>
              </div>
            </div>
          </div>);
        })}
        {displayJson.raccomandazioni&&(<div style={{marginTop:12,paddingTop:12,borderTop:"0.5px solid #2a2a3e"}}>
          <div style={{fontSize:13,color:"#888",fontStyle:"italic",marginBottom:12}}>{displayJson.contesto}</div>
          <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>Raccomandazioni</div>
          {displayJson.raccomandazioni.map((r,i)=>(<div key={i} style={{display:"flex",gap:10,marginBottom:8,fontSize:13}}>
            <span style={{color:"#1D9E75",fontWeight:600,flexShrink:0}}>{i+1}.</span>
            <span style={{color:"#aaa",lineHeight:1.6}}>{r}</span>
          </div>))}
        </div>)}
      </div>)}
      {!display&&!error&&!loading&&!pendingResult&&<div style={{fontSize:13,color:"#888",fontStyle:"italic",marginTop:12}}>Clicca "Avvia" per generare scenari validati.</div>}
    </Section>
    {storico.length>0&&(<Section>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{fontWeight:600,fontSize:14}}>Storico ({storico.length}/5)</div>
        <button onClick={askDelAll} style={{padding:"5px 10px",borderRadius:8,border:"0.5px solid #D85A3040",background:"transparent",color:"#D85A30",cursor:"pointer",fontSize:12}}>Cancella tutto</button>
      </div>
      {storico.map((e,i)=>(<div key={e.id} onClick={()=>setViewIdx(viewIdx===i?null:i)} style={{padding:"12px",borderRadius:10,marginBottom:8,background:viewIdx===i?"#2a2a3e":"#12121e",border:viewIdx===i?"0.5px solid #7F77DD":"0.5px solid #2a2a3e",cursor:"pointer"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:500}}>{e.data}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:3,flexWrap:"wrap"}}>
              <span style={{fontSize:12,color:"#1D9E75"}}>{e.banca||"—"}</span>
              {e.affidabilita&&<ReliabilityBadge level={e.affidabilita}/>}
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button onClick={ev=>{ev.stopPropagation();exportPDF(e);}} style={{padding:"5px 10px",borderRadius:8,border:"0.5px solid #1D9E7540",background:"transparent",color:"#1D9E75",cursor:"pointer",fontSize:12}}>PDF</button>
            <button onClick={ev=>{ev.stopPropagation();delE(e.id);}} style={{padding:"5px 10px",borderRadius:8,border:"0.5px solid #D85A3040",background:"transparent",color:"#D85A30",cursor:"pointer",fontSize:12}}>✕</button>
          </div>
        </div>
      </div>))}
    </Section>)}
    <ConfirmDialog open={!!confirm} {...(confirm||{})} onCancel={()=>setConfirm(null)}/>
  </div>);
}

// ─── AZIONI ──────────────────────────────────────────────────────────────────
function AzioniTab({holdings,totalValue,byCat,bancaLabel,liveCheckLog,localValidation,apiKey}){
  const[actions,setActions]=useState(null);
  const[loading,setLoading]=useState(false);
  const[expanded,setExpanded]=useState(null);
  const[filterTipo,setFilterTipo]=useState("tutti");
  const[storico,setStorico]=useState(()=>{try{return JSON.parse(localStorage.getItem("portfolio_azioni")||"[]");}catch{return[];}});
  const[viewIdx,setViewIdx]=useState(null);
  const[error,setError]=useState(null);
  const[pendingResult,setPendingResult]=useState(null);
  const[confirm,setConfirm]=useState(null);
  const[preflightSteps,setPreflightSteps]=useState([]);

  const az=Object.entries(byCat).filter(([k])=>k.toLowerCase().startsWith("azion")).reduce((s,[,v])=>s+v,0);
  const ob=Object.entries(byCat).filter(([k])=>k.toLowerCase().startsWith("obblig")).reduce((s,[,v])=>s+v,0);
  const pAz=totalValue>0?(az/totalValue*100).toFixed(1):0;
  const pOb=totalValue>0?(ob/totalValue*100).toFixed(1):0;

  const exportPDF=entry=>{
    const j=entry.json;
    const checksHTML=(entry.controlli||[]).map(c=>`<div>• ${c}</div>`).join("");
    const titoliHTML=(j.titoli||[]).map(t=>`<div style="margin-bottom:10px;padding:8px;border-left:3px solid #ccc"><strong>${t.nome}</strong> — <em>${t.azione}</em> (priorità: ${t.priorita})<br/>${t.motivazione}<br/><strong>Cosa fare:</strong> ${t.cosa_fare}</div>`).join("");
    document.getElementById("print-area").innerHTML=`
      <h2>Piano d'Azione — ${entry.banca}</h2>
      <div class="pm">Data: ${entry.data} · Affidabilità: ${entry.affidabilita==="green"?"🟢 Affidabile":entry.affidabilita==="yellow"?"🟡 Parziale":"🔴 Inaffidabile"}</div>
      ${entry.controlli?.length?`<div class="checks"><strong>✓ Controlli eseguiti</strong>${checksHTML}</div>`:""}
      <div class="pb">
        <p style="font-style:italic;color:#555;margin-bottom:12px">${j.sommario||""}</p>
        ${j.ribilanciamento?`<p style="margin-bottom:12px"><strong>Ribilanciamento:</strong> ${j.ribilanciamento}</p>`:""}
        <strong>Titoli</strong><div style="margin-top:8px">${titoliHTML}</div>
      </div>
      <div class="pf">Portfolio Analyzer v${APP_VERSION} · ${new Date().toLocaleDateString("it-IT")} · Solo scopo informativo, non costituisce consulenza finanziaria.</div>`;
    window.print();
  };

  const saveS=(json,controlli,affidabilita,hash)=>{
    const e={id:Date.now(),data:new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}),banca:bancaLabel,json,controlli,affidabilita,hash};
    const u=[e,...storico].slice(0,5);setStorico(u);localStorage.setItem("portfolio_azioni",JSON.stringify(u));
  };
  const delE=id=>{const u=storico.filter(e=>e.id!==id);setStorico(u);localStorage.setItem("portfolio_azioni",JSON.stringify(u));setViewIdx(null);};
  const askDelAll=()=>setConfirm({title:"Cancellare tutto lo storico?",message:`Stai per eliminare ${storico.length} piani. Azione non annullabile.`,danger:true,onConfirm:()=>{setStorico([]);localStorage.removeItem("portfolio_azioni");setViewIdx(null);setConfirm(null);}});

  const run=async()=>{
    setError(null);setActions(null);setExpanded(null);setViewIdx(null);setPendingResult(null);setPreflightSteps([]);setLoading(true);

    // ── PREFLIGHT STEP-BY-STEP ──
    const collectedSteps=[];
    let blocked=false;
    for await(const step of runPreflightChecks({holdings,bancaLabel,apiKey})){
      const idx=collectedSteps.findIndex(s=>s.step===step.step);
      if(idx>=0)collectedSteps[idx]=step;
      else collectedSteps.push(step);
      setPreflightSteps([...collectedSteps]);
      if(step.status==="error"){
        setError({title:`⛔ Step ${step.step} fallito: ${step.name}`,details:step.details});
        blocked=true;break;
      }
    }
    if(blocked){setLoading(false);return;}

    const controlli=collectedSteps.filter(s=>s.status==="ok"||s.status==="warning").map(s=>{
      const icon=s.status==="warning"?"⚠":"✓";
      return `${icon} ${s.name}: ${s.details[0]||"verificato"}`;
    });
    controlli.push(`✓ Allocazione: Azionario ${pAz}% (target 50-65%) · Obbligazionario ${pOb}% (target 30-45%)`);

    const righe=holdings.filter(h=>h.controvaloreAttuale>0).map((h,i)=>{
      const peso=totalValue>0?(h.controvaloreAttuale/totalValue*100).toFixed(1):0;
      const ri=getRendInfo(h);
      const rendStr=ri.tipo==="none"?"rend:n/d":(ri.tipo==="annuo"?`rend.annuo:${ri.valore.toFixed(2)}%`:`rend.totale:${ri.valore.toFixed(2)}%`);
      return `${i+1}. ${h.nome.slice(0,40)} [${h.banca}] | ${h.categoria} | €${Math.round(h.controvaloreAttuale)} (${peso}%) | ${rendStr}`;
    }).join("\n");
    try{
      const text=await callAI("Sei un consulente finanziario italiano. Rispondi SOLO con JSON valido in italiano, senza testo prima o dopo.",`Portafoglio BILANCIATO (${bancaLabel}), maggio 2026. Totale €${Math.round(totalValue).toLocaleString("it-IT")}. Azionario ${pAz}% (target 50-65%), Obbligazionario ${pOb}% (target 30-45%).\n\nNOTA: 'rend.annuo' = rendimento annualizzato (Mediolanum). 'rend.totale' = rendimento totale dall'acquisto, NON annualizzato (BPER).\n\nTITOLI:\n${righe}\n\nUsa esattamente i nomi dei titoli forniti. Per ogni titolo azione (vendi/monitora/mantieni/incrementa/switch) e priorità (alta/media/bassa). JSON: {"sommario":"...","ribilanciamento":"...","titoli":[{"nome":"...","azione":"mantieni","priorita":"media","motivazione":"...","cosa_fare":"..."}]}`,4000);
      const json=extractJSON(text);
      const v=validateAzioniJSON(json,holdings);
      if(v.errors.length>0){
        setError({title:"Risposta AI non valida — piano non generato",details:[
          ...v.errors.map(e=>`✗ ${e}`),
          "","💡 Riprova con 'Rigenera'",
        ]});
        setLoading(false);return;
      }
      let affidabilita="green";
      const finalControlli=[...controlli,`✓ Titoli analizzati dall'AI: ${json.titoli.length}`];
      if(v.warnings.length>0){affidabilita="yellow";v.warnings.slice(0,3).forEach(w=>finalControlli.push(`⚠ ${w}`));}
      if(collectedSteps.some(s=>s.status==="warning"))affidabilita="yellow";

      const hash=dataHash(holdings.map(h=>({n:h.nome,c:h.controvaloreAttuale,p:h.plusMinus,r:h.rendimentoAnnuo,rt:h.rendimentoTotale})));
      finalControlli.push(`Firma dati: ${hash}`);

      setPendingResult({json,controlli:finalControlli,affidabilita,hash});
    }catch(e){setError({title:"Errore generazione AI",details:[`✗ ${e.message}`]});}
    setLoading(false);
  };

  const confirmSave=()=>{
    if(!pendingResult)return;
    saveS(pendingResult.json,pendingResult.controlli,pendingResult.affidabilita,pendingResult.hash);
    setActions(pendingResult);
    setPendingResult(null);
  };

  const display=viewIdx!==null?storico[viewIdx]:(actions||pendingResult);
  const displayJson=display?.json;
  const dataChanged=viewIdx!==null&&storico[viewIdx]?.hash&&storico[viewIdx].hash!==dataHash(holdings.map(h=>({n:h.nome,c:h.controvaloreAttuale,p:h.plusMinus,r:h.rendimentoAnnuo,rt:h.rendimentoTotale})));
  const tf=displayJson?.titoli?.filter(t=>filterTipo==="tutti"||t.azione===filterTipo)??[];
  const cnt=displayJson?.titoli?Object.keys(AZIONE_META).reduce((a,k)=>{a[k]=displayJson.titoli.filter(t=>t.azione===k).length;return a;},{}):{}; 

  return(<div>
    <Disclaimer/>
    <Section>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontWeight:600,fontSize:15}}>Piano d'Azione AI</div><div style={{fontSize:11,color:"#888"}}>Validazione + Gemini</div></div>
        <button onClick={run} disabled={loading||pendingResult} style={{padding:"10px 16px",borderRadius:10,border:"0.5px solid #444",background:"#2a2a3e",color:"white",cursor:(loading||pendingResult)?"not-allowed":"pointer",fontSize:13,fontWeight:500}}>{loading?"In corso…":actions?"Rigenera":"Avvia"}</button>
      </div>
      {(loading||error||preflightSteps.length>0)&&preflightSteps.length>0&&!pendingResult&&!actions&&<PreflightView steps={preflightSteps}/>}
      {error&&(<div style={{background:"#D85A3015",border:"0.5px solid #D85A3060",borderRadius:8,padding:"12px 14px",marginTop:12}}>
        <div style={{fontSize:13,fontWeight:600,color:"#D85A30",marginBottom:8}}>⛔ {error.title}</div>
        {error.details.map((d,i)=><div key={i} style={{fontSize:12,color:"#ffaaaa",lineHeight:1.6}}>{d}</div>)}
      </div>)}
      {pendingResult&&(<div style={{background:"#EF9F2715",border:"0.5px solid #EF9F2760",borderRadius:8,padding:"12px 14px",marginTop:12}}>
        <div style={{fontSize:13,fontWeight:600,color:"#EF9F27",marginBottom:6}}>⏳ Verifica manuale</div>
        <div style={{fontSize:12,color:"#ffd9a0",lineHeight:1.6,marginBottom:10}}>Verifica il piano qui sotto e conferma per salvare.</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={confirmSave} style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:"#1D9E75",color:"white",cursor:"pointer",fontSize:12,fontWeight:600}}>✓ Conferma e salva</button>
          <button onClick={()=>setPendingResult(null)} style={{flex:1,padding:"8px",borderRadius:6,border:"0.5px solid #444",background:"transparent",color:"#aaa",cursor:"pointer",fontSize:12}}>Scarta</button>
        </div>
      </div>)}
      {display&&displayJson&&(<div style={{marginTop:12}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}>
          {display.affidabilita&&<ReliabilityBadge level={display.affidabilita}/>}
          {viewIdx!==null&&<span style={{fontSize:11,color:"#888"}}>📅 {storico[viewIdx]?.data} · {storico[viewIdx]?.banca}</span>}
          {dataChanged&&<span style={{fontSize:11,color:"#EF9F27"}}>⚠ Generato con dati diversi</span>}
        </div>
        {display.controlli&&<ControlliBox controlli={display.controlli}/>}
        <div style={{fontSize:13,color:"#aaa",fontStyle:"italic",marginBottom:12}}>{displayJson.sommario}</div>
        {displayJson.ribilanciamento&&<div style={{background:"#12121e",border:"0.5px solid #7F77DD40",borderRadius:10,padding:"10px 12px",marginBottom:14,fontSize:13}}><span style={{fontWeight:600,color:"#7F77DD",marginRight:6}}>Ribilanciamento:</span><span style={{color:"#aaa"}}>{displayJson.ribilanciamento}</span></div>}
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button onClick={()=>setFilterTipo("tutti")} style={{padding:"5px 12px",borderRadius:20,fontSize:12,cursor:"pointer",border:filterTipo==="tutti"?"1px solid #888":"0.5px solid #333",background:filterTipo==="tutti"?"#2a2a3e":"transparent",color:"white"}}>Tutti ({displayJson.titoli?.length??0})</button>
          {Object.entries(AZIONE_META).filter(([k])=>(cnt[k]??0)>0).map(([key,meta])=>(<button key={key} onClick={()=>setFilterTipo(key)} style={{padding:"5px 12px",borderRadius:20,fontSize:12,cursor:"pointer",border:filterTipo===key?`1px solid ${meta.color}`:`0.5px solid ${meta.color}40`,background:filterTipo===key?meta.bg:"transparent",color:meta.color}}>{meta.icon} {meta.label} ({cnt[key]})</button>))}
        </div>
      </div>)}
      {!display&&!error&&!loading&&!pendingResult&&<div style={{fontSize:13,color:"#888",fontStyle:"italic",marginTop:12}}>Clicca "Avvia" per generare il piano d'azione validato.</div>}
    </Section>
    {tf.length>0&&(<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
      {tf.map((t,i)=>{
        const meta=AZIONE_META[t.azione]??AZIONE_META.mantieni;
        const h=holdings.find(x=>x.nome===t.nome||x.nome.toLowerCase().startsWith(t.nome.toLowerCase().slice(0,20)));
        const open=expanded===i;
        return(<div key={i} onClick={()=>setExpanded(open?null:i)} style={{background:"#1e2235",border:`0.5px solid ${meta.color}30`,borderRadius:12,overflow:"hidden",cursor:"pointer"}}>
          <div style={{padding:"14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{padding:"4px 10px",borderRadius:6,background:meta.bg,color:meta.color,fontSize:12,fontWeight:600,flexShrink:0}}>{meta.icon} {meta.label}</div>
              <div style={{width:7,height:7,borderRadius:"50%",flexShrink:0,background:t.priorita==="alta"?"#D85A30":t.priorita==="media"?"#EF9F27":"#888"}}/>
              <div style={{flex:1,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.nome}</div>
              <div style={{fontSize:12,color:"#888",flexShrink:0}}>{open?"▲":"▼"}</div>
            </div>
            {h&&<div style={{fontSize:12,color:"#888",marginTop:6}}>{fmtEur(h.controvaloreAttuale)} · {totalValue>0?(h.controvaloreAttuale/totalValue*100).toFixed(1):"—"}% · 📌 {h.fonte||""}</div>}
            {!h&&<div style={{fontSize:11,color:"#EF9F27",marginTop:6}}>⚠ Titolo non trovato esattamente nel portafoglio</div>}
          </div>
          {open&&(<div style={{padding:"0 14px 14px",borderTop:"0.5px solid #2a2a3e"}}>
            <div style={{paddingTop:12}}>
              <div style={{fontSize:11,color:"#888",fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Motivazione</div>
              <div style={{fontSize:13,lineHeight:1.7,color:"#ccc",marginBottom:12}}>{t.motivazione}</div>
              <div style={{background:meta.bg,borderRadius:10,padding:"12px",border:`0.5px solid ${meta.color}30`}}>
                <div style={{fontSize:11,color:meta.color,fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Cosa fare</div>
                <div style={{fontSize:13,lineHeight:1.7}}>{t.cosa_fare}</div>
              </div>
            </div>
          </div>)}
        </div>);
      })}
    </div>)}
    {storico.length>0&&(<Section>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{fontWeight:600,fontSize:14}}>Storico ({storico.length}/5)</div>
        <button onClick={askDelAll} style={{padding:"5px 10px",borderRadius:8,border:"0.5px solid #D85A3040",background:"transparent",color:"#D85A30",cursor:"pointer",fontSize:12}}>Cancella tutto</button>
      </div>
      {storico.map((e,i)=>(<div key={e.id} onClick={()=>{setViewIdx(viewIdx===i?null:i);setExpanded(null);}} style={{padding:"12px",borderRadius:10,marginBottom:8,background:viewIdx===i?"#2a2a3e":"#12121e",border:viewIdx===i?"0.5px solid #7F77DD":"0.5px solid #2a2a3e",cursor:"pointer"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:500}}>{e.data}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:3,flexWrap:"wrap"}}>
              <span style={{fontSize:12,color:"#1D9E75"}}>{e.banca||"—"}</span>
              {e.affidabilita&&<ReliabilityBadge level={e.affidabilita}/>}
              <span style={{fontSize:11,color:"#888"}}>{e.json?.titoli?.length||0} titoli</span>
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button onClick={ev=>{ev.stopPropagation();exportPDF(e);}} style={{padding:"5px 10px",borderRadius:8,border:"0.5px solid #1D9E7540",background:"transparent",color:"#1D9E75",cursor:"pointer",fontSize:12}}>PDF</button>
            <button onClick={ev=>{ev.stopPropagation();delE(e.id);}} style={{padding:"5px 10px",borderRadius:8,border:"0.5px solid #D85A3040",background:"transparent",color:"#D85A30",cursor:"pointer",fontSize:12}}>✕</button>
          </div>
        </div>
      </div>))}
    </Section>)}
    <ConfirmDialog open={!!confirm} {...(confirm||{})} onCancel={()=>setConfirm(null)}/>
  </div>);
}

// ─── APP ROOT ────────────────────────────────────────────────────────────────
function App(){
  const[bankData,setBankData]=useState({MD:MD_DATA,BPER:BPER_DATA,PI:PI_DATA});
  const[tab,setTab]=useState("dashboard");
  const[sortCol,setSortCol]=useState("controvaloreAttuale");
  const[sortDir,setSortDir]=useState("desc");
  const[fBank,setFBank]=useState("all");
  const[fCat,setFCat]=useState("all");
  const[search,setSearch]=useState("");
  const[apiKey,setApiKey]=useState("");
  const[showKey,setShowKey]=useState(false);
  const[bankAI,setBankAI]=useState("all");
  const[showManual,setShowManual]=useState(false);
  const[hasProblems,setHasProblems]=useState(false);
  const isMobile=useIsMobile();

  const all=Object.values(bankData).flat();
  const live=useLivePrices(all);

  // Validation generale (per badge rosso e per passare alle tab AI)
  const localValidation=useMemo(()=>validateHoldings(all),[bankData]);

  const aiAll=bankAI==="all"?all:all.filter(h=>h.banca===bankAI);
  const aiH=aiAll.filter(h=>!isLiq(h));
  const aiLiq=aiAll.filter(h=>isLiq(h));
  const aiTotal=aiH.reduce((s,h)=>s+(h.controvaloreAttuale||0),0);
  const aiLiqTotal=aiLiq.reduce((s,h)=>s+(h.controvaloreAttuale||0),0);
  const aiByCat={};aiH.forEach(h=>{if(h.controvaloreAttuale)aiByCat[h.categoria]=(aiByCat[h.categoria]||0)+h.controvaloreAttuale;});
  const aiCatData=Object.entries(aiByCat).map(([label,value])=>({label,value,color:CAT_COLORS[label]||"#888"})).sort((a,b)=>b.value-a.value);

  const totalValue=all.reduce((s,h)=>s+(h.controvaloreAttuale||0),0);
  const totalPL=all.reduce((s,h)=>s+(h.plusMinus||0),0);
  const totalInv=all.reduce((s,h)=>s+(h.prezzoCarico&&h.quantita?h.prezzoCarico*h.quantita:(h.controvaloreAttuale||0)-(h.plusMinus||0)),0);
  const totalPLpct=totalInv>0?(totalPL/totalInv)*100:null;
  const byBank=Object.keys(BANKS).map(k=>({name:BANKS[k].name,code:k,color:BANKS[k].color,value:(bankData[k]||[]).reduce((s,h)=>s+(h.controvaloreAttuale||0),0)})).filter(b=>b.value>0);
  const byCat={};all.forEach(h=>{if(h.controvaloreAttuale)byCat[h.categoria]=(byCat[h.categoria]||0)+h.controvaloreAttuale;});
  const catData=Object.entries(byCat).map(([label,value])=>({label,value,color:CAT_COLORS[label]||"#888"})).sort((a,b)=>b.value-a.value);
  const categories=[...new Set(all.map(h=>h.categoria))];
  const handleSort=col=>{if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortCol(col);setSortDir("desc");}};
  const filtered=all.filter(h=>fBank==="all"||h.banca===fBank).filter(h=>fCat==="all"||h.categoria===fCat).filter(h=>!search||h.nome.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>{const va=a[sortCol]??-Infinity,vb=b[sortCol]??-Infinity;return sortDir==="asc"?(va>vb?1:-1):(va<vb?1:-1);});

  const TABS=[
    {id:"dashboard",icon:"⊞",label:"Dashboard"},
    {id:"titoli",icon:"≡",label:"Titoli"},
    {id:"analisi",icon:"◑",label:"Analisi"},
    {id:"previsioni",icon:"↗",label:"Previsioni"},
    {id:"azioni",icon:"⚡",label:"Azioni"},
    {id:"impostazioni",icon:"⚙",label:"Impostazioni",badge:hasProblems},
  ];

  const AIFilter=()=>(
    <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
      {["all",...Object.keys(BANKS)].map(code=>(<button key={code} onClick={()=>setBankAI(code)} style={{padding:"7px 14px",borderRadius:20,fontSize:12,cursor:"pointer",border:bankAI===code?`1px solid ${code==="all"?"#888":BANKS[code]?.color}`:"0.5px solid #333",background:bankAI===code?(code==="all"?"#2a2a3e":`${BANKS[code]?.color}20`):"transparent",color:code==="all"?"white":BANKS[code]?.color??"white",fontWeight:bankAI===code?600:400}}>{code==="all"?"Tutto":BANKS[code].name}</button>))}
    </div>
  );

  const LiqBox=()=>aiLiqTotal>0?(<div style={{background:"#1e2235",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
    <span style={{fontSize:13,color:"#888"}}>💰 Liquidità (esclusa dall'AI)</span>
    <span style={{fontSize:14,fontWeight:600,color:"#A0A0B0"}}>{fmtEur(aiLiqTotal)}</span>
  </div>):null;

  const TabBar=()=>isMobile?(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0e0e1a",borderTop:"0.5px solid #2a2a3e",display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
      {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"8px 2px",background:"transparent",border:"none",color:tab===t.id?"#1D9E75":"#666",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
        <span style={{fontSize:16}}>{t.icon}</span>
        <span style={{fontSize:9,fontWeight:tab===t.id?600:400}}>{t.label}</span>
        {t.badge&&<div style={{position:"absolute",top:6,right:"30%",width:8,height:8,borderRadius:"50%",background:"#D85A30"}}/>}
      </button>))}
    </div>
  ):(
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"7px 14px",borderRadius:8,border:"0.5px solid #444",background:tab===t.id?"#1e2235":"transparent",color:tab===t.id?"white":"#888",cursor:"pointer",fontSize:13,fontWeight:tab===t.id?500:400,position:"relative"}}>
        {t.label}
        {t.badge&&<span style={{display:"inline-block",marginLeft:6,width:6,height:6,borderRadius:"50%",background:"#D85A30"}}/>}
      </button>))}
    </div>
  );

  return(<div style={{fontFamily:"system-ui,sans-serif",background:"#12121e",color:"white",minHeight:"100vh",maxWidth:"100vw",overflowX:"hidden"}}>
    <div style={{maxWidth:940,margin:"0 auto",padding:isMobile?"12px 12px 90px":"1.5rem"}}>
      {showManual&&<Manuale onClose={()=>setShowManual(false)}/>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.25rem",flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{margin:0,fontSize:isMobile?20:22,fontWeight:700}}>Portfolio Analyzer</h1>
          <div style={{fontSize:12,color:"#888"}}>Profilo bilanciato · v{APP_VERSION}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {!isMobile&&<TabBar/>}
          <button onClick={()=>setShowManual(true)} style={{width:34,height:34,borderRadius:"50%",border:"0.5px solid #444",background:"#2a2a3e",color:"#aaa",cursor:"pointer",fontSize:16,flexShrink:0}} title="Manuale">?</button>
        </div>
      </div>

      {tab==="dashboard"&&<DashboardTab all={all} totalValue={totalValue} totalPL={totalPL} totalPLpct={totalPLpct} byBank={byBank} catData={catData} live={live}/>}
      {tab==="titoli"&&<TitoliTab filtered={filtered} sortCol={sortCol} sortDir={sortDir} handleSort={handleSort} fBank={fBank} setFBank={setFBank} fCat={fCat} setFCat={setFCat} search={search} setSearch={setSearch} categories={categories} live={live}/>}
      {tab==="analisi"&&<><AIFilter/><LiqBox/><AnalisiTab holdings={aiH} totalValue={aiTotal} byCat={aiByCat} catData={aiCatData} bancaLabel={bankAI==="all"?"Tutto il portafoglio":BANKS[bankAI]?.name} liveCheckLog={live.checkLog} localValidation={localValidation} apiKey={apiKey}/></>}
      {tab==="previsioni"&&<><AIFilter/><LiqBox/><PrevisioniTab holdings={aiH} totalValue={aiTotal} bancaLabel={bankAI==="all"?"Tutto il portafoglio":BANKS[bankAI]?.name} liveCheckLog={live.checkLog} localValidation={localValidation} apiKey={apiKey}/></>}
      {tab==="azioni"&&<><AIFilter/><LiqBox/><AzioniTab holdings={aiH} totalValue={aiTotal} byCat={aiByCat} bancaLabel={bankAI==="all"?"Tutto il portafoglio":BANKS[bankAI]?.name} liveCheckLog={live.checkLog} localValidation={localValidation} apiKey={apiKey}/></>}
      {tab==="impostazioni"&&<ImpostazioniTab bankData={bankData} setBankData={setBankData} apiKey={apiKey} setApiKey={setApiKey} showKey={showKey} setShowKey={setShowKey} byBank={byBank} totalValue={totalValue} live={live} validation={localValidation} onProblems={setHasProblems}/>}
    </div>
    {isMobile&&<TabBar/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App/>);
</script>
</body>
</html>
