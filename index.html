const extractJSON=text=>{
  const md=text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if(md){try{return JSON.parse(md[1].trim());}catch(_){}}
  const s=text.indexOf("{");
  if(s!==-1){let d=0;for(let i=s;i<text.length;i++){if(text[i]==="{")d++;else if(text[i]==="}"){ d--;if(d===0)return JSON.parse(text.slice(s,i+1));}}};
  throw new Error("Nessun JSON trovato");
};

const callAI=async(system,prompt,maxTokens=2000)=>{
  const key=window._aiKey||"";
  if(!key)throw new Error("API Key non inserita — vai in Impostazioni");
  const full=system?system+"\n\n"+prompt:prompt;
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${key}`;
  const body=JSON.stringify({contents:[{parts:[{text:full}]}],generationConfig:{maxOutputTokens:maxTokens,temperature:0.7}});
  let resp;
  try{resp=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body});}
  catch(e){resp=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,{method:"POST",headers:{"Content-Type":"application/json"},body});}
  const data=await resp.json();
  if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
  const text=data.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!text)throw new Error("Risposta vuota");
  return text;
};

async function fetchYahoo(ticker){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1mo`;
  const resp=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
  const data=await resp.json();
  const r=data?.chart?.result?.[0];
  if(!r)throw new Error("no data");
  const ts=r.timestamp,closes=r.indicators.quote[0].close;
  const ref=new Date(DATA_RIF).getTime()/1000;
  let ri=0,md=Infinity;
  ts.forEach((t,i)=>{const d=Math.abs(t-ref);if(d<md){md=d;ri=i;}});
  return{varPct:((closes[closes.length-1]-closes[ri])/closes[ri])*100};
}

function useLivePrices(holdings){
  const[prices,setPrices]=useState({});
  const[loading,setLoading]=useState(false);
  const[lastUpdate,setLastUpdate]=useState(null);
  const[error,setError]=useState(null);
  const refresh=useCallback(async()=>{
    setLoading(true);setError(null);
    const tickers=[...new Set(holdings.map(h=>BENCHMARK[h.categoria]?.ticker).filter(Boolean))];
    const res={},errs=[];
    await Promise.all(tickers.map(async t=>{try{res[t]=await fetchYahoo(t);}catch{errs.push(t);}}));
    setPrices(res);setLastUpdate(new Date());
    if(errs.length)setError(`N/D: ${errs.join(", ")}`);
    setLoading(false);
  },[holdings]);
  const enriched=holdings.map(h=>{
    const b=BENCHMARK[h.categoria];
    if(!b?.ticker||!prices[b.ticker])return{...h,stimato:null,varPct:null};
    return{...h,stimato:h.controvaloreAttuale*(1+prices[b.ticker].varPct/100),varPct:prices[b.ticker].varPct};
  });
  const totalStimato=enriched.reduce((s,h)=>s+(h.stimato??h.controvaloreAttuale),0);
  return{enriched,loading,lastUpdate,error,refresh,totalStimato};
}

function PieChart({data,size=110}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return null;
  let cum=-Math.PI/2;
  const R=size/2-6,cx=size/2,cy=size/2;
  const slices=data.map(d=>{
    const a=(d.value/total)*2*Math.PI;
    const x1=cx+R*Math.cos(cum),y1=cy+R*Math.sin(cum);
    cum+=a;
    return{...d,x1,y1,x2:cx+R*Math.cos(cum),y2:cy+R*Math.sin(cum),large:a>Math.PI?1:0};
  });
  return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    {slices.map((s,i)=><path key={i} d={`M${cx} ${cy}L${s.x1} ${s.y1}A${R} ${R} 0 ${s.large} 1 ${s.x2} ${s.y2}Z`} fill={s.color} opacity={0.9} stroke="#00000020" strokeWidth={1}/>)}
    <circle cx={cx} cy={cy} r={R*0.42} fill="#12121e"/>
  </svg>);
}

      <div style={{fontSize:12,color:"#888",marginBottom:12}}>Stima basata su benchmark ETF dal {DATA_RIF}</div>
      {live.lastUpdate&&(
        <div style={{marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:500}}>Stima attuale: <span style={{color:"#1D9E75"}}>{fmtEur(live.totalStimato)}</span></div>
          <div style={{fontSize:12,color:(live.totalStimato-totalValue)>=0?"#1D9E75":"#D85A30",marginTop:4}}>
            {(live.totalStimato-totalValue)>=0?"+":""}{fmt((live.totalStimato-totalValue)/totalValue*100)}% dal {DATA_RIF}
          </div>
          <div style={{fontSize:11,color:"#EF9F27",marginTop:4}}>⚠ Non riflette il NAV reale dei fondi</div>
        </div>
      )}
      {live.error&&<div style={{fontSize:12,color:"#EF9F27",marginBottom:8}}>{live.error}</div>}
      <button onClick={live.refresh} disabled={live.loading} style={{width:"100%",padding:"12px",borderRadius:10,border:"0.5px solid #444",background:"#2a2a3e",color:"white",cursor:live.loading?"not-allowed":"pointer",fontSize:14,fontWeight:500}}>
        {live.loading?"Aggiornamento…":live.lastUpdate?`↻ Aggiorna (${live.lastUpdate.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})})`:"Carica prezzi live"}
      </button>
    </Section>

    {/* Upload CSV */}
    <Section title="Aggiorna dati">
      <div style={{fontSize:12,color:"#888",marginBottom:12}}>Carica un nuovo CSV per aggiornare i dati di una banca</div>
      {Object.entries(BANKS).map(([code,bank])=>{
        const ref=React.createRef();
        const handleFile=f=>{
          const r=new FileReader();
          r.onload=e=>{
            try{
              const data=parse(e.target.result).map(h=>({...h,banca:code}));
              setBankData(prev=>({...prev,[code]:data}));
            }catch{alert("Errore CSV");}
          };
          r.readAsText(f,"UTF-8");
        };
        return(<div key={code} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0",borderBottom:"0.5px solid #2a2a3e"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:bank.color}}/>
            <span style={{fontSize:14}}>{bank.name}</span>
            <span style={{fontSize:11,color:"#1D9E75"}}>{bankData[code]?.length?"✓ "+bankData[code].length+" titoli":""}</span>
          </div>
          <button onClick={()=>ref.current?.click()} style={{padding:"8px 14px",borderRadius:8,border:`0.5px solid ${bank.color}60`,background:`${bank.color}15`,color:bank.color,cursor:"pointer",fontSize:12,fontWeight:500}}>
            Carica CSV
            <input ref={ref} type="file" accept=".csv" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
          </button>
        </div>);
      })}
    </Section>

    <div style={{fontSize:11,color:"#555",textAlign:"center",padding:"8px 0 24px"}}>Portfolio Analyzer v2.0 · Dati aggiornati al {DATA_RIF}</div>
  </div>);
}

// ─── ANALISI ─────────────────────────────────────────────────────────────────
function AnalisiTab({holdings,totalValue,byCat,catData,bancaLabel}){
  const[analysis,setAnalysis]=useState("");
  const[loading,setLoading]=useState(false);
  const[done,setDone]=useState(false);
  const[storico,setStorico]=useState(()=>{try{return JSON.parse(localStorage.getItem("portfolio_analisi")||"[]");}catch{return[];}});
  const[viewIdx,setViewIdx]=useState(null);

  const exportPDF=entry=>{
    const el=document.getElementById("print-area");
    el.innerHTML=`<h2>Analisi Portafoglio — ${entry.banca}</h2><div class="pm">Data: ${entry.data}</div><div class="pb">${entry.testo.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>")}</div><div class="pf">Portfolio Analyzer · ${new Date().toLocaleDateString("it-IT")} · Solo scopo informativo, non costituisce consulenza finanziaria.</div>`;
    window.print();
  };
  const saveS=text=>{const e={id:Date.now(),data:new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}),banca:bancaLabel,testo:text};const u=[e,...storico].slice(0,5);setStorico(u);localStorage.setItem("portfolio_analisi",JSON.stringify(u));};
  const delE=id=>{const u=storico.filter(e=>e.id!==id);setStorico(u);localStorage.setItem("portfolio_analisi",JSON.stringify(u));setViewIdx(null);};
  const delAll=()=>{setStorico([]);localStorage.removeItem("portfolio_analisi");setViewIdx(null);};
  const run=async()=>{
    setLoading(true);setAnalysis("");setDone(false);setViewIdx(null);
    const summary=holdings.filter(h=>h.controvaloreAttuale>0).map(h=>`${h.nome.slice(0,35)} [${h.banca}] (${h.categoria}): ${fmtEur(h.controvaloreAttuale)}`).join("\n");
    try{
      const text=await callAI(null,`Sei un consulente finanziario italiano esperto. Analizza questo portafoglio BILANCIATO (totale ${fmtEur(totalValue)}):\n${summary}\n\nFornisci:\n1. **Valutazione generale**\n2. **Rischi principali** (3 punti)\n3. **Opportunità** (3 punti)\n4. **Raccomandazioni** per profilo bilanciato\n5. **Previsione 2026**`);
      if(!text||!text.trim())throw new Error("Risposta vuota");
      setAnalysis(text);saveS(text);setDone(true);
    }catch(e){setAnalysis(`⚠ Errore: ${e.message}`);setDone(false);}
    setLoading(false);
  };
  const renderMd=t=>t.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>");
  const az=Object.entries(byCat).filter(([k])=>k.toLowerCase().startsWith("azion")).reduce((s,[,v])=>s+v,0);
  const ob=Object.entries(byCat).filter(([k])=>k.toLowerCase().startsWith("obblig")).reduce((s,[,v])=>s+v,0);
  const ass=Object.entries(byCat).filter(([k])=>k.toLowerCase().includes("assicur")).reduce((s,[,v])=>s+v,0);
  const pAz=totalValue>0?Math.round(az/totalValue*100):0;
  const pOb=totalValue>0?Math.round(ob/totalValue*100):0;
  const pAs=totalValue>0?Math.round(ass/totalValue*100):0;
  const testo=viewIdx!==null?storico[viewIdx]?.testo:analysis;

  return(<div>
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
      {[{l:"Azionario",v:pAz+"%",s:"target 50–65%",a:pAz>65||pAz<50},{l:"Obbligazionario",v:pOb+"%",s:"target 30–45%",a:pOb>45||pOb<30},{l:"Assicurativo",v:pAs+"%",s:"polizze/unit linked",a:false}].map((c,i)=>(
        <div key={i} style={{background:c.a?"#EF9F2710":"#1e2235",border:c.a?"0.5px solid #EF9F2740":"none",borderRadius:12,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:12,color:"#888"}}>{c.l}</div>
            <div style={{fontSize:11,color:"#666",marginTop:2}}>{c.s}</div>
          </div>
          <div style={{fontSize:26,fontWeight:700,color:c.a?"#EF9F27":"white"}}>{c.v}</div>
        </div>
      ))}
    </div>
    <Section title="Distribuzione categorie">
      {catData.map(c=>(<div key={c.label} style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
          <span style={{color:"#ccc"}}>{c.label}</span>
          <span style={{fontWeight:600}}>{totalValue>0?Math.round(c.value/totalValue*100):0}%</span>
        </div>
        <div style={{height:5,borderRadius:3,background:"#2a2a3e"}}><div style={{height:"100%",borderRadius:3,background:c.color,width:totalValue>0?`${c.value/totalValue*100}%`:"0%",transition:"width .5s"}}/></div>
      </div>))}
    </Section>
    <Section>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:testo?16:0}}>
        <div><div style={{fontWeight:600,fontSize:15}}>Analisi AI</div><div style={{fontSize:11,color:"#888"}}>powered by Gemini</div></div>
        <button onClick={run} disabled={loading} style={{padding:"10px 16px",borderRadius:10,border:"0.5px solid #444",background:"#2a2a3e",color:"white",cursor:loading?"not-allowed":"pointer",fontSize:13,fontWeight:500}}>{loading?"In corso…":done?"Rigenera":"Avvia analisi"}</button>
      </div>
      {viewIdx!==null&&<div style={{fontSize:11,color:"#888",marginBottom:10,fontStyle:"italic"}}>📅 {storico[viewIdx]?.data} · {storico[viewIdx]?.totale}</div>}
      {testo&&<div style={{fontSize:13,lineHeight:1.8}} dangerouslySetInnerHTML={{__html:renderMd(testo)}}/>}
      {!testo&&!loading&&<div style={{fontSize:13,color:"#888",fontStyle:"italic",marginTop:12}}>Clicca "Avvia analisi" per ottenere una valutazione AI del tuo portafoglio.</div>}
    </Section>
    {storico.length>0&&(
      <Section>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{fontWeight:600,fontSize:14}}>Storico ({storico.length}/5)</div>
          <button onClick={delAll} style={{padding:"5px 10px",borderRadius:8,border:"0.5px solid #D85A3040",background:"transparent",color:"#D85A30",cursor:"pointer",fontSize:12}}>Cancella tutto</button>
        </div>
        {storico.map((e,i)=>(
          <div key={e.id} onClick={()=>setViewIdx(viewIdx===i?null:i)} style={{padding:"12px",borderRadius:10,marginBottom:8,background:viewIdx===i?"#2a2a3e":"#12121e",border:viewIdx===i?"0.5px solid #7F77DD":"0.5px solid #2a2a3e",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500}}>{e.data}</div>
                <div style={{fontSize:12,color:"#1D9E75",marginTop:2}}>{e.banca||"—"}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={ev=>{ev.stopPropagation();exportPDF(e);}} style={{padding:"5px 10px",borderRadius:8,border:"0.5px solid #1D9E7540",background:"transparent",color:"#1D9E75",cursor:"pointer",fontSize:12}}>PDF</button>
                <button onClick={ev=>{ev.stopPropagation();delE(e.id);}} style={{padding:"5px 10px",borderRadius:8,border:"0.5px solid #D85A3040",background:"transparent",color:"#D85A30",cursor:"pointer",fontSize:12}}>✕</button>
              </div>
            </div>
            {viewIdx===i&&<div style={{fontSize:13,lineHeight:1.7,marginTop:12,paddingTop:12,borderTop:"0.5px solid #333"}} dangerouslySetInnerHTML={{__html:renderMd(e.testo)}}/>}

        ))}

    )}

}

// ─── PREVISIONI ──────────────────────────────────────────────────────────────
function PrevisioniTab({holdings,totalValue,bancaLabel}){
  const[scenarios,setScenarios]=useState(null);
  const[loading,setLoading]=useState(false);
  const[perTitolo,setPerTitolo]=useState([]);
  const[storico,setStorico]=useState(()=>{try{return JSON.parse(localStorage.getItem("portfolio_previsioni")||"[]");}catch{return[];}});
  const[viewIdx,setViewIdx]=useState(null);

  const rendP=holdings.length>0?holdings.reduce((s,h)=>s+getRend(h)*(h.controvaloreAttuale||0),0)/totalValue:0;
  const today=new Date();
  const months=[];for(let m=today.getMonth();m<=11;m++)months.push(["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"][m]);
  const proj=rate=>months.map((_,i)=>Math.round(totalValue*Math.pow(1+rate/100/12,i)));
  const SC={base:"#1D9E75",ottimistico:"#7F77DD",pessimistico:"#D85A30"};

  const saveS=json=>{
    const e={id:Date.now(),data:new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}),banca:bancaLabel,json};
    const u=[e,...storico].slice(0,5);setStorico(u);localStorage.setItem("portfolio_previsioni",JSON.stringify(u));
  };
  const delE=id=>{const u=storico.filter(e=>e.id!==id);setStorico(u);localStorage.setItem("portfolio_previsioni",JSON.stringify(u));setViewIdx(null);};
  const delAll=()=>{setStorico([]);localStorage.removeItem("portfolio_previsioni");setViewIdx(null);};

  const exportPDF=entry=>{
    const j=entry.json;
    const scenariHTML=["ottimistico","base","pessimistico"].map(key=>{
      const s=j[key];
      return `<div style="margin-bottom:12px;padding:10px;border-left:3px solid #333"><strong>${s.nome}</strong> — ${s.rendimento>=0?"+":""}${s.rendimento.toFixed(1)}%<br/>${s.motivazione}</div>`;
    }).join("");
    const raccHTML=(j.raccomandazioni||[]).map((r,i)=>`<div>${i+1}. ${r}</div>`).join("");
    document.getElementById("print-area").innerHTML=`
      <h2>Previsioni Portafoglio — ${entry.banca}</h2>
      <div class="pm">Data: ${entry.data}</div>
      <div class="pb">
        <p style="font-style:italic;color:#555;margin-bottom:12px">${j.contesto||""}</p>
        <strong>Scenari 2026</strong>${scenariHTML}
        <strong>Raccomandazioni</strong><div style="margin-top:8px">${raccHTML}</div>
      </div>
      <div class="pf">Portfolio Analyzer · ${new Date().toLocaleDateString("it-IT")} · Solo scopo informativo, non costituisce consulenza finanziaria.</div>`;
    window.print();
  };

  const run=async()=>{
    setLoading(true);setScenarios(null);setViewIdx(null);
    const catBD={};holdings.forEach(h=>{catBD[h.categoria]=(catBD[h.categoria]||0)+(h.controvaloreAttuale||0);});
    try{
      const text=await callAI("Sei un consulente finanziario italiano. Rispondi SOLO con JSON valido, senza testo prima o dopo.",`Portafoglio bilanciato, aprile 2026. Totale €${Math.round(totalValue).toLocaleString("it-IT")}. Rendimento medio: ${rendP.toFixed(2)}%. Composizione: ${Object.entries(catBD).map(([k,v])=>`${k} ${Math.round(v/totalValue*100)}%`).join(", ")}. Contesto: tensioni USA-Cina, BCE ferma. JSON: {"contesto":"...","base":{"nome":"Scenario Base","rendimento":7.5,"motivazione":"..."},"ottimistico":{"nome":"Scenario Ottimistico","rendimento":11.0,"motivazione":"..."},"pessimistico":{"nome":"Scenario Pessimistico","rendimento":2.5,"motivazione":"..."},"raccomandazioni":["...","...","..."]}`,1200);
      const json=extractJSON(text);
      setScenarios(json);saveS(json);
      setPerTitolo(holdings.filter(h=>h.controvaloreAttuale>0).map(h=>{const r=getRend(h);return{...h,r,v6:h.controvaloreAttuale*Math.pow(1+r/100/12,6),v12:h.controvaloreAttuale*Math.pow(1+r/100/12,12)};}).sort((a,b)=>b.controvaloreAttuale-a.controvaloreAttuale));
    }catch(e){setScenarios({error:`Errore: ${e.message}`});}
    setLoading(false);
  };

  const displayScenarios=viewIdx!==null?storico[viewIdx]?.json:scenarios;

  return(<div>
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
      {[{l:"Valore oggi",v:fmtEur(totalValue),s:new Date().toLocaleDateString("it-IT")},{l:"Rendimento medio storico",v:fmtPct(rendP),s:"ponderato per controvalore"},{l:"Mesi rimanenti 2026",v:(12-today.getMonth()).toString(),s:"fino a dicembre"}].map((c,i)=>(
        <div key={i} style={{background:"#1e2235",borderRadius:12,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:13,color:"#aaa"}}>{c.l}<br/><span style={{fontSize:11,color:"#666"}}>{c.s}</span></div>
          <div style={{fontSize:22,fontWeight:700}}>{c.v}</div>
        </div>
      ))}
    </div>
    {displayScenarios&&!displayScenarios.error&&(
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
        {["ottimistico","base","pessimistico"].map(key=>{
          const s=displayScenarios[key],color=SC[key],val=proj(s.rendimento).at(-1);
          return(<div key={key} style={{background:"#1e2235",borderRadius:12,padding:"14px 16px",borderLeft:`3px solid ${color}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{flex:1,marginRight:12}}><div style={{fontSize:12,color:"#888"}}>{s.nome}</div><div style={{fontSize:11,color:"#aaa",marginTop:4}}>{s.motivazione}</div></div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:18,fontWeight:700,color}}>{fmtEur(val)}</div>
                <div style={{fontSize:12,color:"#888"}}>{s.rendimento>=0?"+":""}{s.rendimento.toFixed(1)}%</div>
              </div>
            </div>
          </div>);
        })}
      </div>
    )}
    <Section>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontWeight:600,fontSize:15}}>Scenari AI</div><div style={{fontSize:11,color:"#888"}}>Gemini analizza il contesto 2026</div></div>
        <button onClick={run} disabled={loading} style={{padding:"10px 16px",borderRadius:10,border:"0.5px solid #444",background:"#2a2a3e",color:"white",cursor:loading?"not-allowed":"pointer",fontSize:13,fontWeight:500}}>{loading?"In corso…":scenarios?"Aggiorna":"Avvia"}</button>
      </div>
      {displayScenarios?.error&&<div style={{color:"#D85A30",fontSize:13,marginTop:12}}>{displayScenarios.error}</div>}
      {displayScenarios&&!displayScenarios.error&&displayScenarios.raccomandazioni&&(
        <div style={{marginTop:16,paddingTop:16,borderTop:"0.5px solid #2a2a3e"}}>
          {viewIdx!==null&&<div style={{fontSize:11,color:"#888",marginBottom:10,fontStyle:"italic"}}>📅 {storico[viewIdx]?.data} · {storico[viewIdx]?.totale}</div>}
          <div style={{fontSize:13,color:"#888",fontStyle:"italic",marginBottom:12}}>{displayScenarios.contesto}</div>
          <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>Raccomandazioni</div>
          {displayScenarios.raccomandazioni.map((r,i)=>(
            <div key={i} style={{display:"flex",gap:10,marginBottom:8,fontSize:13}}>
              <span style={{color:"#1D9E75",fontWeight:600,flexShrink:0}}>{i+1}.</span>
              <span style={{color:"#aaa",lineHeight:1.6}}>{r}</span>
            </div>
          ))}
        </div>
      )}
      {!displayScenarios&&!loading&&<div style={{fontSize:13,color:"#888",fontStyle:"italic",marginTop:12}}>Clicca "Avvia" per generare scenari di previsione AI.</div>}
    </Section>
    {storico.length>0&&(
      <Section>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{fontWeight:600,fontSize:14}}>Storico ({storico.length}/5)</div>
          <button onClick={delAll} style={{padding:"5px 10px",borderRadius:8,border:"0.5px solid #D85A3040",background:"transparent",color:"#D85A30",cursor:"pointer",fontSize:12}}>Cancella tutto</button>
        </div>
        {storico.map((e,i)=>(
          <div key={e.id} onClick={()=>setViewIdx(viewIdx===i?null:i)} style={{padding:"12px",borderRadius:10,marginBottom:8,background:viewIdx===i?"#2a2a3e":"#12121e",border:viewIdx===i?"0.5px solid #7F77DD":"0.5px solid #2a2a3e",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:13,fontWeight:500}}>{e.data}</div><div style={{fontSize:12,color:"#1D9E75",marginTop:2}}>{e.banca||"—"}</div></div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={ev=>{ev.stopPropagation();exportPDF(e);}} style={{padding:"5px 10px",borderRadius:8,border:"0.5px solid #1D9E7540",background:"transparent",color:"#1D9E75",cursor:"pointer",fontSize:12}}>PDF</button>
                <button onClick={ev=>{ev.stopPropagation();delE(e.id);}} style={{padding:"5px 10px",borderRadius:8,border:"0.5px solid #D85A3040",background:"transparent",color:"#D85A30",cursor:"pointer",fontSize:12}}>✕</button>
              </div>
            </div>
          </div>
        ))}
      </Section>
    )}
    {perTitolo.length>0&&(
      <Section title="Stima per titolo">
        {perTitolo.map((h,i)=>(
          <div key={i} style={{padding:"10px 0",borderBottom:i<perTitolo.length-1?"0.5px solid #2a2a3e":"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div style={{flex:1,marginRight:12}}><div style={{fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.nome}</div><div style={{fontSize:11,color:"#888",marginTop:2}}>{h.categoria} · rend. {fmtPct(h.r)}</div></div>
              <div style={{fontSize:14,fontWeight:600,flexShrink:0}}>{fmtEur(h.controvaloreAttuale)}</div>
            </div>
            <div style={{display:"flex",gap:12}}>
              <div style={{flex:1,background:"#2a2a3e",borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:10,color:"#888"}}>+6 mesi</div><div style={{fontSize:14,fontWeight:600,color:h.v6>=h.controvaloreAttuale?"#1D9E75":"#D85A30"}}>{fmtEur(h.v6)}</div></div>
              <div style={{flex:1,background:"#2a2a3e",borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:10,color:"#888"}}>+12 mesi</div><div style={{fontSize:14,fontWeight:600,color:h.v12>=h.controvaloreAttuale?"#1D9E75":"#D85A30"}}>{fmtEur(h.v12)}</div></div>
            </div>
          </div>
        ))}
      </Section>
    )}
  </div>);
}

// ─── AZIONI ──────────────────────────────────────────────────────────────────
function AzioniTab({holdings,totalValue,byCat,bancaLabel}){
  const[actions,setActions]=useState(null);
  const[loading,setLoading]=useState(false);
  const[expanded,setExpanded]=useState(null);
  const[filterTipo,setFilterTipo]=useState("tutti");
  const[storico,setStorico]=useState(()=>{try{return JSON.parse(localStorage.getItem("portfolio_azioni")||"[]");}catch{return[];}});
  const[viewIdx,setViewIdx]=useState(null);

  const az=Object.entries(byCat).filter(([k])=>k.toLowerCase().startsWith("azion")).reduce((s,[,v])=>s+v,0);
  const ob=Object.entries(byCat).filter(([k])=>k.toLowerCase().startsWith("obblig")).reduce((s,[,v])=>s+v,0);
  const pAz=totalValue>0?(az/totalValue*100).toFixed(1):0;
  const pOb=totalValue>0?(ob/totalValue*100).toFixed(1):0;

  const saveS=json=>{
    const e={id:Date.now(),data:new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}),banca:bancaLabel,json};
    const u=[e,...storico].slice(0,5);setStorico(u);localStorage.setItem("portfolio_azioni",JSON.stringify(u));
  };
  const delE=id=>{const u=storico.filter(e=>e.id!==id);setStorico(u);localStorage.setItem("portfolio_azioni",JSON.stringify(u));setViewIdx(null);};
  const delAll=()=>{setStorico([]);localStorage.removeItem("portfolio_azioni");setViewIdx(null);};

  const exportPDF=entry=>{
    const j=entry.json;
    const titoliHTML=(j.titoli||[]).map(t=>`<div style="margin-bottom:10px;padding:8px;border-left:3px solid #ccc"><strong>${t.nome}</strong> — <em>${t.azione}</em> (priorità: ${t.priorita})<br/>${t.motivazione}<br/><strong>Cosa fare:</strong> ${t.cosa_fare}</div>`).join("");
    document.getElementById("print-area").innerHTML=`
      <h2>Piano d'Azione — ${entry.banca}</h2>
      <div class="pm">Data: ${entry.data}</div>
      <div class="pb">
        <p style="font-style:italic;color:#555;margin-bottom:12px">${j.sommario||""}</p>
        ${j.ribilanciamento?`<p style="margin-bottom:12px"><strong>Ribilanciamento:</strong> ${j.ribilanciamento}</p>`:""}
        <strong>Titoli</strong><div style="margin-top:8px">${titoliHTML}</div>
      </div>
      <div class="pf">Portfolio Analyzer · ${new Date().toLocaleDateString("it-IT")} · Solo scopo informativo, non costituisce consulenza finanziaria.</div>`;
    window.print();
  };

  const run=async()=>{
    setLoading(true);setActions(null);setExpanded(null);setViewIdx(null);
    const righe=holdings.filter(h=>h.controvaloreAttuale>0).map((h,i)=>{
      const nome=h.nome.length>40?h.nome.slice(0,40):h.nome;
      const peso=totalValue>0?(h.controvaloreAttuale/totalValue*100).toFixed(1):0;
      return `${i+1}. ${nome} [${h.banca}] | ${h.categoria} | €${Math.round(h.controvaloreAttuale)} (${peso}%) | rend:${h.rendimentoAnnuo!=null?h.rendimentoAnnuo+"%":"n/d"}`;
    }).join("\n");
    try{
      const text=await callAI("Sei un consulente finanziario italiano. Rispondi SOLO con JSON valido, senza testo prima o dopo.",`Portafoglio BILANCIATO, aprile 2026. Totale €${Math.round(totalValue).toLocaleString("it-IT")}. Azionario ${pAz}% (target 50-65%), Obbligazionario ${pOb}% (target 30-45%). Contesto: tensioni USA-Cina, BCE ferma.\n\nTITOLI:\n${righe}\n\nPer ogni titolo azione (vendi/monitora/mantieni/incrementa/switch) e priorità (alta/media/bassa). JSON: {"sommario":"...","ribilanciamento":"...","titoli":[{"nome":"...","azione":"mantieni","priorita":"media","motivazione":"...","cosa_fare":"..."}]}`,4000);
      const json=extractJSON(text);
      if(!json.titoli||!Array.isArray(json.titoli))throw new Error("Struttura non valida");
      setActions(json);saveS(json);
    }catch(e){setActions({error:`Errore: ${e.message}`});}
    setLoading(false);
  };

  const displayActions=viewIdx!==null?storico[viewIdx]?.json:actions;
  const tf=displayActions?.titoli?.filter(t=>filterTipo==="tutti"||t.azione===filterTipo)??[];
  const cnt=displayActions?.titoli?Object.keys(AZIONE_META).reduce((a,k)=>{a[k]=displayActions.titoli.filter(t=>t.azione===k).length;return a;},{}):{}; 

  return(<div>
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
      {[{l:"Azionario",v:pAz+"%",s:"target 50–65%",a:pAz>65||pAz<50},{l:"Obbligazionario",v:pOb+"%",s:"target 30–45%",a:pOb>45||pOb<30}].map((c,i)=>(
        <div key={i} style={{background:c.a?"#EF9F2710":"#1e2235",border:c.a?"0.5px solid #EF9F2740":"none",borderRadius:12,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:13,color:"#aaa"}}>{c.l}</div><div style={{fontSize:11,color:"#666",marginTop:2}}>{c.s}</div></div>
          <div style={{fontSize:26,fontWeight:700,color:c.a?"#EF9F27":"white"}}>{c.v}</div>
        </div>
      ))}
    </div>
    <Section>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontWeight:600,fontSize:15}}>Piano d'Azione AI</div><div style={{fontSize:11,color:"#888"}}>{holdings.filter(h=>h.controvaloreAttuale>0).length} titoli da analizzare</div></div>
        <button onClick={run} disabled={loading} style={{padding:"10px 16px",borderRadius:10,border:"0.5px solid #444",background:"#2a2a3e",color:"white",cursor:loading?"not-allowed":"pointer",fontSize:13,fontWeight:500}}>{loading?"In corso…":actions?"Aggiorna":"Avvia"}</button>
      </div>
      {!displayActions&&!loading&&<div style={{fontSize:13,color:"#888",fontStyle:"italic",marginTop:12}}>Clicca "Avvia" per ottenere il piano d'azione titolo per titolo.</div>}
      {loading&&<div style={{fontSize:13,color:"#888",marginTop:12}}>Gemini sta analizzando ogni titolo…</div>}
      {displayActions?.error&&<div style={{color:"#D85A30",fontSize:13,marginTop:12}}>{displayActions.error}</div>}
      {displayActions&&!displayActions.error&&(
        <div style={{marginTop:16,paddingTop:16,borderTop:"0.5px solid #2a2a3e"}}>
          {viewIdx!==null&&<div style={{fontSize:11,color:"#888",marginBottom:10,fontStyle:"italic"}}>📅 {storico[viewIdx]?.data} · {storico[viewIdx]?.totale}</div>}
          <div style={{fontSize:13,color:"#aaa",fontStyle:"italic",marginBottom:12}}>{displayActions.sommario}</div>
          {displayActions.ribilanciamento&&<div style={{background:"#12121e",border:"0.5px solid #7F77DD40",borderRadius:10,padding:"10px 12px",marginBottom:14,fontSize:13}}><span style={{fontWeight:600,color:"#7F77DD",marginRight:6}}>Ribilanciamento:</span><span style={{color:"#aaa"}}>{displayActions.ribilanciamento}</span></div>}

            {Object.entries(AZIONE_META).filter(([k])=>(cnt[k]??0)>0).map(([key,meta])=>(
              <button key={key} onClick={()=>setFilterTipo(key)} style={{padding:"5px 12px",borderRadius:20,fontSize:12,cursor:"pointer",border:filterTipo===key?`1px solid ${meta.color}`:`0.5px solid ${meta.color}40`,background:filterTipo===key?meta.bg:"transparent",color:meta.color}}>

            ))}
          </div>
        </div>
      )}

    {/* Storico */}

        </div>
        {storico.map((e,i)=>(
          <div key={e.id} onClick={()=>{setViewIdx(viewIdx===i?null:i);setExpanded(null);}} style={{padding:"12px",borderRadius:10,marginBottom:8,background:viewIdx===i?"#2a2a3e":"#12121e",border:viewIdx===i?"0.5px solid #7F77DD":"0.5px solid #2a2a3e",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:13,fontWeight:500}}>{e.data}</div><div style={{fontSize:12,color:"#1D9E75",marginTop:2}}>{e.banca||"—"}</div><div style={{fontSize:11,color:"#888",marginTop:1}}>{e.json?.titoli?.length??0} titoli</div></div>

              </div>
            </div>
          </div>
        ))}
      </Section>
    )}

            <div style={{display:"flex",alignItems:"center",gap:10}}>

              <div style={{width:7,height:7,borderRadius:"50%",flexShrink:0,background:t.priorita==="alta"?"#D85A30":t.priorita==="media"?"#EF9F27":"#888"}}/>
              <div style={{flex:1,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.nome}</div>
              <div style={{fontSize:12,color:"#888",flexShrink:0}}>{open?"▲":"▼"}</div>
            </div>
            {h&&<div style={{fontSize:13,color:"#888",marginTop:6}}>{fmtEur(h.controvaloreAttuale)} · {totalValue>0?(h.controvaloreAttuale/totalValue*100).toFixed(1):"—"}%</div>}
          </div>
          {open&&(<div style={{padding:"0 14px 14px",borderTop:"0.5px solid #2a2a3e"}}>
            <div style={{paddingTop:12,display:"flex",flexDirection:"column",gap:12}}>
              <div><div style={{fontSize:11,color:"#888",fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Motivazione</div><div style={{fontSize:13,lineHeight:1.7,color:"#ccc"}}>{t.motivazione}</div></div>
              <div style={{background:meta.bg,borderRadius:10,padding:"12px",border:`0.5px solid ${meta.color}30`}}>
                <div style={{fontSize:11,color:meta.color,fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Cosa fare</div>
                <div style={{fontSize:13,lineHeight:1.7}}>{t.cosa_fare}</div>
              </div>
            </div>
          </div>)}
        </div>);
      })}
    </div>)}
  </div>);
}

// ─── MANUALE ─────────────────────────────────────────────────────────────────
function Manuale({onClose}){
  const isMobile=useIsMobile();
  const sections=[
    {title:"1. Come avviare l'app",content:[
      {type:"body",text:"L'app è contenuta in un singolo file <b>index.html</b>. Per usarla:"},
      {type:"steps",items:["Apri <b>Visual Studio Code</b>","Installa l'estensione <b>Live Server</b> (se non già installata)","Apri la cartella contenente <b>index.html</b>","Tasto destro su index.html → <b>Open with Live Server</b>","Il browser si apre su <b>http://localhost:5500</b>"]},
      {type:"warning",text:"⚠ Non aprire il file con doppio click — alcune funzionalità AI e prezzi live richiedono Live Server per funzionare correttamente."},
    ]},
    {title:"2. Impostazioni",content:[
      {type:"h2",text:"API Key Google (Gemini)"},
      {type:"body",text:"Inserisci la tua API key Google AI Studio nel campo dedicato. Necessaria per Analisi, Previsioni e Azioni. Ottienila su: <b>aistudio.google.com → Get API Key → Create API Key</b>"},
      {type:"warning",text:"⚠ La key va reinserita ad ogni apertura del browser — non viene salvata per motivi di sicurezza."},
      {type:"h2",text:"Aggiorna dati banche"},
      {type:"body",text:"Quando ricevi nuovi estratti conto, carica un CSV nella sezione 'Aggiorna dati'. Colonne richieste: Nome; ISIN; Quantità; Prezzo_Carico; Prezzo_Attuale; Categoria."},
      {type:"h2",text:"Prezzi live (benchmark)"},
      {type:"body",text:"Clicca 'Carica prezzi live' per stimare il valore attuale del portafoglio. L'app applica la variazione % degli ETF benchmark ai controvalori del 29/04/2026."},
      {type:"tip",text:"⚠ La stima è indicativa — non riflette il NAV reale dei tuoi fondi."},
    ]},
    {title:"3. Navigazione",content:[
      {type:"body",text:"Su iPhone la navigazione avviene tramite la <b>tab bar in basso</b>. Su desktop i tab sono in alto a destra."},
      {type:"table",headers:["Tab","Descrizione"],rows:[
        ["Dashboard","Panoramica: valore totale, P&L, asset allocation, top 5 posizioni"],
        ["Titoli","Lista completa con filtri per banca, categoria e ricerca"],
        ["Analisi","Analisi AI con rischi, opportunità e raccomandazioni"],
        ["Previsioni","Scenari AI per fine 2026 (ottimistico, base, pessimistico)"],
        ["Azioni","Piano d'azione titolo per titolo generato da Gemini"],
        ["Impostazioni","API key, aggiornamento dati, prezzi live, totali per banca"],
      ]},
    ]},
    {title:"4. Analisi, Previsioni e Azioni AI",content:[
      {type:"h2",text:"Filtro banca"},
      {type:"body",text:"In cima a ciascuna tab AI trovi i pulsanti per selezionare quale banca analizzare: Tutto, Mediolanum, BPER Banca o Poste Italiane. La liquidità (C/C e libretti) viene sempre esclusa."},
      {type:"h2",text:"Storico"},
      {type:"body",text:"Ogni analisi/previsione/azione viene salvata automaticamente (max 5 per tab). Lo storico mostra data, ora e banca analizzata. Clicca su una voce per visualizzarla."},
      {type:"h2",text:"Export PDF"},
      {type:"steps",items:["Scorri fino allo Storico nella tab desiderata","Clicca il pulsante verde <b>PDF</b> accanto alla voce","Si apre la finestra di stampa del browser","Seleziona <b>'Salva come PDF'</b> e salva"]},
      {type:"tip",text:"💡 Usa 'Rigenera' per aggiornare l'analisi quando cambiano le condizioni di mercato."},
    ]},
    {title:"5. Note importanti",content:[
      {type:"warning",text:"📊 I dati sono aggiornati al 29/04/2026. Per aggiornare, carica un nuovo CSV dalla tab Impostazioni."},
      {type:"warning",text:"💾 Lo storico è salvato nel browser locale. Non è accessibile da altri dispositivi. Se cancelli la cache del browser, lo storico verrà perso."},
      {type:"tip",text:"🤖 Le analisi AI hanno scopo puramente informativo e non costituiscono consulenza finanziaria. Per decisioni di investimento, consulta sempre il tuo consulente."},
    ]},
  ];

  const renderContent=items=>items.map((item,i)=>{
    if(item.type==="body")return <p key={i} style={{fontSize:13,lineHeight:1.7,color:"#ccc",marginBottom:10}} dangerouslySetInnerHTML={{__html:item.text}}/>;
    if(item.type==="h2")return <p key={i} style={{fontSize:13,fontWeight:700,color:"#378ADD",marginTop:12,marginBottom:6}}>{item.text}</p>;
    if(item.type==="steps")return <ol key={i} style={{paddingLeft:20,marginBottom:10}}>{item.items.map((s,j)=><li key={j} style={{fontSize:13,color:"#ccc",lineHeight:1.7,marginBottom:4}} dangerouslySetInnerHTML={{__html:s}}/>)}</ol>;
    if(item.type==="warning")return <div key={i} style={{background:"#EF9F2710",border:"0.5px solid #EF9F2740",borderRadius:8,padding:"10px 12px",marginBottom:10,fontSize:12,color:"#EF9F27",lineHeight:1.6}}>{item.text}</div>;
    if(item.type==="tip")return <div key={i} style={{background:"#1D9E7510",border:"0.5px solid #1D9E7540",borderRadius:8,padding:"10px 12px",marginBottom:10,fontSize:12,color:"#1D9E75",lineHeight:1.6}}>{item.text}</div>;
    if(item.type==="table")return(
      <div key={i} style={{overflowX:"auto",marginBottom:10}}>
        <table style={{width:"100%",fontSize:12,borderCollapse:"collapse"}}>
          <thead><tr>{item.headers.map((h,j)=><th key={j} style={{textAlign:"left",padding:"7px 10px",background:"#2a2a3e",color:"#1D9E75",fontWeight:600,borderBottom:"1px solid #333"}}>{h}</th>)}</tr></thead>
          <tbody>{item.rows.map((row,j)=><tr key={j} style={{borderBottom:"0.5px solid #2a2a3e"}}>{row.map((cell,k)=><td key={k} style={{padding:"8px 10px",color:k===0?"white":"#aaa",fontWeight:k===0?500:400,lineHeight:1.5}}>{cell}</td>)}</tr>)}</tbody>
        </table>
      </div>
    );
    return null;
  });

  return(
    <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#1a1a2e",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:680,maxHeight:"92vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 20px 14px",borderBottom:"0.5px solid #2a2a3e",flexShrink:0}}>
          <div>
            <div style={{fontSize:18,fontWeight:700}}>Manuale d'uso</div>
            <div style={{fontSize:12,color:"#888",marginTop:2}}>Portfolio Analyzer v2.0</div>
          </div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:"50%",border:"none",background:"#2a2a3e",color:"#888",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        {/* Content scrollabile */}
        <div style={{overflowY:"auto",padding:"16px 20px 32px",flex:1}}>
          {sections.map((s,i)=>(
            <div key={i} style={{marginBottom:24}}>
              <div style={{fontSize:15,fontWeight:700,color:"#1D9E75",marginBottom:12,paddingBottom:8,borderBottom:"0.5px solid #2a2a3e"}}>{s.title}</div>
              {renderContent(s.content)}
            </div>
          ))}
          <div style={{fontSize:11,color:"#555",textAlign:"center",paddingTop:8}}>Portfolio Analyzer v2.0 · Sviluppato con Claude (Anthropic)</div>
        </div>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const[bankData,setBankData]=useState({MD:MD_DATA,BPER:BPER_DATA,PI:PI_DATA});
  const[tab,setTab]=useState("dashboard");
  const[sortCol,setSortCol]=useState("controvaloreAttuale");
  const[sortDir,setSortDir]=useState("desc");
  const[fBank,setFBank]=useState("all");
  const[fCat,setFCat]=useState("all");
  const[search,setSearch]=useState("");
  const[apiKey,setApiKey]=useState("");
  const[showKey,setShowKey]=useState(false);
  const[bankAI,setBankAI]=useState("all");
  const[showManual,setShowManual]=useState(false);
  const isMobile=useIsMobile();

  const all=Object.values(bankData).flat();
  const live=useLivePrices(all);

  const aiAll=bankAI==="all"?all:all.filter(h=>h.banca===bankAI);
  const aiH=aiAll.filter(h=>!isLiq(h));
  const aiLiq=aiAll.filter(h=>isLiq(h));
  const aiTotal=aiH.reduce((s,h)=>s+(h.controvaloreAttuale||0),0);
  const aiLiqTotal=aiLiq.reduce((s,h)=>s+(h.controvaloreAttuale||0),0);
  const aiByCat={};aiH.forEach(h=>{if(h.controvaloreAttuale)aiByCat[h.categoria]=(aiByCat[h.categoria]||0)+h.controvaloreAttuale;});
  const aiCatData=Object.entries(aiByCat).map(([label,value])=>({label,value,color:CAT_COLORS[label]||"#888"})).sort((a,b)=>b.value-a.value);

  const totalValue=all.reduce((s,h)=>s+(h.controvaloreAttuale||0),0);
  const totalPL=all.reduce((s,h)=>s+(h.plusMinus||0),0);
  const totalInv=all.reduce((s,h)=>s+(h.prezzoCarico&&h.quantita?h.prezzoCarico*h.quantita:(h.controvaloreAttuale||0)-(h.plusMinus||0)),0);
  const totalPLpct=totalInv>0?(totalPL/totalInv)*100:null;
  const byBank=Object.keys(BANKS).map(k=>({name:BANKS[k].name,code:k,color:BANKS[k].color,value:(bankData[k]||[]).reduce((s,h)=>s+(h.controvaloreAttuale||0),0)})).filter(b=>b.value>0);
  const byCat={};all.forEach(h=>{if(h.controvaloreAttuale)byCat[h.categoria]=(byCat[h.categoria]||0)+h.controvaloreAttuale;});
  const catData=Object.entries(byCat).map(([label,value])=>({label,value,color:CAT_COLORS[label]||"#888"})).sort((a,b)=>b.value-a.value);
  const categories=[...new Set(all.map(h=>h.categoria))];
  const handleSort=col=>{if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortCol(col);setSortDir("desc");}};
  const filtered=all.filter(h=>fBank==="all"||h.banca===fBank).filter(h=>fCat==="all"||h.categoria===fCat).filter(h=>!search||h.nome.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>{const va=a[sortCol]??-Infinity,vb=b[sortCol]??-Infinity;return sortDir==="asc"?(va>vb?1:-1):(va<vb?1:-1);});

  const TABS=[
    {id:"dashboard",icon:"⊞",label:"Dashboard"},
    {id:"titoli",icon:"≡",label:"Titoli"},
    {id:"analisi",icon:"◑",label:"Analisi"},
    {id:"previsioni",icon:"↗",label:"Previsioni"},
    {id:"azioni",icon:"⚡",label:"Azioni"},
    {id:"impostazioni",icon:"⚙",label:"Impostazioni"},
  ];

  const AIFilter=()=>(
    <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
      {["all",...Object.keys(BANKS)].map(code=>{
        const val=code==="all"?all.filter(h=>!isLiq(h)).reduce((s,h)=>s+(h.controvaloreAttuale||0),0):(bankData[code]||[]).filter(h=>!isLiq(h)).reduce((s,h)=>s+(h.controvaloreAttuale||0),0);
        return(<button key={code} onClick={()=>setBankAI(code)} style={{padding:"7px 14px",borderRadius:20,fontSize:12,cursor:"pointer",border:bankAI===code?`1px solid ${code==="all"?"#888":BANKS[code]?.color}`:"0.5px solid #333",background:bankAI===code?(code==="all"?"#2a2a3e":`${BANKS[code]?.color}20`):"transparent",color:code==="all"?"white":BANKS[code]?.color??"white",fontWeight:bankAI===code?600:400}}>
          {code==="all"?"Tutto":BANKS[code].name}
        </button>);
      })}
    </div>
  );

  const LiqBox=()=>aiLiqTotal>0?(<div style={{background:"#1e2235",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
    <span style={{fontSize:13,color:"#888"}}>💰 Liquidità (esclusa)</span>
    <span style={{fontSize:14,fontWeight:600,color:"#A0A0B0"}}>{fmtEur(aiLiqTotal)}</span>
  </div>):null;

  // Tab bar mobile (bottom) o top (desktop)
  const TabBar=()=>isMobile?(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0e0e1a",borderTop:"0.5px solid #2a2a3e",display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
      {TABS.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"8px 2px",background:"transparent",border:"none",color:tab===t.id?"#1D9E75":"#666",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <span style={{fontSize:16}}>{t.icon}</span>
          <span style={{fontSize:9,fontWeight:tab===t.id?600:400}}>{t.label}</span>
        </button>
      ))}
    </div>
  ):(
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"7px 14px",borderRadius:8,border:"0.5px solid #444",background:tab===t.id?"#1e2235":"transparent",color:tab===t.id?"white":"#888",cursor:"pointer",fontSize:13,fontWeight:tab===t.id?500:400}}>{t.label}</button>)}
    </div>
  );

  return(<div style={{fontFamily:"system-ui,sans-serif",background:"#12121e",color:"white",minHeight:"100vh",maxWidth:"100vw",overflowX:"hidden"}}>
    <div style={{maxWidth:940,margin:"0 auto",padding:isMobile?"12px 12px 90px":"1.5rem"}}>
      {showManual&&<Manuale onClose={()=>setShowManual(false)}/>}
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.25rem",flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{margin:0,fontSize:isMobile?20:22,fontWeight:700}}>Portfolio Analyzer</h1>
          <div style={{fontSize:12,color:"#888"}}>Profilo bilanciato · {new Date().toLocaleDateString("it-IT")}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {!isMobile&&<TabBar/>}
          <button onClick={()=>setShowManual(true)} style={{width:34,height:34,borderRadius:"50%",border:"0.5px solid #444",background:"#2a2a3e",color:"#aaa",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}} title="Manuale d'uso">?</button>
        </div>
      </div>

      {/* Content */}
      {tab==="dashboard"&&<DashboardTab all={all} totalValue={totalValue} totalPL={totalPL} totalPLpct={totalPLpct} byBank={byBank} catData={catData} live={live}/>}
      {tab==="titoli"&&<TitoliTab filtered={filtered} sortCol={sortCol} sortDir={sortDir} handleSort={handleSort} fBank={fBank} setFBank={setFBank} fCat={fCat} setFCat={setFCat} search={search} setSearch={setSearch} categories={categories} live={live} totalValue={totalValue}/>}
      {tab==="analisi"&&<><AIFilter/><LiqBox/><AnalisiTab holdings={aiH} totalValue={aiTotal} byCat={aiByCat} catData={aiCatData} bancaLabel={bankAI==="all"?"Tutto il portafoglio":BANKS[bankAI]?.name}/></>}
      {tab==="previsioni"&&<><AIFilter/><LiqBox/><PrevisioniTab holdings={aiH} totalValue={aiTotal} bancaLabel={bankAI==="all"?"Tutto il portafoglio":BANKS[bankAI]?.name}/></>}
      {tab==="azioni"&&<><AIFilter/><LiqBox/><AzioniTab holdings={aiH} totalValue={aiTotal} byCat={aiByCat} bancaLabel={bankAI==="all"?"Tutto il portafoglio":BANKS[bankAI]?.name}/></>}
      {tab==="impostazioni"&&<ImpostazioniTab bankData={bankData} setBankData={setBankData} apiKey={apiKey} setApiKey={setApiKey} showKey={showKey} setShowKey={setShowKey} byBank={byBank} totalValue={totalValue} live={live}/>}
    </div>
    {isMobile&&<TabBar/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App/>);
</script>
</body>
</html>
