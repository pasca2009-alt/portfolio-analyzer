  return new Intl.NumberFormat("it-IT", { minimumFractionDigits: dec, maximumFractionDigits: dec }).format(n);
};

const extractJSON = (text) => {
  const md = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (md) { try { return JSON.parse(md[1].trim()); } catch (_) {} }
  const s = text.indexOf("{");
  if (s !== -1) {
    let d = 0;
    for (let i = s; i < text.length; i++) {
      if (text[i] === "{") d++;
      else if (text[i] === "}") { d--; if (d === 0) return JSON.parse(text.slice(s, i + 1)); }
    }
  }
  throw new Error("Nessun JSON trovato");
};

const callClaude = async (system, userPrompt, maxTokens = 2000) => {
  const key = window._claudeApiKey || "";
  if (!key) throw new Error("API Key non inserita — inseriscila in cima alla pagina");
  const prompt = system ? `${system}\n\n${userPrompt}` : userPrompt;
  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { maxOutputTokens: maxTokens, temperature: 0.7 },
    }),
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error("Risposta vuota da Gemini");
  return text;
};

async function fetchYahoo(ticker) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1mo`;
  const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
  const resp = await fetch(proxy);
  const data = await resp.json();
  const result = data?.chart?.result?.[0];
  if (!result) throw new Error("no data");
  const timestamps = result.timestamp;
  const closes = result.indicators.quote[0].close;
  const refDate = new Date(DATA_RIF).getTime() / 1000;
  let refIdx = 0, minDiff = Infinity;
  timestamps.forEach((t, i) => { const d = Math.abs(t - refDate); if (d < minDiff) { minDiff = d; refIdx = i; } });
  const priceRef = closes[refIdx];
  const priceNow = closes[closes.length - 1];
  return { priceRef, priceNow, varPct: ((priceNow - priceRef) / priceRef) * 100, ticker };
}

function useLivePrices(holdings) {
  const [prices, setPrices] = useState({});
  const [loading, setLoading] = useState(false);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [error, setError] = useState(null);

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    const tickers = [...new Set(holdings.map(h => BENCHMARK[h.categoria]?.ticker).filter(Boolean))];
    const results = {}, errors = [];
    await Promise.all(tickers.map(async t => {
      try { results[t] = await fetchYahoo(t); } catch { errors.push(t); }
    }));
    setPrices(results);
    setLastUpdate(new Date());
    if (errors.length) setError(`N/D per: ${errors.join(", ")}`);
    setLoading(false);
  }, [holdings]);

  const enriched = holdings.map(h => {
    const bench = BENCHMARK[h.categoria];
    if (!bench?.ticker || !prices[bench.ticker]) return { ...h, stimato: null, varPct: null, benchmark: bench };
    const { varPct } = prices[bench.ticker];
    return { ...h, stimato: h.controvaloreAttuale * (1 + varPct / 100), varPct, benchmark: bench };
  });

  const totalStimato = enriched.reduce((s, h) => s + (h.stimato ?? h.controvaloreAttuale), 0);
  return { enriched, loading, lastUpdate, error, refresh, totalStimato };
}

function PieChart({ data, size = 150 }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  if (!total) return null;
  let cum = -Math.PI / 2;
  const R = size / 2 - 8;
  const cx = size / 2, cy = size / 2;
  const slices = data.map(d => {
    const angle = (d.value / total) * 2 * Math.PI;
    const x1 = cx + R * Math.cos(cum), y1 = cy + R * Math.sin(cum);
    cum += angle;
    const x2 = cx + R * Math.cos(cum), y2 = cy + R * Math.sin(cum);
    return { ...d, x1, y1, x2, y2, large: angle > Math.PI ? 1 : 0 };
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {slices.map((s, i) => (
        <path key={i} d={`M${cx} ${cy} L${s.x1} ${s.y1} A${R} ${R} 0 ${s.large} 1 ${s.x2} ${s.y2}Z`}
          fill={s.color} opacity={0.9} stroke="#00000020" strokeWidth={1} />
      ))}
      <circle cx={cx} cy={cy} r={R * 0.45} fill="#12121e" />
    </svg>
  );
}

function LineChart({ months, series, height = 180 }) {
  const W = 560, H = height, PL = 52, PR = 12, PT = 12, PB = 28;
  const allVals = series.flatMap(s => s.data);
  const minV = Math.min(...allVals) * 0.995, maxV = Math.max(...allVals) * 1.005;
  const xS = i => PL + (i / (months.length - 1)) * (W - PL - PR);
  const yS = v => PT + (1 - (v - minV) / (maxV - minV)) * (H - PT - PB);
  const path = data => data.map((v, i) => `${i === 0 ? "M" : "L"}${xS(i).toFixed(1)} ${yS(v).toFixed(1)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: H, display: "block" }}>
      {[0,1,2,3,4].map(i => {
        const v = minV + (i / 4) * (maxV - minV), y = yS(v);
        return <g key={i}>
          <line x1={PL} x2={W-PR} y1={y} y2={y} stroke="#ffffff10" strokeWidth={0.5} />
          <text x={PL-4} y={y+4} textAnchor="end" fontSize={10} fill="#888">{Math.round(v/1000)}k</text>
        </g>;
      })}
      {months.map((m, i) => (
        <text key={i} x={xS(i)} y={H-6} textAnchor="middle" fontSize={10} fill="#888">{m}</text>
      ))}
      {series.map((s, i) => (
        <path key={i} d={path(s.data)} fill="none" stroke={s.color}
          strokeWidth={s.width ?? 1.5} strokeDasharray={s.dash ?? "none"} opacity={s.opacity ?? 1} />
      ))}
    </svg>
  );
}

function UploadZone({ bankCode, onData, hasData }) {
  const [dragging, setDragging] = useState(false);
  const ref = useRef();
  const bank = BANKS[bankCode];

  const parse = (text) => {
    const lines = text.trim().split("\n");
    const header = lines[0].split(";").map(h => h.trim().replace(/^\uFEFF/, ""));
    return lines.slice(1).map(line => {
      const vals = line.split(";");
      const o = {};
      header.forEach((h, i) => { o[h] = vals[i]?.trim() || ""; });
      const n = s => s ? parseFloat(s.replace(/\./g, "").replace(",", ".")) || null : null;
      return {
        nome: o.Nome || o.nome || "",
        isin: o.ISIN || o.isin || null,
        quantita: n(o["Quantità"] || o.quantita),
        prezzoCarico: n(o.Prezzo_Carico || o.prezzo_carico),
        controvaloreAttuale: n(o.Prezzo_Attuale || o.prezzo_attuale),
        categoria: o.Categoria || o.categoria || "Altro",
        banca: bankCode, plusMinus: null, rendimentoAnnuo: null,
      };
    }).filter(r => r.nome);
  };

  const handleFile = file => {
    const reader = new FileReader();
    reader.onload = e => { try { onData(parse(e.target.result)); } catch { alert("Errore CSV"); } };
    reader.readAsText(file, "UTF-8");
  };

  return (
    <div onClick={() => !hasData && ref.current?.click()}
      onDragOver={e => { e.preventDefault(); setDragging(true); }}
      onDragLeave={() => setDragging(false)}
      onDrop={e => { e.preventDefault(); setDragging(false); handleFile(e.dataTransfer.files[0]); }}
      style={{ border: `1.5px dashed ${hasData || dragging ? bank.color : "#444"}`, borderRadius: 10,
        padding: 14, cursor: hasData ? "default" : "pointer",
        background: hasData ? `${bank.color}15` : dragging ? `${bank.color}08` : "transparent",
        display: "flex", alignItems: "center", gap: 10, transition: "all .2s" }}>
      <div style={{ width: 34, height: 34, borderRadius: "50%", background: hasData ? bank.color : "#2a2a3e",
        display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
        <span style={{ color: hasData ? "white" : "#888", fontSize: 16 }}>{hasData ? "✓" : "↑"}</span>
      </div>
      <div style={{ flex: 1 }}>
        <div style={{ fontWeight: 500, fontSize: 13 }}>{bank.name}</div>
        <div style={{ fontSize: 12, color: "#888" }}>{hasData ? "File caricato ✓" : "Carica CSV"}</div>
      </div>
      {!hasData && <input ref={ref} type="file" accept=".csv" style={{ display: "none" }}
        onChange={e => handleFile(e.target.files[0])} />}
    </div>
  );
}

function LiveBanner({ liveData, baseTotal }) {
  const { loading, lastUpdate, error, refresh, totalStimato } = liveData;
  const varEur = totalStimato - baseTotal;
  const varPct = baseTotal > 0 ? (varEur / baseTotal) * 100 : 0;
  return (
    <div style={{ background: "#1e2235", borderRadius: 10, padding: "12px 16px",
      marginBottom: "1.25rem", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
      <div style={{ flex: 1, minWidth: 180 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontWeight: 500, fontSize: 14 }}>{lastUpdate ? "Stima valore attuale" : "Prezzi live (benchmark)"}</span>
          {lastUpdate && <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, background: "#EF9F2720", color: "#EF9F27", fontWeight: 600 }}>STIMA</span>}
        </div>
        {lastUpdate ? (
          <div style={{ display: "flex", gap: 12, marginTop: 4, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontSize: 20, fontWeight: 500 }}>{fmtEur(totalStimato)}</span>
            <span style={{ fontSize: 13, color: varPct >= 0 ? "#1D9E75" : "#D85A30" }}>
              {varPct >= 0 ? "+" : ""}{fmt(varPct)}% ({varPct >= 0 ? "+" : ""}{fmtEur(varEur)}) dal {DATA_RIF}
            </span>
          </div>
        ) : (
          <div style={{ fontSize: 12, color: "#888", marginTop: 2 }}>Stima basata su benchmark dal {DATA_RIF}</div>
        )}
        {error && <div style={{ fontSize: 11, color: "#EF9F27", marginTop: 3 }}>{error}</div>}
        <div style={{ fontSize: 10, color: "#666", marginTop: 4, fontStyle: "italic" }}>

      </button>
    </div>
  );
}

function AnalisiTab({ allHoldings, totalValue, byCat, catData }) {
  const [analysis, setAnalysis] = useState("");
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);

  const run = async () => {
    setLoading(true); setAnalysis(""); setDone(false);
    const summary = allHoldings.filter(h=>h.controvaloreAttuale>0).slice(0,15)
      .map(h=>`${h.nome.slice(0,35)} (${h.categoria}): ${fmtEur(h.controvaloreAttuale)}`).join("\n");
    try {
      const text = await callClaude(null,
        `Sei un consulente finanziario italiano esperto. Analizza questo portafoglio BILANCIATO (totale ${fmtEur(totalValue)}):\n${summary}\n\nFornisci:\n1. **Valutazione generale**\n2. **Rischi principali** (3 punti)\n3. **Opportunità** (3 punti)\n4. **Raccomandazioni** per profilo bilanciato\n5. **Previsione 2026**`
      );
      setAnalysis(text); setDone(true);
    } catch(e) { setAnalysis("Errore API."); setDone(true); }
    setLoading(false);
  };

  const renderMd = t => t
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\n/g,"<br/>");

  const az = Object.entries(byCat).filter(([k])=>k.toLowerCase().includes("azion")).reduce((s,[,v])=>s+v,0);
  const ob = Object.entries(byCat).filter(([k])=>k.toLowerCase().includes("obblig")).reduce((s,[,v])=>s+v,0);

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:"1.25rem" }}>
        {[
          { label:"Concentrazione MD", value:"97%", sub:"solo Mediolanum attiva", alert:true },
          { label:"Azionario", value:totalValue>0?Math.round(az/totalValue*100)+"%":"—", sub:"target 50–65%" },
          { label:"Obbligazionario", value:totalValue>0?Math.round(ob/totalValue*100)+"%":"—", sub:"target 30–45%" },
        ].map((c,i) => (
          <div key={i} style={{ background:c.alert?"#EF9F2710":"#1e2235", border:c.alert?"0.5px solid #EF9F2740":"none", borderRadius:10, padding:"14px 16px" }}>
            <div style={{ fontSize:12, color:"#888", marginBottom:4 }}>{c.label}</div>
            <div style={{ fontSize:22, fontWeight:500, color:c.alert?"#EF9F27":"white" }}>{c.value}</div>
            <div style={{ fontSize:12, color:"#888", marginTop:3 }}>{c.sub}</div>
          </div>
        ))}
      </div>
      <div style={{ background:"#1e2235", borderRadius:10, padding:"1.25rem", marginBottom:"1rem" }}>
        <div style={{ fontWeight:500, fontSize:14, marginBottom:"1rem" }}>Distribuzione per categoria</div>
        {catData.map(c => (
          <div key={c.label} style={{ marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:4 }}>
              <span style={{ color:"#ccc" }}>{c.label}</span>
              <span style={{ fontWeight:500 }}>{totalValue>0?Math.round(c.value/totalValue*100):0}%</span>
            </div>
            <div style={{ height:6, borderRadius:3, background:"#2a2a3e" }}>
              <div style={{ height:"100%", borderRadius:3, background:c.color, width:totalValue>0?`${c.value/totalValue*100}%`:"0%", transition:"width .5s" }} />
            </div>
          </div>
        ))}
      </div>
      <div style={{ background:"#1e2235", borderRadius:10, padding:"1.25rem" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:analysis?"1rem":0 }}>
          <div>
            <div style={{ fontWeight:500, fontSize:15 }}>Analisi AI</div>
            <div style={{ fontSize:12, color:"#888" }}>powered by Gemini</div>
          </div>
          <button onClick={run} disabled={loading} style={{ padding:"8px 16px", borderRadius:8, border:"0.5px solid #444", background:"#2a2a3e", color:"white", cursor:loading?"not-allowed":"pointer", fontSize:13, fontWeight:500 }}>
            {loading?"Analisi in corso…":done?"Rigenera":"Avvia analisi"}
          </button>
        </div>
        {analysis&&<div style={{ fontSize:13.5, lineHeight:1.7, marginTop:"1rem" }} dangerouslySetInnerHTML={{ __html:renderMd(analysis) }} />}
        {!analysis&&!loading&&<div style={{ fontSize:13, color:"#888", fontStyle:"italic", marginTop:"1rem" }}>Clicca "Avvia analisi".</div>}
      </div>
    </div>
  );
}

function PrevisioniTab({ allHoldings, totalValue }) {
  const [scenarios, setScenarios] = useState(null);
  const [loading, setLoading] = useState(false);
  const [perTitolo, setPerTitolo] = useState([]);

  const rendPonderato = allHoldings.length>0
    ? allHoldings.reduce((s,h)=>s+getRendimento(h)*(h.controvaloreAttuale||0),0)/totalValue : 0;

  const today = new Date();
  const months = [];
  for (let m=today.getMonth();m<=11;m++)

  const project = rate => months.map((_,i)=>Math.round(totalValue*Math.pow(1+rate/100/12,i)));

  const run = async () => {
    setLoading(true); setScenarios(null);

        "Sei un consulente finanziario italiano. Rispondi SEMPRE e SOLO con JSON valido, senza testo prima o dopo.",
        `Portafoglio bilanciato, aprile 2026. Totale €${Math.round(totalValue).toLocaleString("it-IT")}. Rend. medio: ${rendPonderato.toFixed(2)}%. Composizione: ${Object.entries(catBD).map(([k,v])=>`${k} ${Math.round(v/totalValue*100)}%`).join(", ")}. Contesto: tensioni USA-Cina, BCE ferma. JSON: {"contesto":"...","base":{"nome":"Scenario Base","rendimento":7.5,"motivazione":"..."},"ottimistico":{"nome":"Scenario Ottimistico","rendimento":11.0,"motivazione":"..."},"pessimistico":{"nome":"Scenario Pessimistico","rendimento":2.5,"motivazione":"..."},"raccomandazioni":["...","...","..."]}`,

      );
      const json = extractJSON(text);
      setScenarios(json);
      setPerTitolo(allHoldings.filter(h=>h.controvaloreAttuale>0).map(h=>{
        const r=getRendimento(h);
        return {...h,r,val6m:h.controvaloreAttuale*Math.pow(1+r/100/12,6),val12m:h.controvaloreAttuale*Math.pow(1+r/100/12,12)};
      }).sort((a,b)=>b.controvaloreAttuale-a.controvaloreAttuale));
    } catch(e) { setScenarios({error:`Errore: ${e.message}`}); }
    setLoading(false);
  };

  const SC={base:"#1D9E75",ottimistico:"#7F77DD",pessimistico:"#D85A30"};
  const chartSeries = scenarios&&!scenarios.error
    ? [
        {data:project(scenarios.ottimistico.rendimento),color:SC.ottimistico,dash:"4 2",opacity:0.7,label:"Ottimistico"},
        {data:project(scenarios.base.rendimento),color:SC.base,width:2,label:"Base"},
        {data:project(scenarios.pessimistico.rendimento),color:SC.pessimistico,dash:"4 2",opacity:0.7,label:"Pessimistico"},

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:"1.25rem" }}>
        {[
          {label:"Valore oggi",value:fmtEur(totalValue),sub:new Date().toLocaleDateString("it-IT")},
          {label:"Rend. medio storico",value:fmtPct(rendPonderato),sub:"ponderato per controvalore"},
          {label:"Mesi rimanenti 2026",value:(12-today.getMonth()).toString(),sub:"fino a dicembre"},
        ].map((c,i)=>(
          <div key={i} style={{ background:"#1e2235", borderRadius:10, padding:"14px 16px" }}>
            <div style={{ fontSize:12, color:"#888", marginBottom:4 }}>{c.label}</div>
            <div style={{ fontSize:22, fontWeight:500 }}>{c.value}</div>
            <div style={{ fontSize:12, color:"#888", marginTop:3 }}>{c.sub}</div>
          </div>
        ))}
      </div>
      <div style={{ background:"#1e2235", borderRadius:10, padding:"1.25rem", marginBottom:"1rem" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"1rem" }}>
          <div style={{ fontWeight:500, fontSize:14 }}>Proiezione 2026</div>
          <div style={{ display:"flex", gap:12 }}>
            {chartSeries.map((s,i)=>(
              <div key={i} style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, color:"#888" }}>
                <div style={{ width:18, height:2, background:s.color, opacity:s.opacity??1 }}/>{s.label}
              </div>
            ))}
          </div>
        </div>
        <LineChart months={months} series={chartSeries} />
        {scenarios&&!scenarios.error&&(
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginTop:"1rem" }}>
            {["ottimistico","base","pessimistico"].map(key=>{
              const s=scenarios[key],color=SC[key],val=project(s.rendimento).at(-1);
              return (
                <div key={key} style={{ background:"#12121e", borderRadius:8, padding:"10px 12px", border:`0.5px solid ${color}40` }}>

function AzioniTab({ allHoldings, totalValue, byCat }) {
  const [actions, setActions] = useState(null);
  const [loading, setLoading] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [filterTipo, setFilterTipo] = useState("tutti");

  const az=Object.entries(byCat).filter(([k])=>k.toLowerCase().includes("azion")).reduce((s,[,v])=>s+v,0);
  const ob=Object.entries(byCat).filter(([k])=>k.toLowerCase().includes("obblig")).reduce((s,[,v])=>s+v,0);
  const pctAz=totalValue>0?(az/totalValue*100).toFixed(1):0;
  const pctOb=totalValue>0?(ob/totalValue*100).toFixed(1):0;

  const run = async () => {
    setLoading(true); setActions(null); setExpanded(null);
    const righe=allHoldings.filter(h=>h.controvaloreAttuale>0).map((h,i)=>{
      const nome=h.nome.length>40?h.nome.slice(0,40):h.nome;
      const peso=totalValue>0?(h.controvaloreAttuale/totalValue*100).toFixed(1):0;
      return `${i+1}. ${nome} | ${h.categoria} | €${Math.round(h.controvaloreAttuale)} (${peso}%) | rend:${h.rendimentoAnnuo!=null?h.rendimentoAnnuo+"%":"n/d"}`;
    }).join("\n");
    try {
      const text = await callClaude(
        "Sei un consulente finanziario italiano. Rispondi SEMPRE e SOLO con JSON valido, senza testo prima o dopo, senza markdown.",
        `Portafoglio BILANCIATO, aprile 2026. Totale €${Math.round(totalValue).toLocaleString("it-IT")}. Azionario ${pctAz}% (target 50-65%), Obbligazionario ${pctOb}% (target 30-45%). Contesto: tensioni USA-Cina, BCE ferma.\n\nTITOLI:\n${righe}\n\nPer ogni titolo: azione (vendi/monitora/mantieni/incrementa/switch) e priorità (alta/media/bassa). JSON: {"sommario":"...","ribilanciamento":"...","titoli":[{"nome":"...","azione":"mantieni","priorita":"media","motivazione":"...","cosa_fare":"..."}]}`,
        4000
      );
      const json=extractJSON(text);
      if(!json.titoli||!Array.isArray(json.titoli)) throw new Error("Struttura non valida");
      setActions(json);
    } catch(e) { setActions({error:`Errore: ${e.message}`}); }
    setLoading(false);
  };

  const titoliFiltered=actions?.titoli?.filter(t=>filterTipo==="tutti"||t.azione===filterTipo)??[];
  const conteggio=actions?.titoli?Object.keys(AZIONE_META).reduce((acc,k)=>{acc[k]=actions.titoli.filter(t=>t.azione===k).length;return acc;},{}):{};

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:"1.25rem" }}>
        {[
          {label:"Azionario attuale",value:pctAz+"%",sub:"target 50–65%",alert:pctAz>65||pctAz<50},
          {label:"Obbligazionario attuale",value:pctOb+"%",sub:"target 30–45%",alert:pctOb>45||pctOb<30},
          {label:"Titoli",value:allHoldings.filter(h=>h.controvaloreAttuale>0).length.toString(),sub:"portafoglio completo"},
        ].map((c,i)=>(
          <div key={i} style={{ background:c.alert?"#EF9F2710":"#1e2235", border:c.alert?"0.5px solid #EF9F2740":"none", borderRadius:10, padding:"14px 16px" }}>
            <div style={{ fontSize:12, color:"#888", marginBottom:4 }}>{c.label}</div>
            <div style={{ fontSize:22, fontWeight:500, color:c.alert?"#EF9F27":"white" }}>{c.value}</div>
            <div style={{ fontSize:12, color:"#888", marginTop:3 }}>{c.sub}</div>
          </div>
        ))}
      </div>
      <div style={{ background:"#1e2235", borderRadius:10, padding:"1.25rem", marginBottom:"1rem" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontWeight:500, fontSize:15 }}>Piano d'Azione AI</div>
            <div style={{ fontSize:12, color:"#888" }}>Analisi titolo per titolo</div>
          </div>
          <button onClick={run} disabled={loading} style={{ padding:"8px 16px", borderRadius:8, border:"0.5px solid #444", background:"#2a2a3e", color:"white", cursor:loading?"not-allowed":"pointer", fontSize:13, fontWeight:500 }}>
            {loading?"Analisi in corso…":actions?"Aggiorna":"Avvia analisi"}
          </button>
        </div>
        {!actions&&!loading&&<div style={{ fontSize:13, color:"#888", fontStyle:"italic", marginTop:"1rem" }}>Clicca "Avvia analisi".</div>}
        {loading&&<div style={{ fontSize:13, color:"#888", marginTop:"1rem" }}>Claude sta analizzando…</div>}
        {actions?.error&&<div style={{ color:"#D85A30", fontSize:13, marginTop:"1rem" }}>{actions.error}</div>}
        {actions&&!actions.error&&(
          <div style={{ marginTop:"1rem", paddingTop:"1rem", borderTop:"0.5px solid #2a2a3e" }}>
            <div style={{ fontSize:13, color:"#aaa", fontStyle:"italic", marginBottom:"1rem" }}>{actions.sommario}</div>
            {actions.ribilanciamento&&(
              <div style={{ background:"#12121e", border:"0.5px solid #7F77DD40", borderRadius:8, padding:"10px 12px", marginBottom:"1rem", fontSize:13 }}>
                <span style={{ fontWeight:500, color:"#7F77DD", marginRight:6 }}>Ribilanciamento:</span>
                <span style={{ color:"#aaa" }}>{actions.ribilanciamento}</span>
              </div>
            )}
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              <button onClick={()=>setFilterTipo("tutti")} style={{ padding:"4px 12px", borderRadius:20, fontSize:12, cursor:"pointer", border:filterTipo==="tutti"?"1px solid #888":"0.5px solid #333", background:filterTipo==="tutti"?"#2a2a3e":"transparent", color:"white" }}>
                Tutti ({actions.titoli?.length??0})
              </button>
              {Object.entries(AZIONE_META).filter(([k])=>(conteggio[k]??0)>0).map(([key,meta])=>(
                <button key={key} onClick={()=>setFilterTipo(key)} style={{ padding:"4px 12px", borderRadius:20, fontSize:12, cursor:"pointer", border:filterTipo===key?`1px solid ${meta.color}`:`0.5px solid ${meta.color}40`, background:filterTipo===key?meta.bg:"transparent", color:meta.color }}>
                  {meta.icon} {meta.label} ({conteggio[key]})
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
      {titoliFiltered.length>0&&(
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {titoliFiltered.map((t,i)=>{
            const meta=AZIONE_META[t.azione]??AZIONE_META.mantieni;
            const holding=allHoldings.find(h=>h.nome===t.nome||h.nome.toLowerCase().startsWith(t.nome.toLowerCase().slice(0,20)));
            const isOpen=expanded===i;
            return (
              <div key={i} onClick={()=>setExpanded(isOpen?null:i)}
                style={{ background:"#1e2235", border:`0.5px solid ${meta.color}30`, borderRadius:10, overflow:"hidden", cursor:"pointer" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px" }}>
                  <div style={{ minWidth:90, padding:"3px 8px", borderRadius:4, textAlign:"center", background:meta.bg, color:meta.color, fontSize:11, fontWeight:500 }}>
                    {meta.icon} {meta.label}
                  </div>
                  <div style={{ width:6, height:6, borderRadius:"50%", flexShrink:0, background:t.priorita==="alta"?"#D85A30":t.priorita==="media"?"#EF9F27":"#888" }}/>
                  <div style={{ flex:1, fontSize:13, fontWeight:500, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.nome}</div>
                  {holding&&<div style={{ fontSize:13, fontWeight:500, flexShrink:0 }}>{fmtEur(holding.controvaloreAttuale)}</div>}
                  <div style={{ fontSize:12, color:"#888", flexShrink:0 }}>{isOpen?"▲":"▼"}</div>
                </div>
                {isOpen&&(
                  <div style={{ padding:"0 14px 14px", borderTop:"0.5px solid #2a2a3e" }}>
                    <div style={{ paddingTop:12, display:"flex", flexDirection:"column", gap:10 }}>
                      <div>
                        <div style={{ fontSize:11, color:"#888", fontWeight:500, marginBottom:3, textTransform:"uppercase" }}>Perché</div>
                        <div style={{ fontSize:13, lineHeight:1.6, color:"#ccc" }}>{t.motivazione}</div>
                      </div>
                      <div style={{ background:meta.bg, borderRadius:8, padding:"10px 12px", border:`0.5px solid ${meta.color}30` }}>
                        <div style={{ fontSize:11, color:meta.color, fontWeight:500, marginBottom:3, textTransform:"uppercase" }}>Cosa fare</div>
                        <div style={{ fontSize:13, lineHeight:1.6 }}>{t.cosa_fare}</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

        {/* Upload banche */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:"1.25rem" }}>
          {Object.keys(BANKS).map(code=>(
            <UploadZone key={code} bankCode={code} hasData={!!(bankData[code]?.length)}
              onData={data=>setBankData(prev=>({...prev,[code]:data}))} />
          ))}
        </div>

        {/* Totali per banca */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:"1.25rem" }}>
          {byBank.map(b => (
            <div key={b.code} style={{ background:"#1e2235", borderRadius:10, padding:"12px 16px", borderLeft:`3px solid ${b.color}` }}>
              <div style={{ fontSize:12, color:"#888", marginBottom:3 }}>{b.name}</div>
              <div style={{ fontSize:18, fontWeight:500, color:b.color }}>{fmtEur(b.value)}</div>
              <div style={{ fontSize:11, color:"#888", marginTop:2 }}>{totalValue>0?Math.round(b.value/totalValue*100):"—"}% del totale</div>
            </div>
          ))}
        </div>

        <LiveBanner liveData={liveData} baseTotal={totalValue} />

        {activeTab==="dashboard"&&<DashboardTab allHoldings={allHoldings} totalValue={totalValue} totalPL={totalPL} totalPLpct={totalPLpct} byBank={byBank} catData={catData} liveData={liveData}/>}
        {activeTab==="titoli"&&<TitoliTab filteredHoldings={filteredHoldings} sortCol={sortCol} sortDir={sortDir} handleSort={handleSort} filterBank={filterBank} setFilterBank={setFilterBank} filterCat={filterCat} setFilterCat={setFilterCat} search={search} setSearch={setSearch} categories={categories} liveData={liveData} totalValue={totalValue}/>}
        {activeTab==="analisi"&&<><AIBankFilter/><AnalisiTab allHoldings={aiHoldings} totalValue={aiTotalValue} byCat={aiByCat} catData={aiCatData}/></>}
        {activeTab==="previsioni"&&<><AIBankFilter/><PrevisioniTab allHoldings={aiHoldings} totalValue={aiTotalValue}/></>}
        {activeTab==="azioni"&&<><AIBankFilter/><AzioniTab allHoldings={aiHoldings} totalValue={aiTotalValue} byCat={aiByCat}/></>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
